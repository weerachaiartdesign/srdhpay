<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRDH PAY - ระบบทะเบียนเบิกจ่ายเงิน</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { font-family: 'Prompt', sans-serif; }
    .bg-pattern {
      background: linear-gradient(135deg, #f3e8ff 0%, #e9d5ff 100%);
    }
    .dark .bg-pattern {
      background: linear-gradient(135deg, #1a1a2e 0%, #2d1b69 100%);
    }
  </style>
</head>
<body class="bg-pattern min-h-screen flex items-center justify-center p-4">
  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl max-w-md w-full p-8 transition-all">
    <div class="text-center mb-8">
      <img src="/icons/logo_srdhpay-630.png" alt="SRDH PAY" class="h-20 mx-auto mb-4">
      <h1 class="text-3xl font-bold text-purple-700 dark:text-purple-400">SRDH PAY</h1>
      <p class="text-gray-600 dark:text-gray-400 text-sm">ระบบทะเบียนเบิกจ่ายเงิน โรงพยาบาลสิรินธร</p>
    </div>

    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">อีเมล</label>
        <input type="email" id="email" required class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-purple-500 dark:bg-gray-700 dark:text-white" placeholder="admin@srdh.acc.com">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">รหัสผ่าน</label>
        <input type="password" id="password" required class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-purple-500 dark:bg-gray-700 dark:text-white" placeholder="••••••••">
      </div>
      <button type="submit" id="loginBtn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-2 rounded-lg transition duration-200 flex items-center justify-center">
        เข้าสู่ระบบ
      </button>
    </form>

    <div class="mt-4 text-center">
      <button id="guestBtn" class="text-sm text-purple-600 hover:text-purple-800 dark:text-purple-400 dark:hover:text-purple-300 transition">
        👤 เข้าใช้งานแบบผู้เยี่ยมชม
      </button>
    </div>

    <div class="mt-6 text-center text-xs text-gray-500 dark:text-gray-400">
      SRDH PAY v1.0.0
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="loginLoading" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white dark:bg-gray-800 rounded-lg p-6 flex flex-col items-center shadow-xl">
      <div class="w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
      <p class="mt-3 text-gray-700 dark:text-gray-300" id="loginLoadingText">กำลังเข้าสู่ระบบ...</p>
    </div>
  </div>

  <script type="module">
    import { auth, setToken, setCurrentUser } from './js/api.js';

    const form = document.getElementById('loginForm');
    const guestBtn = document.getElementById('guestBtn');
    const loadingDiv = document.getElementById('loginLoading');
    const loadingText = document.getElementById('loginLoadingText');

    function showLoginLoading(msg = 'กำลังเข้าสู่ระบบ...') {
      loadingText.textContent = msg;
      loadingDiv.classList.remove('hidden');
    }

    function hideLoginLoading() {
      loadingDiv.classList.add('hidden');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      console.log('Login attempt:', email);
      showLoginLoading('กำลังเข้าสู่ระบบ...');

      try {
        const result = await auth.login(email, password);
        console.log('Login result:', result);

        if (result.success) {
          setToken(result.data.token);
          setCurrentUser(result.data);
          console.log('User saved:', result.data);
          // แสดง Toast
          const toast = document.createElement('div');
          toast.className = 'fixed top-4 right-4 bg-green-500 text-white px-6 py-3 rounded shadow-lg z-50 transition-opacity duration-500';
          toast.textContent = 'ยินดีต้อนรับ ' + result.data.username;
          document.body.appendChild(toast);
          setTimeout(() => {
            toast.classList.add('opacity-0');
            setTimeout(() => toast.remove(), 500);
          }, 2000);

          // Redirect
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 500);
        } else {
          hideLoginLoading();
          alert(result.error || 'เข้าสู่ระบบล้มเหลว');
        }
      } catch (err) {
        console.error('Login error:', err);
        hideLoginLoading();
        alert('เกิดข้อผิดพลาด: ' + err.message);
      }
    });

    guestBtn.addEventListener('click', async () => {
      console.log('Guest login');
      showLoginLoading('กำลังสร้างเซสชันผู้เยี่ยมชม...');
      try {
        const result = await auth.guest();
        console.log('Guest result:', result);
        if (result.success) {
          setToken(result.data.token);
          setCurrentUser(result.data);
          window.location.href = '/dashboard.html';
        } else {
          hideLoginLoading();
          alert(result.error || 'ไม่สามารถเข้าสู่ระบบแบบผู้เยี่ยมชม');
        }
      } catch (err) {
        console.error('Guest error:', err);
        hideLoginLoading();
        alert('เกิดข้อผิดพลาด: ' + err.message);
      }
    });
  </script>
</body>
</html>
