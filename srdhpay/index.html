<!DOCTYPE html>
<html lang="th" class="light"> <!-- ค่าเริ่มต้นเป็น light, toggle ด้วย JS -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | SRDH Pay</title>
    <!-- Tailwind CSS (CDN ชั่วคราว แนะนำโหลดแบบรวมเมื่อขึ้น Production) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // ตั้งค่า Tailwind ผสมกับ CSS Variables ของเรา
        tailwind.config = {
            darkMode: 'class', // เปิดใช้งาน dark mode ที่ควบคุมด้วย class="dark" บน <html>
            theme: {
                extend: {
                    colors: { 
                        primary: 'var(--color-primary)', // ใช้ตัวแปรสีจาก style.css
                        'primary-hover': 'var(--color-primary-hover)',
                        'primary-light': 'var(--color-primary-light)',
                        'secondary': 'var(--color-secondary)',
                        'bg-main': 'var(--bg-main)',
                        'bg-card': 'var(--bg-card)',
                        'text-main': 'var(--text-main)',
                        'text-muted': 'var(--text-muted)',
                        'border-color': 'var(--border-color)',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <!-- SweetAlert2 & Toastify -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden">

    <!-- พื้นหลังตกแต่ง (Blobs) สไตล์ Pastel -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-primary-light rounded-full mix-blend-multiply filter blur-3xl opacity-30 dark:opacity-10 animate-blob"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-primary-light rounded-full mix-blend-multiply filter blur-3xl opacity-30 dark:opacity-10 animate-blob animation-delay-2000"></div>

    <!-- กล่องหลัก -->
    <div class="w-full max-w-md p-8 z-10 srdh-card">
        <!-- โลโก้ และ หัวข้อ -->
        <div class="flex flex-col items-center mb-8">
            <img src="./icons/logo_srdhpay-630.png" 
                 alt="SRDH Pay Logo" 
                 class="w-24 h-24 mb-4 object-contain shadow-sm rounded-2xl bg-white p-2">
            <h1 class="text-3xl font-bold text-center text-primary tracking-tight">SRDH PAY</h1>
            <p class="text-sm text-center text-text-muted mt-1">ระบบทะเบียนเบิกจ่ายเงิน โรงพยาบาลสิรินธร</p>
        </div>

        <!-- ฟอร์มเข้าสู่ระบบ -->
        <form id="loginForm" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-medium mb-1 text-text-main">อีเมลผู้ใช้งาน</label>
                <input type="email" id="email" required placeholder="name@srdh.go.th"
                       class="w-full px-4 py-2 border border-border-color rounded-lg bg-bg-main focus:outline-none focus:ring-2 focus:ring-primary transition-all form-input text-text-main">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium mb-1 text-text-main">รหัสผ่าน</label>
                <input type="password" id="password" required placeholder="••••••••"
                       class="w-full px-4 py-2 border border-border-color rounded-lg bg-bg-main focus:outline-none focus:ring-2 focus:ring-primary transition-all form-input text-text-main">
            </div>

            <button type="submit" 
                    class="w-full py-2.5 px-4 bg-primary hover:bg-primary-hover text-white rounded-lg font-medium shadow transition-colors flex justify-center items-center gap-2">
                <!-- Icon Heroicons (Solid: arrow-right-on-rectangle) -->
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                  <path fill-rule="evenodd" d="M7.5 3.75A1.5 1.5 0 006 5.25v13.5a1.5 1.5 0 001.5 1.5h6a1.5 1.5 0 001.5-1.5V15a.75.75 0 011.5 0v3.75a3 3 0 01-3 3h-6a3 3 0 01-3-3V5.25a3 3 0 013-3h6a3 3 0 013 3V9A.75.75 0 0115 9V5.25a1.5 1.5 0 00-1.5-1.5h-6zm10.72 4.72a.75.75 0 011.06 0l3 3a.75.75 0 010 1.06l-3 3a.75.75 0 11-1.06-1.06l1.72-1.72H9a.75.75 0 010-1.5h10.94l-1.72-1.72a.75.75 0 010-1.06z" clip-rule="evenodd" />
                </svg>
                เข้าสู่ระบบ
            </button>
        </form>

        <div class="relative flex py-5 items-center">
            <div class="flex-grow border-t border-border-color"></div>
            <span class="flex-shrink-0 mx-4 text-text-muted text-xs">หรือ</span>
            <div class="flex-grow border-t border-border-color"></div>
        </div>

        <!-- ปุ่ม Guest -->
        <button id="guestBtn" 
                class="w-full py-2.5 px-4 bg-transparent border-2 border-primary-light text-primary hover:bg-primary-light rounded-lg font-medium transition-colors">
            เข้าใช้งานแบบผู้เยี่ยมชม
        </button>
    </div>

    <!-- Footer -->
    <footer class="mt-8 text-xs text-text-muted flex flex-col items-center gap-1">
        <p>SRDH PAY &copy; 2026</p>
        <p class="font-number font-medium">Version: 1.0.0</p>
    </footer>

    <!-- Script สำหรับหน้า Login (Simulation + โครงสร้าง API) -->
    <script>
        // Utility: ฟังก์ชันสำหรับแสดง Toast Notification
        function showToast(message, type = 'success', duration = 3000) {
            let backgroundColor;
            if (type === 'success') backgroundColor = 'var(--color-primary)';
            else if (type === 'error') backgroundColor = '#EF4444'; // Red-500
            else if (type === 'info') backgroundColor = 'var(--color-secondary)'; // Purple-400
            else backgroundColor = '#6B7280'; // Gray-500

            Toastify({
                text: message,
                duration: duration,
                gravity: "bottom", // `top` or `bottom`
                position: "right", // `left`, `center` or `right`
                stopOnFocus: true, // Prevents dismissing of toast on hover
                style: {
                    background: backgroundColor,
                    borderRadius: "0.5rem"
                },
                onClick: function(){} // Callback after click
            }).showToast();
        }

        // ตรวจสอบ Dark Mode เบื้องต้นจาก LocalStorage (ตามข้อ Q7.2)
        const storedTheme = localStorage.getItem('srdh_theme');
        if (storedTheme === 'dark') {
            document.documentElement.classList.add('dark');
        } else if (storedTheme === 'light') {
            document.documentElement.classList.remove('dark');
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            // หากไม่มีการตั้งค่า ให้ดูตามระบบปฏิบัติการ
            document.documentElement.classList.add('dark');
            localStorage.setItem('srdh_theme', 'dark');
        } else {
            document.documentElement.classList.remove('dark');
            localStorage.setItem('srdh_theme', 'light');
        }


        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            // ตรวจสอบความถูกต้องของ Input ก่อนส่ง
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');

            if (!emailInput.value || !passwordInput.value) {
                Swal.fire({
                    title: 'ข้อมูลไม่ครบถ้วน',
                    text: 'กรุณากรอกอีเมลและรหัสผ่าน',
                    icon: 'warning',
                    confirmButtonColor: 'var(--color-primary)'
                });
                return; // หยุดการทำงานถ้าข้อมูลไม่ครบ
            }

            showToast("กำลังตรวจสอบข้อมูล...", "info", 5000);

            // TODO: เรียก API ไปยัง Cloudflare Worker /api/login
            // ในตอนนี้ เราจะจำลองการทำงานของ API ก่อน
            try {
                const response = await fetch('https://srdhpay-api.weerachaiartdesign.workers.dev/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: emailInput.value,
                        password: passwordInput.value
                    })
                });
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: emailInput.value,
                        password: passwordInput.value
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // การล็อกอินสำเร็จ
                    // data.token จะถูกเก็บใน httpOnly cookie โดย Worker
                    // เราไม่จำเป็นต้องแตะ cookie ฝั่ง client
                    showToast(data.message || 'เข้าสู่ระบบสำเร็จ!', 'success');
                    Swal.fire({
                        title: 'เข้าสู่ระบบสำเร็จ!',
                        text: `ยินดีต้อนรับ ${data.user.username}`,
                        icon: 'success',
                        confirmButtonColor: 'var(--color-primary)'
                    }).then(() => {
                        window.location.href = 'dashboard.html'; // ไปยังหน้า Dashboard
                    });
                } else {
                    // การล็อกอินล้มเหลว
                    showToast(data.message || 'เข้าสู่ระบบล้มเหลว', 'error');
                    Swal.fire({
                        title: 'เข้าสู่ระบบล้มเหลว',
                        text: data.message || 'อีเมลหรือรหัสผ่านไม่ถูกต้อง',
                        icon: 'error',
                        confirmButtonColor: 'var(--color-primary)'
                    });
                }
            } catch (error) {
                console.error('Login error:', error);
                showToast('เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์', 'error');
                Swal.fire({
                    title: 'เกิดข้อผิดพลาด',
                    text: 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ในขณะนี้',
                    icon: 'error',
                    confirmButtonColor: 'var(--color-primary)'
                });
            }
        });

        // Guest Access 
        document.getElementById('guestBtn').addEventListener('click', async () => {
            showToast("กำลังเข้าใช้งานในโหมดผู้เยี่ยมชม...", "info", 5000);

            try {
                const response = await fetch('https://srdhpay-api.weerachaiartdesign.workers.dev/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });
                const data = await response.json();

                if (response.ok) {
                    // Guest login สำเร็จ
                    showToast(data.message || 'เข้าสู่ระบบ Guest สำเร็จ!', 'success');
                    Swal.fire({
                        title: 'โหมดผู้เยี่ยมชม',
                        text: `ยินดีต้อนรับ Guest (สิทธิ์อ่านเท่านั้น)`,
                        icon: 'info',
                        confirmButtonColor: 'var(--color-primary)'
                    }).then(() => {
                        window.location.href = 'dashboard.html';
                    });
                } else {
                    showToast(data.message || 'เข้าสู่ระบบ Guest ล้มเหลว', 'error');
                    Swal.fire({
                        title: 'เข้าสู่ระบบ Guest ล้มเหลว',
                        text: data.message || 'ไม่สามารถเข้าสู่ระบบ Guest ได้',
                        icon: 'error',
                        confirmButtonColor: 'var(--color-primary)'
                    });
                }
            } catch (error) {
                console.error('Guest login error:', error);
                showToast('เกิดข้อผิดพลาดในการเข้าสู่ระบบ Guest', 'error');
                 Swal.fire({
                    title: 'เกิดข้อผิดพลาด',
                    text: 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ในขณะนี้',
                    icon: 'error',
                    confirmButtonColor: 'var(--color-primary)'
                 });
            }
        });
    </script>
</body>
</html>
