<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายงานการเบิกจ่าย - SRDH PAY</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="min-h-screen">
  <div id="header-placeholder"></div>
  <div class="flex">
    <div id="sidebar-placeholder"></div>

    <main class="flex-1 p-4 md:p-6 max-w-full overflow-x-hidden space-y-4">
      <div class="flex flex-wrap items-start justify-between gap-3">
        <div>
          <h2 class="font-display font-bold text-xl">รายงานการเบิกจ่าย</h2>
          <p class="text-sm text-[var(--color-text-muted)]" id="generatedAt">ข้อมูล ณ วันที่ปัจจุบัน</p>
        </div>
        <button id="btnPrint" class="btn btn-outline">พิมพ์</button>
      </div>

      <div id="reportContainer" class="space-y-5">
        <div class="skeleton h-40"></div>
        <div class="skeleton h-40"></div>
      </div>
    </main>
  </div>

  <!-- Print Area -->
  <div id="printArea" class="hidden p-8"></div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    if (App.requireLogin()) { App.loadComponents(); init(); }

    async function init() {
      document.getElementById('generatedAt').textContent = `ข้อมูล ณ วันที่ ${App.thaiDate(new Date().toISOString())}`;
      try {
        const res = await api.get('/api/report/by-type');
        render(res.data);
      } catch (err) { App.errorAlert(err); }
      document.getElementById('btnPrint').addEventListener('click', doPrint);
    }

    function buildTableHtml(money_type, depts) {
      let totalReceived = 0, totalPaid = 0, totalRemaining = 0, totalRequested = 0, totalPaidAmt = 0, totalRemainingAmt = 0;
      const rowsHtml = depts.map((d) => {
        totalReceived += d.received_count; totalPaid += d.paid_count; totalRemaining += d.remaining_count;
        totalRequested += d.requested_amount; totalPaidAmt += d.paid_amount; totalRemainingAmt += d.remaining_amount;
        return `
          <tr>
            <td>${d.dept}</td>
            <td class="text-right">${d.received_count.toLocaleString()}</td>
            <td class="text-right">${d.paid_count.toLocaleString()}</td>
            <td class="text-right">${d.remaining_count.toLocaleString()}</td>
            <td class="text-right">${App.money(d.requested_amount)}</td>
            <td class="text-right">${App.money(d.paid_amount)}</td>
            <td class="text-right">${App.money(d.remaining_amount)}</td>
          </tr>`;
      }).join('');

      const footHtml = `
        <tr class="font-semibold" style="background:var(--color-primary-soft)">
          <td>รวม</td>
          <td class="text-right">${totalReceived.toLocaleString()}</td>
          <td class="text-right">${totalPaid.toLocaleString()}</td>
          <td class="text-right">${totalRemaining.toLocaleString()}</td>
          <td class="text-right">${App.money(totalRequested)}</td>
          <td class="text-right">${App.money(totalPaidAmt)}</td>
          <td class="text-right">${App.money(totalRemainingAmt)}</td>
        </tr>`;

      return `
        <div class="card p-4 report-block">
          <h3 class="font-display font-semibold mb-3">${money_type} <span class="text-xs font-normal text-[var(--color-text-muted)]">ข้อมูล ณ วันที่ปัจจุบัน</span></h3>
          <div class="table-wrap">
            <table class="data-table">
              <thead><tr>
                <th>หน่วยงาน</th><th class="text-right">ฎีกาที่รับเข้าระบบ</th><th class="text-right">ฎีกาจ่ายแล้ว</th><th class="text-right">ฎีกาคงเหลือ</th>
                <th class="text-right">จำนวนเงินขอเบิกทั้งสิ้น</th><th class="text-right">จำนวนเงินที่จ่ายแล้ว</th><th class="text-right">จำนวนเงินคงเหลือยังไม่จ่าย</th>
              </tr></thead>
              <tbody>${rowsHtml || `<tr><td colspan="7" class="text-center py-6 text-[var(--color-text-muted)]">ไม่มีข้อมูล</td></tr>`}</tbody>
              ${depts.length > 0 ? `<tfoot>${footHtml}</tfoot>` : ''}
            </table>
          </div>
        </div>`;
    }

    function render(data) {
      document.getElementById('reportContainer').innerHTML = data.map((d) => buildTableHtml(d.money_type, d.depts)).join('');
    }

    function doPrint() {
      document.getElementById('printArea').innerHTML =
        `<h2 style="font-weight:700;font-size:18px;margin-bottom:12px">รายงานการเบิกจ่าย — ${document.getElementById('generatedAt').textContent}</h2>` +
        document.getElementById('reportContainer').innerHTML;
      document.getElementById('printArea').classList.remove('hidden');
      window.print();
      document.getElementById('printArea').classList.add('hidden');
    }
  </script>
</body>
</html>
