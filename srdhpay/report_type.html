<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>รายงานการเบิกจ่าย - SRDH PAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="icons/srdhpay-192.png">
</head>
<body class="bg-gray-50 dark:bg-gray-900">
    <div id="sidebar-container"></div>
    <div id="header-container"></div>
    <main class="p-4 md:p-6 transition-all duration-300" id="main-content">
        <div class="mb-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-gray-800 dark:text-white">รายงานการเบิกจ่าย</h1>
                <p class="text-gray-600 dark:text-gray-400">สรุปตามประเภทเงิน ณ วันที่ <span id="reportDate"></span></p>
            </div>
            <button id="printBtn" class="btn-primary"><i class="fas fa-print mr-2"></i>พิมพ์</button>
        </div>
        <div id="reportContainer" class="space-y-6">
            <div class="text-center py-10">กำลังโหลด...</div>
        </div>
    </main>
    <script src="js/api-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/report.js"></script>
    <script>
        (async function() {
            const authorized = await requireAuth(['admin','manager']);
            if (!authorized) return;
            loadTypeReport();
        })();
    </script>
</body>
</html>
