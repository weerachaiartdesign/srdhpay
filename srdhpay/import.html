<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>นำเข้าข้อมูล - SRDH PAY</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    body { font-family: 'Prompt', sans-serif; }
    .drop-zone {
      border: 2px dashed #d1d5db;
      border-radius: 0.75rem;
      transition: border-color 0.3s, background-color 0.3s;
      cursor: pointer;
    }
    .drop-zone.dragover {
      border-color: #7c3aed;
      background-color: #f3e8ff;
    }
    .dark .drop-zone {
      border-color: #4b5563;
    }
    .dark .drop-zone.dragover {
      border-color: #8b5cf6;
      background-color: #2d1b69;
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
  <div id="header-container"></div>
  <div class="flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 p-4 md:p-6 overflow-y-auto ml-0 md:ml-64">
      <div class="max-w-7xl mx-auto">
        <!-- Page Header -->
        <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-4">
          <div>
            <h1 class="text-2xl font-bold text-gray-800 dark:text-white">นำเข้าข้อมูล</h1>
            <p class="text-gray-600 dark:text-gray-400">ลงทะเบียนรับฎีกาเข้าระบบ</p>
          </div>
          <div class="flex flex-wrap gap-2 mt-2 md:mt-0">
            <button id="addManualBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded text-sm transition flex items-center gap-1">
              <span class="text-lg font-bold">+</span> เพิ่มข้อมูล
            </button>
            <button id="registerBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded text-sm transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
              ลงทะเบียน
            </button>
            <button id="printRegisterBtn" class="bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 px-4 py-2 rounded text-sm transition">
              พิมพ์ใบลงทะเบียน
            </button>
          </div>
        </div>

        <!-- Import Method Tabs -->
        <div class="flex border-b border-gray-200 dark:border-gray-700 mb-4">
          <button id="tabUpload" class="px-4 py-2 text-sm font-medium text-purple-600 border-b-2 border-purple-600 dark:text-purple-400 dark:border-purple-400">นำเข้าไฟล์ XLSX</button>
          <button id="tabManual" class="px-4 py-2 text-sm font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300">เพิ่มข้อมูลเอง</button>
        </div>

        <!-- Upload Section -->
        <div id="uploadSection" class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
          <div id="dropZone" class="drop-zone p-8 text-center">
            <div class="flex flex-col items-center">
              <svg class="w-12 h-12 text-gray-400 dark:text-gray-500 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
              <p class="text-gray-600 dark:text-gray-400">ลากไฟล์ .xlsx มาวาง หรือคลิกเพื่อเลือกไฟล์</p>
              <p class="text-sm text-gray-400 dark:text-gray-500 mt-1">(รองรับไฟล์สูงสุด 5MB)</p>
              <input type="file" id="fileInput" accept=".xlsx,.xls" class="hidden">
            </div>
          </div>
          <div id="previewContainer" class="mt-4 hidden">
            <div class="flex justify-between items-center mb-2">
              <span class="text-sm font-medium text-gray-700 dark:text-gray-300">ตัวอย่างข้อมูล (คลิกแก้ไข)</span>
              <span id="rowCount" class="text-xs text-gray-500 dark:text-gray-400"></span>
            </div>
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead class="bg-gray-50 dark:bg-gray-700">
                  <tr id="previewHeader"></tr>
                </thead>
                <tbody id="previewBody"></tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Manual Section (hidden by default) -->
        <div id="manualSection" class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 hidden">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">วันที่ลงทะเบียน</label>
              <input type="text" id="manualRegisterDate" disabled class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">หน่วยงาน</label>
              <select id="manualDept" class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-white dark:bg-gray-700 dark:text-white"></select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">ผู้ส่งเอกสาร</label>
              <input type="text" id="manualSender" class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-white dark:bg-gray-700 dark:text-white">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">ประเภทเงิน</label>
              <select id="manualMoneyType" class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-white dark:bg-gray-700 dark:text-white"></select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">เลขที่ใบขอเบิก <span class="text-red-500">*</span></label>
              <input type="text" id="manualRequestNo" placeholder="1/69" class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-white dark:bg-gray-700 dark:text-white">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">เลขที่ฎีกา</label>
              <input type="text" id="manualDkNo" placeholder="1801/69" class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-white dark:bg-gray-700 dark:text-white">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">เลขที่ใบกัน</label>
              <input type="text" id="manualReserveNo" class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-white dark:bg-gray-700 dark:text-white">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">จำนวนเงินกัน</label>
              <input type="number" id="manualReserveAmount" step="0.01" class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-white dark:bg-gray-700 dark:text-white">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">เลขที่โครงการ (e-GP)</label>
              <input type="text" id="manualEgpNo" class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-white dark:bg-gray-700 dark:text-white">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Invoice</label>
              <input type="text" id="manualInvoice" class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-white dark:bg-gray-700 dark:text-white">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">ชื่อเจ้าหนี้/บริษัท <span class="text-red-500">*</span></label>
              <div class="flex gap-2">
                <select id="manualVendor" class="flex-1 border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-white dark:bg-gray-700 dark:text-white"></select>
                <button id="addVendorBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-3 py-2 rounded text-sm">+</button>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">จำนวนเงินขอเบิก <span class="text-red-500">*</span></label>
              <input type="number" id="manualAmount" step="0.01" class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-white dark:bg-gray-700 dark:text-white">
            </div>
            <div class="md:col-span-2">
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">รายการ</label>
              <textarea id="manualDescription" rows="2" class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-white dark:bg-gray-700 dark:text-white"></textarea>
            </div>
          </div>
          <div class="mt-4 flex justify-end gap-2">
            <button id="addToQueueBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded text-sm transition">เพิ่มเข้าคิว</button>
          </div>
        </div>

        <!-- Queue Preview -->
        <div id="queueContainer" class="mt-4 bg-white dark:bg-gray-800 rounded-lg shadow p-4 hidden">
          <h3 class="text-lg font-semibold text-gray-800 dark:text-white mb-2">รายการที่เตรียมลงทะเบียน</h3>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-gray-50 dark:bg-gray-700">
                <tr>
                  <th class="px-3 py-2 text-left">#</th>
                  <th class="px-3 py-2 text-left">ประเภทเงิน</th>
                  <th class="px-3 py-2 text-left">เลขขอเบิก</th>
                  <th class="px-3 py-2 text-left">เจ้าหนี้</th>
                  <th class="px-3 py-2 text-left">รายการ</th>
                  <th class="px-3 py-2 text-right">จำนวน</th>
                  <th class="px-3 py-2 text-center">ลบ</th>
                </tr>
              </thead>
              <tbody id="queueBody"></tbody>
            </table>
          </div>
          <div class="mt-3 text-sm text-gray-500 dark:text-gray-400">รวม <span id="queueCount">0</span> รายการ</div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { loadLayout, requireRole, formatThaiDate, formatCurrency, showToast, showLoading, hideLoading } from './js/app.js';
    import { register, settings, getCurrentUser } from './js/api.js';

    let queue = [];
    let moneyTypes = [];
    let vendors = [];
    let depts = [];

    // Load master data
    async function loadMasterData() {
      try {
        const [mtRes, vendorRes, deptRes] = await Promise.all([
          settings.get('money_type'),
          settings.get('vendor'),
          settings.get('dept'),
        ]);
        if (mtRes.success) moneyTypes = mtRes.data;
        if (vendorRes.success) vendors = vendorRes.data;
        if (deptRes.success) depts = deptRes.data;
        populateSelects();
      } catch (e) {
        console.error('Failed to load master data:', e);
      }
    }

    function populateSelects() {
      const user = getCurrentUser();
      // Dept
      const deptSelect = document.getElementById('manualDept');
      deptSelect.innerHTML = '';
      depts.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.name;
        opt.textContent = d.name;
        if (d.name === user?.dept) opt.selected = true;
        deptSelect.appendChild(opt);
      });
      if (user?.role !== 'staff') {
        deptSelect.disabled = false;
      } else {
        deptSelect.disabled = true;
      }

      // Money type
      const mtSelect = document.getElementById('manualMoneyType');
      mtSelect.innerHTML = '';
      moneyTypes.forEach(mt => {
        const opt = document.createElement('option');
        opt.value = mt.name;
        opt.textContent = mt.name;
        mtSelect.appendChild(opt);
      });

      // Vendor
      const vendorSelect = document.getElementById('manualVendor');
      vendorSelect.innerHTML = '';
      vendors.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v.name;
        opt.textContent = v.name;
        vendorSelect.appendChild(opt);
      });
      // Add option for custom input? We'll use button to add new vendor.

      // Sender
      const senderInput = document.getElementById('manualSender');
      senderInput.value = user?.username || '';
      if (user?.role !== 'staff') {
        senderInput.disabled = false;
      } else {
        senderInput.disabled = true;
      }

      // Register date
      const now = new Date();
      document.getElementById('manualRegisterDate').value = formatThaiDate(now.toISOString());
    }

    // Add manual item to queue
    function addManualToQueue() {
      const moneyType = document.getElementById('manualMoneyType').value;
      const dept = document.getElementById('manualDept').value;
      const sender = document.getElementById('manualSender').value;
      const requestNo = document.getElementById('manualRequestNo').value.trim();
      const dkNo = document.getElementById('manualDkNo').value.trim();
      const reserveNo = document.getElementById('manualReserveNo').value.trim();
      const reserveAmount = parseFloat(document.getElementById('manualReserveAmount').value) || 0;
      const egpNo = document.getElementById('manualEgpNo').value.trim();
      const invoice = document.getElementById('manualInvoice').value.trim();
      const vendor = document.getElementById('manualVendor').value;
      const amount = parseFloat(document.getElementById('manualAmount').value);
      const description = document.getElementById('manualDescription').value.trim();

      if (!moneyType) { showToast('กรุณาเลือกประเภทเงิน', 'error'); return; }
      if (!requestNo) { showToast('กรุณากรอกเลขที่ใบขอเบิก', 'error'); return; }
      if (!vendor) { showToast('กรุณาเลือกเจ้าหนี้/บริษัท', 'error'); return; }
      if (!amount || amount <= 0) { showToast('กรุณากรอกจำนวนเงินขอเบิก', 'error'); return; }

      // Validate request_no format: num/year e.g. 1/69
      const requestParts = requestNo.split('/');
      if (requestParts.length !== 2 || isNaN(requestParts[0]) || isNaN(requestParts[1])) {
        showToast('เลขที่ใบขอเบิกต้องเป็นรูปแบบ 1/69', 'error'); return;
      }

      let dkRaw = null, dkDisplay = null;
      if (dkNo) {
        const dkParts = dkNo.split('/');
        if (dkParts.length === 2 && !isNaN(dkParts[0]) && !isNaN(dkParts[1])) {
          dkRaw = dkNo;
          dkDisplay = dkNo;
        } else {
          showToast('เลขที่ฎีกาต้องเป็นรูปแบบ 1801/69', 'error'); return;
        }
      }

      queue.push({
        money_type: moneyType,
        dept,
        sender,
        request_no_raw: requestNo, // will be converted by backend
        request_no_display: requestNo,
        dk_no_raw: dkRaw,
        dk_no_display: dkDisplay,
        reserve_no: reserveNo,
        reserve_amount: reserveAmount,
        egp_no: egpNo,
        invoice,
        vendor,
        amount,
        description,
        source: 'MANUAL',
      });

      renderQueue();
      document.getElementById('manualRequestNo').value = '';
      document.getElementById('manualDkNo').value = '';
      document.getElementById('manualReserveNo').value = '';
      document.getElementById('manualReserveAmount').value = '';
      document.getElementById('manualEgpNo').value = '';
      document.getElementById('manualInvoice').value = '';
      document.getElementById('manualAmount').value = '';
      document.getElementById('manualDescription').value = '';
      showToast('เพิ่มรายการเรียบร้อย', 'success');
    }

    // Render queue
    function renderQueue() {
      const container = document.getElementById('queueContainer');
      const tbody = document.getElementById('queueBody');
      const count = document.getElementById('queueCount');

      if (queue.length === 0) {
        container.classList.add('hidden');
        return;
      }
      container.classList.remove('hidden');
      count.textContent = queue.length;

      let html = '';
      queue.forEach((item, idx) => {
        html += `
          <tr class="border-b border-gray-100 dark:border-gray-700">
            <td class="px-3 py-2">${idx + 1}</td>
            <td class="px-3 py-2">${item.money_type}</td>
            <td class="px-3 py-2">${item.request_no_display}</td>
            <td class="px-3 py-2">${item.vendor}</td>
            <td class="px-3 py-2 truncate max-w-xs">${item.description || '-'}</td>
            <td class="px-3 py-2 text-right font-medium">${formatCurrency(item.amount)}</td>
            <td class="px-3 py-2 text-center">
              <button class="remove-queue-btn text-red-500 hover:text-red-700" data-index="${idx}">✕</button>
            </td>
          </tr>
        `;
      });
      tbody.innerHTML = html;

      // Add remove listeners
      tbody.querySelectorAll('.remove-queue-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.index);
          queue.splice(idx, 1);
          renderQueue();
          updateRegisterButton();
        });
      });

      updateRegisterButton();
    }

    function updateRegisterButton() {
      const btn = document.getElementById('registerBtn');
      if (queue.length > 0) {
        btn.disabled = false;
      } else {
        btn.disabled = true;
      }
    }

    // Upload XLSX
    function handleFile(file) {
      const reader = new FileReader();
      reader.onload = async function(e) {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
          const json = XLSX.utils.sheet_to_json(firstSheet);

          if (!json || json.length === 0) {
            showToast('ไม่พบข้อมูลในไฟล์', 'error');
            return;
          }

          // Map columns: bgtype_name, bgdk_rcvno, bgdk_dkno, bgdk_egpno, bgdk_paytonm, bgdk_dkamt, bgdk_vatamt, bgdk_note
          const mapped = json.map(row => {
            const amount = (parseFloat(row.bgdk_dkamt) || 0) + (parseFloat(row.bgdk_vatamt) || 0);
            let requestNo = row.bgdk_rcvno ? String(row.bgdk_rcvno).trim() : '';
            let dkNo = row.bgdk_dkno ? String(row.bgdk_dkno).trim() : '';
            return {
              money_type: row.bgtype_name || '',
              request_no_raw: requestNo,
              request_no_display: requestNo,
              dk_no_raw: dkNo,
              dk_no_display: dkNo,
              egp_no: row.bgdk_egpno ? String(row.bgdk_egpno).trim() : '',
              vendor: row.bgdk_paytonm ? String(row.bgdk_paytonm).trim() : '',
              amount: amount,
              description: row.bgdk_note ? String(row.bgdk_note).trim() : '',
              source: 'IMPORT',
            };
          }).filter(item => item.money_type && item.request_no_raw && item.vendor && item.amount > 0);

          if (mapped.length === 0) {
            showToast('ไม่พบข้อมูลที่ถูกต้องในไฟล์', 'error');
            return;
          }

          // Add to queue
          queue = queue.concat(mapped);
          renderQueue();
          showToast(`นำเข้า ${mapped.length} รายการสำเร็จ`, 'success');
          document.getElementById('previewContainer').classList.add('hidden');
        } catch (err) {
          showToast('อ่านไฟล์ไม่สำเร็จ: ' + err.message, 'error');
        }
      };
      reader.readAsArrayBuffer(file);
    }

    // Register
    async function handleRegister() {
      if (queue.length === 0) return;

      const user = getCurrentUser();
      const limitKey = user.role === 'staff' ? 'import_limit_staff' : 'import_limit_admin';
      try {
        const limitRes = await settings.get('app');
        let maxLimit = 20;
        if (limitRes.success) {
          const row = limitRes.data.find(s => s.key === limitKey);
          if (row) maxLimit = parseInt(row.value);
        }
        if (queue.length > maxLimit) {
          showToast(`ไม่สามารถลงทะเบียนเกิน ${maxLimit} รายการต่อครั้ง`, 'error');
          return;
        }
      } catch (e) {}

      // Confirm
      const confirm = await Swal.fire({
        title: 'ยืนยันการลงทะเบียน',
        html: `จำนวนรายการ: <strong>${queue.length}</strong> รายการ<br>เลขทะเบียนจะถูกสร้างโดยอัตโนมัติ`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'ยืนยัน',
        cancelButtonText: 'ยกเลิก',
      });
      if (!confirm.isConfirmed) return;

      showLoading('กำลังลงทะเบียน...');
      try {
        const res = await register.import(queue);
        if (!res.success) throw new Error(res.error);

        Swal.fire({
          title: 'ลงทะเบียนสำเร็จ',
          html: `เลขทะเบียน: <strong>${res.data.register_no}</strong><br>จำนวน: ${res.data.imported} รายการ`,
          icon: 'success',
          confirmButtonText: 'OK',
        });

        // Clear queue
        queue = [];
        renderQueue();
        // Optionally print
        if (res.data.register_no) {
          // We'll implement print later
        }

      } catch (err) {
        showToast('ลงทะเบียนล้มเหลว: ' + err.message, 'error');
      } finally {
        hideLoading();
      }
    }

    // Print register
    function printRegister() {
      // Open print preview with only items in WAITING status for current dept
      // For now, show a simple print dialog
      window.print();
    }

    // Add vendor
    async function addVendor() {
      const { value: name } = await Swal.fire({
        title: 'เพิ่มเจ้าหนี้/บริษัท',
        input: 'text',
        inputLabel: 'ชื่อเจ้าหนี้/บริษัท',
        inputPlaceholder: 'กรอกชื่อ...',
        showCancelButton: true,
        confirmButtonText: 'เพิ่ม',
        cancelButtonText: 'ยกเลิก',
      });
      if (!name) return;
      try {
        const res = await settings.create('vendor', { name, active: 1 });
        if (!res.success) throw new Error(res.error);
        showToast('เพิ่มเจ้าหนี้เรียบร้อย', 'success');
        // Reload vendors
        const vendorRes = await settings.get('vendor');
        if (vendorRes.success) {
          vendors = vendorRes.data;
          populateSelects();
        }
      } catch (err) {
        showToast('เพิ่มไม่สำเร็จ: ' + err.message, 'error');
      }
    }

    // Init
    const user = requireRole(['admin', 'manager', 'staff']);
    if (user) {
      await loadLayout();
      await loadMasterData();

      // Set today date
      const now = new Date();
      document.getElementById('manualRegisterDate').value = formatThaiDate(now.toISOString());

      // Event listeners
      document.getElementById('addManualBtn').addEventListener('click', () => {
        document.getElementById('tabManual').click();
      });

      document.getElementById('tabUpload').addEventListener('click', function() {
        document.getElementById('uploadSection').classList.remove('hidden');
        document.getElementById('manualSection').classList.add('hidden');
        this.classList.add('text-purple-600', 'border-purple-600', 'dark:text-purple-400', 'dark:border-purple-400');
        this.classList.remove('text-gray-500', 'dark:text-gray-400');
        document.getElementById('tabManual').classList.remove('text-purple-600', 'border-purple-600', 'dark:text-purple-400', 'dark:border-purple-400');
        document.getElementById('tabManual').classList.add('text-gray-500', 'hover:text-gray-700', 'dark:text-gray-400', 'dark:hover:text-gray-300');
      });

      document.getElementById('tabManual').addEventListener('click', function() {
        document.getElementById('uploadSection').classList.add('hidden');
        document.getElementById('manualSection').classList.remove('hidden');
        this.classList.add('text-purple-600', 'border-purple-600', 'dark:text-purple-400', 'dark:border-purple-400');
        this.classList.remove('text-gray-500', 'dark:text-gray-400');
        document.getElementById('tabUpload').classList.remove('text-purple-600', 'border-purple-600', 'dark:text-purple-400', 'dark:border-purple-400');
        document.getElementById('tabUpload').classList.add('text-gray-500', 'hover:text-gray-700', 'dark:text-gray-400', 'dark:hover:text-gray-300');
      });

      // Dropzone
      const dropZone = document.getElementById('dropZone');
      const fileInput = document.getElementById('fileInput');

      dropZone.addEventListener('click', () => fileInput.click());
      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
      });
      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
      });
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) {
          handleFile(e.dataTransfer.files[0]);
        }
      });
      fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) {
          handleFile(e.target.files[0]);
        }
      });

      // Add to queue
      document.getElementById('addToQueueBtn').addEventListener('click', addManualToQueue);

      // Register
      document.getElementById('registerBtn').addEventListener('click', handleRegister);

      // Add vendor
      document.getElementById('addVendorBtn').addEventListener('click', addVendor);

      // Print
      document.getElementById('printRegisterBtn').addEventListener('click', printRegister);

      // Initial render
      renderQueue();
    }
  </script>
</body>
</html>
