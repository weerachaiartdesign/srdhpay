<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>บันทึกการตรวจสอบ - SRDH PAY</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { font-family: 'Prompt', sans-serif; }
    .status-badge {
      font-size: 0.75rem;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-weight: 500;
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
  <div id="header-container"></div>
  <div class="flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 p-4 md:p-6 overflow-y-auto">
      <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-4">
          <div>
            <h1 class="text-2xl font-bold text-gray-800 dark:text-white">บันทึกการตรวจสอบ</h1>
            <p class="text-gray-600 dark:text-gray-400">บันทึก การตรวจสอบ การแก้ไข และรับคืน</p>
          </div>
          <div class="flex flex-wrap gap-2 mt-2 md:mt-0">
            <button id="editBtn" class="btn btn-primary bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded text-sm transition disabled:opacity-50 disabled:cursor-not-allowed">แก้ไข</button>
            <button id="returnBtn" class="btn btn-primary bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded text-sm transition disabled:opacity-50 disabled:cursor-not-allowed">รับคืน</button>
            <button id="passBtn" class="btn btn-primary bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded text-sm transition disabled:opacity-50 disabled:cursor-not-allowed">ตรวจผ่าน</button>
            <button id="printEditBtn" class="btn btn-secondary bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 px-4 py-2 rounded text-sm transition">พิมพ์ใบส่งแก้ไข</button>
          </div>
        </div>

        <!-- Filters -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4 mb-4">
          <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
            <select id="filterStatus" class="border border-gray-300 dark:border-gray-600 rounded px-3 py-2 text-sm bg-white dark:bg-gray-700 dark:text-white">
              <option value="">ทุกสถานะ</option>
              <option value="CHECKUP">ตรวจสอบ</option>
              <option value="EDITING">ส่งแก้ไข</option>
            </select>
            <select id="filterMoneyType" class="border border-gray-300 dark:border-gray-600 rounded px-3 py-2 text-sm bg-white dark:bg-gray-700 dark:text-white">
              <option value="">ทุกประเภทเงิน</option>
            </select>
            <select id="filterDept" class="border border-gray-300 dark:border-gray-600 rounded px-3 py-2 text-sm bg-white dark:bg-gray-700 dark:text-white">
              <option value="">ทุกหน่วยงาน</option>
            </select>
            <input id="filterSender" type="text" placeholder="ผู้ส่งเอกสาร" class="border border-gray-300 dark:border-gray-600 rounded px-3 py-2 text-sm bg-white dark:bg-gray-700 dark:text-white">
            <input id="filterVendor" type="text" placeholder="ชื่อเจ้าหนี้/บริษัท" class="border border-gray-300 dark:border-gray-600 rounded px-3 py-2 text-sm bg-white dark:bg-gray-700 dark:text-white">
          </div>
          <div class="mt-3 flex gap-2">
            <button id="searchBtn" class="btn btn-primary bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded text-sm transition">ค้นหา</button>
            <button id="clearBtn" class="btn btn-secondary bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 px-4 py-2 rounded text-sm transition">ล้าง</button>
          </div>
        </div>

        <!-- Table -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-purple-50 dark:bg-purple-900/30">
              <tr>
                <th class="px-3 py-2"><input type="checkbox" id="selectAll"></th>
                <th class="px-3 py-2 text-left">สถานะ</th>
                <th class="px-3 py-2 text-left">เลขที่ลงทะเบียน/วันที่</th>
                <th class="px-3 py-2 text-left">เลขที่รับ/วันที่รับ</th>
                <th class="px-3 py-2 text-left">เลขขอเบิก/ฎีกา</th>
                <th class="px-3 py-2 text-left">ประเภท/หน่วยงาน</th>
                <th class="px-3 py-2 text-left">ผู้ส่ง/ผู้ตรวจ</th>
                <th class="px-3 py-2 text-left">ใบกัน/จำนวนกัน</th>
                <th class="px-3 py-2 text-left">Invoice/e-GP</th>
                <th class="px-3 py-2 text-left">เจ้าหนี้/รายการ</th>
                <th class="px-3 py-2 text-right">จำนวนเงิน</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr><td colspan="11" class="text-center py-8 text-gray-500 dark:text-gray-400">กรุณาค้นหาข้อมูล</td></tr>
            </tbody>
          </table>
          <div id="pagination" class="flex justify-between items-center px-4 py-3 border-t border-gray-200 dark:border-gray-700 hidden"></div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { loadLayout, requireRole, formatThaiDate, formatCurrency, showToast, showLoading, hideLoading, getCurrentUser } from './js/app.js';
    import { register, settings, statusMap, statusColors } from './js/api.js';

    let currentData = [];
    let selectedUuids = [];
    let moneyTypes = [];
    let depts = [];

    async function loadFilters() {
      try {
        const [mtRes, deptRes] = await Promise.all([
          settings.get('money_type'),
          settings.get('dept'),
        ]);
        if (mtRes.success) {
          moneyTypes = mtRes.data;
          const sel = document.getElementById('filterMoneyType');
          moneyTypes.forEach(mt => {
            const opt = document.createElement('option');
            opt.value = mt.name;
            opt.textContent = mt.name;
            sel.appendChild(opt);
          });
        }
        if (deptRes.success) {
          depts = deptRes.data;
          const sel = document.getElementById('filterDept');
          depts.forEach(d => {
            const opt = document.createElement('option');
            opt.value = d.name;
            opt.textContent = d.name;
            sel.appendChild(opt);
          });
        }
      } catch (e) {
        console.error('Failed to load filters:', e);
      }
    }

    async function loadData() {
      showLoading('กำลังโหลด...');
      try {
        const user = getCurrentUser();
        const status = document.getElementById('filterStatus').value;
        const moneyType = document.getElementById('filterMoneyType').value;
        const dept = document.getElementById('filterDept').value;
        const sender = document.getElementById('filterSender').value;
        const vendor = document.getElementById('filterVendor').value;

        let params = { limit: 1000, page: 1 };
        if (status) params.status = status;
        else params.status = 'CHECKUP,EDITING';
        if (moneyType) params.money_type = moneyType;
        if (dept) params.dept = dept;
        if (sender) params.sender = sender;
        if (vendor) params.vendor = vendor;

        if (user.role === 'editor') {
          params.editor = user.email;
        }

        const res = await register.list(params);
        if (!res.success) throw new Error(res.error);
        currentData = res.data.data || [];
        renderTable();
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        hideLoading();
      }
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      if (!currentData.length) {
        tbody.innerHTML = `<tr><td colspan="11" class="text-center py-8 text-gray-500 dark:text-gray-400">ไม่พบข้อมูล</td></tr>`;
        document.getElementById('pagination').classList.add('hidden');
        return;
      }

      let html = '';
      selectedUuids = [];
      for (const item of currentData) {
        const statusThai = statusMap[item.status] || item.status;
        const statusClass = statusColors[item.status] || 'bg-gray-100 text-gray-700';
        const disabled = item.status !== 'CHECKUP' && item.status !== 'EDITING';
        html += `
          <tr class="border-b border-gray-100 dark:border-gray-700 hover:bg-purple-50 dark:hover:bg-gray-700/50">
            <td class="px-3 py-2 text-center">
              <input type="checkbox" class="row-checkbox" data-uuid="${item.uuid}" ${disabled ? 'disabled' : ''}>
            </td>
            <td class="px-3 py-2"><span class="status-badge ${statusClass}">${statusThai}</span></td>
            <td class="px-3 py-2">
              <div class="font-medium">${item.register_no_display || '-'}</div>
              <div class="text-xs text-gray-500">${formatThaiDate(item.register_date)}</div>
            </td>
            <td class="px-3 py-2">
              <div>${item.receive_no_display || '-'}</div>
              <div class="text-xs text-gray-500">${formatThaiDate(item.receive_date)}</div>
            </td>
            <td class="px-3 py-2">
              <div>${item.request_no_display || '-'}</div>
              <div class="text-xs text-gray-500">ฎีกา: ${item.dk_no_display || '-'}</div>
            </td>
            <td class="px-3 py-2">
              <div>${item.money_type || '-'}</div>
              <div class="text-xs text-gray-500">${item.dept || '-'}</div>
            </td>
            <td class="px-3 py-2">
              <div>${item.sender || '-'}</div>
              <div class="text-xs text-gray-500">${item.editor || '-'}</div>
            </td>
            <td class="px-3 py-2">
              <div>${item.reserve_no || '-'}</div>
              <div class="text-xs">${item.reserve_amount ? formatCurrency(item.reserve_amount) : '-'}</div>
            </td>
            <td class="px-3 py-2">
              <div>${item.invoice || '-'}</div>
              <div class="text-xs">${item.egp_no || '-'}</div>
            </td>
            <td class="px-3 py-2">
              <div class="font-medium">${item.vendor || '-'}</div>
              <div class="text-xs truncate max-w-xs">${item.description || '-'}</div>
            </td>
            <td class="px-3 py-2 text-right font-bold text-purple-600 dark:text-purple-400">${formatCurrency(item.amount)}</td>
          </tr>
        `;
      }
      tbody.innerHTML = html;

      document.querySelectorAll('.row-checkbox').forEach(cb => {
        cb.addEventListener('change', updateSelection);
      });
      document.getElementById('selectAll').addEventListener('change', function() {
        document.querySelectorAll('.row-checkbox:not(:disabled)').forEach(cb => cb.checked = this.checked);
        updateSelection();
      });

      document.getElementById('pagination').classList.remove('hidden');
      document.getElementById('pagination').innerHTML = `<span class="text-sm text-gray-500 dark:text-gray-400">พบ ${currentData.length} รายการ</span>`;
    }

    function updateSelection() {
      selectedUuids = [];
      document.querySelectorAll('.row-checkbox:checked').forEach(cb => {
        selectedUuids.push(cb.dataset.uuid);
      });
      document.getElementById('editBtn').disabled = selectedUuids.length === 0;
      document.getElementById('returnBtn').disabled = selectedUuids.length === 0;
      document.getElementById('passBtn').disabled = selectedUuids.length === 0;
    }

    // Edit
    document.getElementById('editBtn').addEventListener('click', async () => {
      if (selectedUuids.length === 0) return;
      const confirm = await Swal.fire({
        title: 'ส่งแก้ไข',
        text: `จะส่ง ${selectedUuids.length} รายการไปแก้ไข`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'ยืนยัน',
        cancelButtonText: 'ยกเลิก',
      });
      if (!confirm.isConfirmed) return;

      showLoading('กำลังดำเนินการ...');
      try {
        const res = await register.edit(selectedUuids);
        if (!res.success) throw new Error(res.error);
        showToast(`ส่งแก้ไข ${res.data.edited} รายการสำเร็จ`, 'success');
        loadData();
      } catch (err) {
        showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
      } finally {
        hideLoading();
      }
    });

    // Return
    document.getElementById('returnBtn').addEventListener('click', async () => {
      if (selectedUuids.length === 0) return;
      const confirm = await Swal.fire({
        title: 'รับคืน',
        text: `จะรับคืน ${selectedUuids.length} รายการ`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'ยืนยัน',
        cancelButtonText: 'ยกเลิก',
      });
      if (!confirm.isConfirmed) return;

      showLoading('กำลังดำเนินการ...');
      try {
        const res = await register.return(selectedUuids);
        if (!res.success) throw new Error(res.error);
        showToast(`รับคืน ${res.data.returned} รายการสำเร็จ`, 'success');
        loadData();
      } catch (err) {
        showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
      } finally {
        hideLoading();
      }
    });

    // Pass
    document.getElementById('passBtn').addEventListener('click', async () => {
      if (selectedUuids.length === 0) return;

      const dkInputs = {};
      for (const uuid of selectedUuids) {
        const item = currentData.find(d => d.uuid === uuid);
        if (!item) continue;
        const { value } = await Swal.fire({
          title: `กรอกเลขที่ฎีกา`,
          html: `รายการ: ${item.vendor} - ${item.description || 'ไม่มี'}`,
          input: 'text',
          inputLabel: 'เลขที่ฎีกา (เช่น 1801/69)',
          inputValue: item.dk_no_display || '',
          showCancelButton: true,
          confirmButtonText: 'ตกลง',
          cancelButtonText: 'ข้าม',
          inputValidator: (val) => {
            if (!val) return 'กรุณากรอกเลขที่ฎีกา';
            const parts = val.split('/');
            if (parts.length !== 2 || isNaN(parts[0]) || isNaN(parts[1])) {
              return 'รูปแบบไม่ถูกต้อง (ต้องเป็น 1801/69)';
            }
            return null;
          }
        });
        if (value) dkInputs[uuid] = value;
        else return;
      }

      const dkList = Object.entries(dkInputs).map(([uuid, dk]) => ({
        uuid,
        dk_no_raw: dk,
        dk_no_display: dk,
      }));

      const confirm = await Swal.fire({
        title: 'ตรวจผ่าน',
        text: `จะตรวจผ่าน ${selectedUuids.length} รายการ`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'ยืนยัน',
        cancelButtonText: 'ยกเลิก',
      });
      if (!confirm.isConfirmed) return;

      showLoading('กำลังดำเนินการ...');
      try {
        const res = await register.pass(selectedUuids, dkList);
        if (!res.success) throw new Error(res.error);
        showToast(`ตรวจผ่าน ${res.data.passed} รายการสำเร็จ`, 'success');
        loadData();
      } catch (err) {
        showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
      } finally {
        hideLoading();
      }
    });

    // Print
    document.getElementById('printEditBtn').addEventListener('click', () => window.print());

    // Search
    document.getElementById('searchBtn').addEventListener('click', loadData);
    document.getElementById('clearBtn').addEventListener('click', () => {
      document.getElementById('filterStatus').value = '';
      document.getElementById('filterMoneyType').value = '';
      document.getElementById('filterDept').value = '';
      document.getElementById('filterSender').value = '';
      document.getElementById('filterVendor').value = '';
      loadData();
    });

    // Init
    const user = requireRole(['admin', 'manager', 'editor']);
    if (user) {
      await loadLayout();
      await loadFilters();
      loadData();
    }
  </script>
</body>
</html>
