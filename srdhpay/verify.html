<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>บันทึกการตรวจสอบ - SRDH PAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="icons/srdhpay-192.png">
</head>
<body class="bg-gray-50 dark:bg-gray-900">
    <div id="sidebar-container"></div>
    <div id="header-container"></div>
    <main class="p-4 md:p-6 transition-all duration-300" id="main-content">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-800 dark:text-white">บันทึกการตรวจสอบ</h1>
            <p class="text-gray-600 dark:text-gray-400">บันทึกการตรวจสอบ การแก้ไข และรับคืน</p>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-wrap gap-3 mb-6">
            <button id="editBtn" class="btn-primary" disabled><i class="fas fa-edit mr-2"></i>แก้ไข → บันทึกแก้ไข</button>
            <button id="returnBtn" class="btn-primary" disabled><i class="fas fa-undo-alt mr-2"></i>รับคืน → บันทึกรับคืน</button>
            <button id="passBtn" class="btn-primary bg-purple-700" disabled><i class="fas fa-check-double mr-2"></i>ตรวจผ่าน → บันทึกการตรวจ</button>
            <button id="printEditBtn" class="btn-secondary"><i class="fas fa-print mr-2"></i>พิมพ์ใบส่งแก้ไข</button>
        </div>

        <!-- Filters -->
        <div class="card p-4 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
                <select id="filterStatus" class="form-input">
                    <option value="">ทั้งหมด (สถานะ)</option>
                    <option value="ตรวจสอบ">ตรวจสอบ</option>
                    <option value="ส่งแก้ไข">ส่งแก้ไข</option>
                </select>
                <select id="filterMoneyType" class="form-input"><option value="">ประเภทเงิน</option></select>
                <select id="filterDept" class="form-input"><option value="">หน่วยงาน</option></select>
                <input type="text" id="filterSender" class="form-input" placeholder="ผู้ส่งเอกสาร">
                <input type="text" id="filterVendor" class="form-input" placeholder="ชื่อเจ้าหนี้/บริษัท">
            </div>
            <div class="flex justify-end mt-3"><button id="resetFilters" class="btn-secondary text-sm">ล้างค่า</button></div>
        </div>

        <!-- Desktop Table -->
        <div class="desktop-only card overflow-x-auto">
            <table class="data-table min-w-full">
                <thead>
                    <tr><th><input type="checkbox" id="selectAll"></th><th>เลขที่ลงทะเบียน/เลขที่รับ</th><th>เลขที่ใบขอเบิก/ประเภทเงิน</th><th>ชื่อเจ้าหนี้/บริษัท</th><th>รายการ</th><th>จำนวนเงินขอเบิก</th><th>หน่วยงาน/ผู้ส่งเอกสาร</th><th>สถานะ</th></tr>
                </thead>
                <tbody id="tableBody"><tr><td colspan="8" class="text-center">กำลังโหลด...</td></tr></tbody>
            </table>
        </div>

        <!-- Mobile Cards -->
        <div id="mobileCards" class="mobile-only mobile-card-list"></div>

        <!-- Pagination -->
        <div class="flex justify-between mt-4"><button id="prevPage" class="btn-secondary" disabled>« ก่อนหน้า</button><span id="pageInfo">หน้า 1</span><button id="nextPage" class="btn-secondary" disabled>ถัดไป »</button></div>
    </main>

    <!-- Modal: แก้ไขรายการ -->
    <div id="editModal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6">
            <h3 class="text-xl font-bold mb-4">แก้ไขรายการ</h3>
            <form id="editForm" class="space-y-3">
                <input type="hidden" id="editUUID">
                <div><label class="form-label">เลขที่ใบขอเบิก</label><input type="text" id="editRequestNo" class="form-input"></div>
                <div><label class="form-label">เลขที่ฎีกา</label><input type="text" id="editDkNo" class="form-input"></div>
                <div><label class="form-label">ชื่อเจ้าหนี้/บริษัท</label><input type="text" id="editVendor" class="form-input"></div>
                <div><label class="form-label">จำนวนเงินขอเบิก</label><input type="number" id="editAmount" class="form-input" step="0.01"></div>
                <div><label class="form-label">รายการ</label><textarea id="editDescription" class="form-input" rows="2"></textarea></div>
                <div><label class="form-label">หมายเหตุ (ถ้ามี)</label><input type="text" id="editNote" class="form-input" placeholder="เพิ่มเติม"></div>
                <div class="flex gap-3"><button type="submit" class="btn-primary">บันทึกการแก้ไข</button><button type="button" id="closeEditModal" class="btn-secondary">ยกเลิก</button></div>
            </form>
        </div>
    </div>

    <!-- Modal: ตรวจผ่าน (กรอกเลขที่ฎีกา) -->
    <div id="passModal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl max-w-md w-full p-6">
            <h3 class="text-xl font-bold mb-4">ตรวจผ่าน</h3>
            <p class="mb-2">กรุณาระบุเลขที่ฎีกาสำหรับรายการที่เลือก</p>
            <div id="dkFields" class="space-y-2 max-h-64 overflow-y-auto mb-4"></div>
            <div class="flex gap-3"><button id="confirmPass" class="btn-primary">ยืนยัน</button><button id="cancelPass" class="btn-secondary">ยกเลิก</button></div>
        </div>
    </div>

    <script src="js/api-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/verify.js"></script>
    <script>
        (async function() {
            const authorized = await requireAuth(['admin','manager','editor']);
            if (!authorized) return;
            initVerifyPage();
        })();
    </script>
</body>
</html>
