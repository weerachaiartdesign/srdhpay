<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตั้งค่าผู้ใช้งาน - SRDH PAY</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { font-family: 'Prompt', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
  <div id="header-container"></div>
  <div class="flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 p-4 md:p-6 overflow-y-auto">
      <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-4">
          <div>
            <h1 class="text-2xl font-bold text-gray-800 dark:text-white">ตั้งค่าผู้ใช้งาน</h1>
            <p class="text-gray-600 dark:text-gray-400">จัดการข้อมูลผู้ใช้งาน</p>
          </div>
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-gray-200 dark:border-gray-700 mb-4">
          <button id="tabProfile" class="px-4 py-2 text-sm font-medium text-purple-600 border-b-2 border-purple-600 dark:text-purple-400 dark:border-purple-400">ข้อมูลส่วนตัว</button>
          <button id="tabUsers" class="px-4 py-2 text-sm font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300">จัดการผู้ใช้</button>
        </div>

        <!-- Profile Section -->
        <div id="profileSection" class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 max-w-xl">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">อีเมล</label>
              <input type="text" id="profileEmail" disabled class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">รหัสผ่าน</label>
              <div class="flex gap-2">
                <input type="password" id="profilePassword" value="********" disabled class="flex-1 border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400">
                <button id="changePasswordBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded text-sm transition">เปลี่ยนรหัส</button>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">ชื่อ-สกุล</label>
              <input type="text" id="profileUsername" class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-white dark:bg-gray-700 dark:text-white">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">ตำแหน่ง</label>
              <input type="text" id="profilePosition" class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-white dark:bg-gray-700 dark:text-white">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">หน่วยงาน</label>
              <input type="text" id="profileDept" disabled class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">สิทธิ์</label>
              <input type="text" id="profileRole" disabled class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400">
            </div>
            <button id="saveProfileBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded text-sm transition">บันทึกข้อมูล</button>
          </div>
        </div>

        <!-- Users Management Section -->
        <div id="usersSection" class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 hidden">
          <div class="flex justify-between items-center mb-4">
            <div>
              <span class="text-sm text-gray-500 dark:text-gray-400" id="userStats">กำลังโหลด...</span>
            </div>
            <button id="addUserBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded text-sm transition">+ เพิ่มผู้ใช้ใหม่</button>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-purple-50 dark:bg-purple-900/30">
                <tr>
                  <th class="px-3 py-2 text-left">อีเมล</th>
                  <th class="px-3 py-2 text-left">ชื่อ-สกุล</th>
                  <th class="px-3 py-2 text-left">หน่วยงาน</th>
                  <th class="px-3 py-2 text-center">สถานะ</th>
                  <th class="px-3 py-2 text-center">การจัดการ</th>
                </tr>
              </thead>
              <tbody id="usersBody">
                <tr><td colspan="5" class="text-center py-8 text-gray-500 dark:text-gray-400">กำลังโหลด...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { loadLayout, requireAuth, formatThaiDate, showToast, showLoading, hideLoading, getCurrentUser } from './js/app.js';
    import { users, auth, settings } from './js/api.js';

    let currentUser = getCurrentUser();
    let userList = [];

    async function loadProfile() {
      try {
        const res = await auth.me();
        if (!res.success) throw new Error(res.error);
        const user = res.data;
        document.getElementById('profileEmail').value = user.email || '';
        document.getElementById('profileUsername').value = user.username || '';
        document.getElementById('profilePosition').value = user.position || '';
        document.getElementById('profileDept').value = user.dept || '';
        const roleMap = {
          admin: 'ผู้ดูแลระบบ',
          manager: 'ผู้จัดการ',
          editor: 'ผู้ตรวจ',
          checker: 'ผู้จ่าย',
          staff: 'เจ้าหน้าที่',
          guest: 'ผู้เยี่ยมชม',
        };
        document.getElementById('profileRole').value = roleMap[user.role] || user.role;
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function loadUsers() {
      showLoading('กำลังโหลด...');
      try {
        const res = await users.list();
        if (!res.success) throw new Error(res.error);
        userList = res.data || [];
        renderUsers();
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        hideLoading();
      }
    }

    function renderUsers() {
      const tbody = document.getElementById('usersBody');
      if (!userList.length) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-gray-500 dark:text-gray-400">ไม่มีผู้ใช้งาน</td></tr>`;
        document.getElementById('userStats').textContent = 'ไม่มีข้อมูล';
        return;
      }
      let html = '';
      let activeCount = 0;
      for (const u of userList) {
        if (u.active === 1) activeCount++;
        const roleMap = {
          admin: 'ผู้ดูแลระบบ',
          manager: 'ผู้จัดการ',
          editor: 'ผู้ตรวจ',
          checker: 'ผู้จ่าย',
          staff: 'เจ้าหน้าที่',
          guest: 'ผู้เยี่ยมชม',
        };
        html += `<tr class="border-b border-gray-100 dark:border-gray-700">
          <td class="px-3 py-2">${u.email}</td>
          <td class="px-3 py-2">${u.username}</td>
          <td class="px-3 py-2">${u.dept || '-'}</td>
          <td class="px-3 py-2 text-center">
            <span class="px-2 py-1 rounded text-xs ${u.active === 1 ? 'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400' : 'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-400'}">
              ${u.active === 1 ? 'ใช้งาน' : 'ปิดใช้งาน'}
            </span>
          </td>
          <td class="px-3 py-2 text-center">
            <div class="flex flex-wrap justify-center gap-1">
              <button class="edit-user-btn text-blue-600 hover:text-blue-800 text-xs" data-id="${u.id}">แก้ไข</button>
              <button class="reset-pwd-btn text-yellow-600 hover:text-yellow-800 text-xs" data-id="${u.id}">รีเซ็ต</button>
              <button class="toggle-user-btn text-${u.active === 1 ? 'red' : 'green'}-600 hover:text-${u.active === 1 ? 'red' : 'green'}-800 text-xs" data-id="${u.id}">${u.active === 1 ? 'ปิด' : 'เปิด'}</button>
              <button class="delete-user-btn text-red-600 hover:text-red-800 text-xs" data-id="${u.id}">ลบ</button>
            </div>
          </td>
        </tr>`;
      }
      tbody.innerHTML = html;
      document.getElementById('userStats').textContent = `ใช้งาน ${activeCount} / ทั้งหมด ${userList.length}`;

      // Add event listeners
      tbody.querySelectorAll('.edit-user-btn').forEach(btn => {
        btn.addEventListener('click', () => editUser(parseInt(btn.dataset.id)));
      });
      tbody.querySelectorAll('.reset-pwd-btn').forEach(btn => {
        btn.addEventListener('click', () => resetPassword(parseInt(btn.dataset.id)));
      });
      tbody.querySelectorAll('.toggle-user-btn').forEach(btn => {
        btn.addEventListener('click', () => toggleUser(parseInt(btn.dataset.id)));
      });
      tbody.querySelectorAll('.delete-user-btn').forEach(btn => {
        btn.addEventListener('click', () => deleteUser(parseInt(btn.dataset.id)));
      });
    }

    async function editUser(id) {
      const user = userList.find(u => u.id === id);
      if (!user) return;
      const { value: formValues } = await Swal.fire({
        title: 'แก้ไขผู้ใช้',
        html: `
          <div class="text-left">
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">ชื่อ-สกุล</label>
            <input id="editUsername" class="w-full border rounded px-3 py-2 mt-1" value="${user.username}">
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mt-3">ตำแหน่ง</label>
            <input id="editPosition" class="w-full border rounded px-3 py-2 mt-1" value="${user.position || ''}">
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mt-3">หน่วยงาน</label>
            <input id="editDept" class="w-full border rounded px-3 py-2 mt-1" value="${user.dept || ''}">
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mt-3">สิทธิ์</label>
            <select id="editRole" class="w-full border rounded px-3 py-2 mt-1">
              <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>ผู้ดูแลระบบ</option>
              <option value="manager" ${user.role === 'manager' ? 'selected' : ''}>ผู้จัดการ</option>
              <option value="editor" ${user.role === 'editor' ? 'selected' : ''}>ผู้ตรวจ</option>
              <option value="checker" ${user.role === 'checker' ? 'selected' : ''}>ผู้จ่าย</option>
              <option value="staff" ${user.role === 'staff' ? 'selected' : ''}>เจ้าหน้าที่</option>
            </select>
          </div>
        `,
        showCancelButton: true,
        confirmButtonText: 'บันทึก',
        cancelButtonText: 'ยกเลิก',
        preConfirm: () => {
          return {
            username: document.getElementById('editUsername').value,
            position: document.getElementById('editPosition').value,
            dept: document.getElementById('editDept').value,
            role: document.getElementById('editRole').value,
          };
        }
      });
      if (!formValues) return;

      showLoading('กำลังบันทึก...');
      try {
        const res = await users.update(id, formValues);
        if (!res.success) throw new Error(res.error);
        showToast('บันทึกสำเร็จ', 'success');
        loadUsers();
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        hideLoading();
      }
    }

    async function resetPassword(id) {
      const user = userList.find(u => u.id === id);
      if (!user) return;
      const confirm = await Swal.fire({
        title: 'รีเซ็ตรหัสผ่าน',
        text: `จะรีเซ็ตรหัสผ่านสำหรับ ${user.email}`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'ยืนยัน',
        cancelButtonText: 'ยกเลิก',
      });
      if (!confirm.isConfirmed) return;
      showLoading('กำลังดำเนินการ...');
      try {
        const res = await users.resetPassword(user.email);
        if (!res.success) throw new Error(res.error);
        showToast('รีเซ็ตรหัสผ่านสำเร็จ', 'success');
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        hideLoading();
      }
    }

    async function toggleUser(id) {
      const user = userList.find(u => u.id === id);
      if (!user) return;
      const newStatus = user.active === 1 ? 0 : 1;
      const confirm = await Swal.fire({
        title: newStatus === 0 ? 'ปิดใช้งาน' : 'เปิดใช้งาน',
        text: `จะ${newStatus === 0 ? 'ปิด' : 'เปิด'}ใช้งาน ${user.email}`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'ยืนยัน',
        cancelButtonText: 'ยกเลิก',
      });
      if (!confirm.isConfirmed) return;
      showLoading('กำลังดำเนินการ...');
      try {
        const res = await users.update(id, { active: newStatus });
        if (!res.success) throw new Error(res.error);
        showToast('สำเร็จ', 'success');
        loadUsers();
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        hideLoading();
      }
    }

    async function deleteUser(id) {
      const user = userList.find(u => u.id === id);
      if (!user) return;
      if (user.email === currentUser.email) {
        showToast('ไม่สามารถลบตัวเองได้', 'error');
        return;
      }
      const confirm = await Swal.fire({
        title: 'ลบผู้ใช้',
        text: `จะลบ ${user.email} อย่างถาวร`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'ลบ',
        cancelButtonText: 'ยกเลิก',
        confirmButtonColor: '#d33',
      });
      if (!confirm.isConfirmed) return;
      showLoading('กำลังดำเนินการ...');
      try {
        const res = await users.delete(id);
        if (!res.success) throw new Error(res.error);
        showToast('ลบสำเร็จ', 'success');
        loadUsers();
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        hideLoading();
      }
    }

    async function addUser() {
      const { value: formValues } = await Swal.fire({
        title: 'เพิ่มผู้ใช้ใหม่',
        html: `
          <div class="text-left">
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">อีเมล *</label>
            <input id="addEmail" class="w-full border rounded px-3 py-2 mt-1" type="email" placeholder="user@example.com">
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mt-3">รหัสผ่าน *</label>
            <input id="addPassword" class="w-full border rounded px-3 py-2 mt-1" type="password" placeholder="••••••••">
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mt-3">ชื่อ-สกุล *</label>
            <input id="addUsername" class="w-full border rounded px-3 py-2 mt-1" placeholder="ชื่อ-สกุล">
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mt-3">ตำแหน่ง</label>
            <input id="addPosition" class="w-full border rounded px-3 py-2 mt-1" placeholder="ตำแหน่ง">
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mt-3">หน่วยงาน *</label>
            <input id="addDept" class="w-full border rounded px-3 py-2 mt-1" placeholder="หน่วยงาน">
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mt-3">สิทธิ์ *</label>
            <select id="addRole" class="w-full border rounded px-3 py-2 mt-1">
              <option value="admin">ผู้ดูแลระบบ</option>
              <option value="manager">ผู้จัดการ</option>
              <option value="editor">ผู้ตรวจ</option>
              <option value="checker">ผู้จ่าย</option>
              <option value="staff" selected>เจ้าหน้าที่</option>
            </select>
          </div>
        `,
        showCancelButton: true,
        confirmButtonText: 'เพิ่ม',
        cancelButtonText: 'ยกเลิก',
        preConfirm: () => {
          const email = document.getElementById('addEmail').value;
          const password = document.getElementById('addPassword').value;
          const username = document.getElementById('addUsername').value;
          const dept = document.getElementById('addDept').value;
          const role = document.getElementById('addRole').value;
          if (!email || !password || !username || !dept) {
            Swal.showValidationMessage('กรุณากรอกข้อมูลให้ครบ (*)');
            return;
          }
          return {
            email,
            password,
            username,
            position: document.getElementById('addPosition').value,
            dept,
            role,
          };
        }
      });
      if (!formValues) return;

      showLoading('กำลังเพิ่ม...');
      try {
        const res = await users.create(formValues);
        if (!res.success) throw new Error(res.error);
        showToast('เพิ่มผู้ใช้สำเร็จ', 'success');
        loadUsers();
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        hideLoading();
      }
    }

    // Save profile
    document.getElementById('saveProfileBtn').addEventListener('click', async () => {
      const username = document.getElementById('profileUsername').value;
      const position = document.getElementById('profilePosition').value;
      if (!username) {
        showToast('กรุณากรอกชื่อ-สกุล', 'error');
        return;
      }
      showLoading('กำลังบันทึก...');
      try {
        const res = await users.update(currentUser.id, { username, position });
        if (!res.success) throw new Error(res.error);
        showToast('บันทึกข้อมูลสำเร็จ', 'success');
        // Update current user
        currentUser.username = username;
        localStorage.setItem('srdh_user', JSON.stringify(currentUser));
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        hideLoading();
      }
    });

    // Change password
    document.getElementById('changePasswordBtn').addEventListener('click', async () => {
      const { value: newPassword } = await Swal.fire({
        title: 'เปลี่ยนรหัสผ่าน',
        input: 'password',
        inputLabel: 'รหัสผ่านใหม่',
        inputPlaceholder: '••••••••',
        showCancelButton: true,
        confirmButtonText: 'เปลี่ยน',
        cancelButtonText: 'ยกเลิก',
        inputValidator: (val) => {
          if (!val || val.length < 4) return 'รหัสผ่านต้องมีความยาวอย่างน้อย 4 ตัวอักษร';
        }
      });
      if (!newPassword) return;
      showLoading('กำลังเปลี่ยน...');
      try {
        // We need to update password via API - we can use users.update with password
        const res = await users.update(currentUser.id, { password: newPassword });
        if (!res.success) throw new Error(res.error);
        showToast('เปลี่ยนรหัสผ่านสำเร็จ', 'success');
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        hideLoading();
      }
    });

    // Tab switching
    document.getElementById('tabProfile').addEventListener('click', function() {
      document.getElementById('profileSection').classList.remove('hidden');
      document.getElementById('usersSection').classList.add('hidden');
      this.classList.add('text-purple-600', 'border-purple-600', 'dark:text-purple-400', 'dark:border-purple-400');
      this.classList.remove('text-gray-500', 'dark:text-gray-400');
      document.getElementById('tabUsers').classList.remove('text-purple-600', 'border-purple-600', 'dark:text-purple-400', 'dark:border-purple-400');
      document.getElementById('tabUsers').classList.add('text-gray-500', 'hover:text-gray-700', 'dark:text-gray-400', 'dark:hover:text-gray-300');
    });
    document.getElementById('tabUsers').addEventListener('click', function() {
      document.getElementById('profileSection').classList.add('hidden');
      document.getElementById('usersSection').classList.remove('hidden');
      this.classList.add('text-purple-600', 'border-purple-600', 'dark:text-purple-400', 'dark:border-purple-400');
      this.classList.remove('text-gray-500', 'dark:text-gray-400');
      document.getElementById('tabProfile').classList.remove('text-purple-600', 'border-purple-600', 'dark:text-purple-400', 'dark:border-purple-400');
      document.getElementById('tabProfile').classList.add('text-gray-500', 'hover:text-gray-700', 'dark:text-gray-400', 'dark:hover:text-gray-300');
      loadUsers();
    });

    // Add user
    document.getElementById('addUserBtn').addEventListener('click', addUser);

    // Init
    const user = requireAuth();
    if (user) {
      await loadLayout();
      await loadProfile();
      // If user has permission to manage users, load users but hidden initially
      if (user.role === 'admin' || user.role === 'manager') {
        // Preload users when tab is clicked
      }
    }
  </script>
</body>
</html>
