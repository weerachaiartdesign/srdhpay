<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตั้งค่าผู้ใช้งาน - SRDH PAY</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="min-h-screen">
  <div id="header-placeholder"></div>
  <div class="flex">
    <div id="sidebar-placeholder"></div>

    <main class="flex-1 p-4 md:p-6 max-w-full overflow-x-hidden space-y-4">
      <div>
        <h2 class="font-display font-bold text-xl">ตั้งค่าผู้ใช้งาน</h2>
        <p class="text-sm text-[var(--color-text-muted)]">จัดการข้อมูลผู้ใช้งาน</p>
      </div>

      <!-- Tabs -->
      <div class="flex gap-2 border-b border-[var(--color-border)]">
        <button id="tabProfile" class="tab-btn px-4 py-2.5 text-sm font-medium border-b-2 border-transparent">ข้อมูลส่วนตัว</button>
        <button id="tabManage" class="tab-btn px-4 py-2.5 text-sm font-medium border-b-2 border-transparent hidden">จัดการผู้ใช้</button>
      </div>

      <!-- ===== ข้อมูลส่วนตัว ===== -->
      <section id="panelProfile" class="card p-5 max-w-xl space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1.5">อีเมล</label>
          <input id="pEmail" disabled class="w-full px-3.5 py-2.5 rounded-lg border border-[var(--color-border)] bg-transparent opacity-60">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5">ชื่อ-สกุล</label>
          <input id="pUsername" class="w-full px-3.5 py-2.5 rounded-lg border border-[var(--color-border)] bg-transparent">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5">ตำแหน่ง</label>
          <input id="pPosition" class="w-full px-3.5 py-2.5 rounded-lg border border-[var(--color-border)] bg-transparent">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium mb-1.5">หน่วยงาน</label>
            <input id="pDept" disabled class="w-full px-3.5 py-2.5 rounded-lg border border-[var(--color-border)] bg-transparent opacity-60">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1.5">สิทธิ์การใช้งาน</label>
            <input id="pRole" disabled class="w-full px-3.5 py-2.5 rounded-lg border border-[var(--color-border)] bg-transparent opacity-60">
          </div>
        </div>
        <button id="btnSaveProfile" class="btn btn-primary">บันทึกข้อมูล</button>

        <div class="pt-4 border-t border-[var(--color-border)]">
          <h3 class="font-medium mb-3">เปลี่ยนรหัสผ่าน</h3>
          <div class="space-y-3">
            <input id="pCurrentPassword" type="password" placeholder="รหัสผ่านเดิม" class="w-full px-3.5 py-2.5 rounded-lg border border-[var(--color-border)] bg-transparent">
            <input id="pNewPassword" type="password" placeholder="รหัสผ่านใหม่" class="w-full px-3.5 py-2.5 rounded-lg border border-[var(--color-border)] bg-transparent">
            <input id="pConfirmPassword" type="password" placeholder="ยืนยันรหัสผ่านใหม่" class="w-full px-3.5 py-2.5 rounded-lg border border-[var(--color-border)] bg-transparent">
            <button id="btnChangePassword" class="btn btn-soft">เปลี่ยนรหัสผ่าน</button>
          </div>
        </div>
      </section>

      <!-- ===== จัดการผู้ใช้ ===== -->
      <section id="panelManage" class="hidden space-y-4">
        <div class="flex flex-wrap items-center gap-3">
          <div class="card px-4 py-2 text-sm">Active: <span id="countActive" class="font-semibold" style="color:var(--color-primary-dark)">0</span></div>
          <div class="card px-4 py-2 text-sm">Inactive: <span id="countInactive" class="font-semibold text-[var(--color-text-muted)]">0</span></div>
          <div class="flex-1"></div>
          <button id="btnAddUser" class="btn btn-primary">+ เพิ่มผู้ใช้ใหม่</button>
        </div>
        <input type="text" id="userSearch" data-search-box placeholder="ค้นหา: อีเมล, ชื่อ, หน่วยงาน"
               class="w-full px-3.5 py-2.5 rounded-lg border border-[var(--color-border)] bg-transparent text-sm">

        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>Email</th><th>ชื่อ-สกุล</th><th>หน่วยงาน</th><th>สิทธิ์</th><th>สถานะ</th><th>การจัดการ</th></tr></thead>
            <tbody id="userTableBody"></tbody>
          </table>
        </div>
        <div id="userCards" class="mobile-cards"></div>
      </section>
    </main>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    if (App.requireLogin()) { App.loadComponents(); init(); }

    const ROLE_LABEL = { admin: 'ผู้ดูแลระบบ', manager: 'ผู้จัดการ', editor: 'ผู้ตรวจ', checker: 'ผู้จ่ายเช็ค', staff: 'เจ้าหน้าที่หน่วยงาน', guest: 'ผู้เยี่ยมชม' };
    let currentUser = null;
    let depts = [];
    let usersData = [];

    async function init() {
      currentUser = App.getUser();
      bindTabs();

      // แสดงแท็บ "จัดการผู้ใช้" เฉพาะ admin และ manager เท่านั้น
      if (['admin', 'manager'].includes(currentUser?.role)) {
        document.getElementById('tabManage').classList.remove('hidden');
      }

      if (currentUser.isGuest) {
        document.getElementById('panelProfile').innerHTML = `<p class="text-sm text-[var(--color-text-muted)]">ผู้เยี่ยมชมไม่มีข้อมูลส่วนตัว</p>`;
        return;
      }

      try {
        const res = await api.get('/api/auth/profile');
        fillProfile(res.data);
      } catch (err) { App.errorAlert(err); }

      bindProfileEvents();

      // เปลี่ยนรหัสผ่านบังคับครั้งแรก -> เปิดแท็บข้อมูลส่วนตัวค้างไว้ และเตือน
      if (sessionStorage.getItem('srdhpay_force_change_password') === '1') {
        App.toast('กรุณาเปลี่ยนรหัสผ่านก่อนใช้งานต่อ', 'warning');
      }

      if (['admin', 'manager'].includes(currentUser.role)) {
        try {
          const dRes = await api.get('/api/settings/depts', { all: '1' });
          depts = dRes.data.filter((d) => d.active);
        } catch { /* ignore */ }
        bindManageEvents();
      }
    }

    function bindTabs() {
      document.getElementById('tabProfile').addEventListener('click', () => switchTab('profile'));
      document.getElementById('tabManage').addEventListener('click', () => switchTab('manage'));
      switchTab('profile');
    }
    function switchTab(tab) {
      // ป้องกัน role ที่ไม่มีสิทธิ์เปิดแท็บจัดการผู้ใช้
      if (tab === 'manage' && !['admin', 'manager'].includes(currentUser?.role)) return;

      document.getElementById('panelProfile').classList.toggle('hidden', tab !== 'profile');
      document.getElementById('panelManage').classList.toggle('hidden', tab !== 'manage');
      document.getElementById('tabProfile').style.borderColor = tab === 'profile' ? 'var(--color-primary)' : 'transparent';
      document.getElementById('tabManage').style.borderColor = tab === 'manage' ? 'var(--color-primary)' : 'transparent';
      if (tab === 'manage' && ['admin', 'manager'].includes(currentUser?.role)) loadUsers();
    }

    function fillProfile(d) {
      document.getElementById('pEmail').value = d.email;
      document.getElementById('pUsername').value = d.username;
      document.getElementById('pPosition').value = d.position || '';
      document.getElementById('pDept').value = d.dept;
      document.getElementById('pRole').value = ROLE_LABEL[d.role] || d.role;
    }

    function bindProfileEvents() {
      document.getElementById('btnSaveProfile').addEventListener('click', async () => {
        try {
          await api.put('/api/auth/profile', {
            username: document.getElementById('pUsername').value.trim(),
            position: document.getElementById('pPosition').value.trim()
          });
          const user = App.getUser();
          user.username = document.getElementById('pUsername').value.trim();
          App.setSession(App.getToken(), user);
          App.toast('บันทึกข้อมูลสำเร็จ', 'success');
        } catch (err) { App.errorAlert(err); }
      });

      document.getElementById('btnChangePassword').addEventListener('click', async () => {
        const current = document.getElementById('pCurrentPassword').value;
        const next = document.getElementById('pNewPassword').value;
        const confirm = document.getElementById('pConfirmPassword').value;
        if (!current || !next) return App.toast('กรุณากรอกรหัสผ่านให้ครบ', 'warning');
        if (next !== confirm) return App.toast('รหัสผ่านใหม่ไม่ตรงกัน', 'warning');
        if (next.length < 4) return App.toast('รหัสผ่านใหม่สั้นเกินไป', 'warning');

        try {
          await api.put('/api/auth/profile', { current_password: current, new_password: next });
          App.toast('เปลี่ยนรหัสผ่านสำเร็จ', 'success');
          ['pCurrentPassword', 'pNewPassword', 'pConfirmPassword'].forEach((id) => document.getElementById(id).value = '');
          if (sessionStorage.getItem('srdhpay_force_change_password') === '1') {
            sessionStorage.removeItem('srdhpay_force_change_password');
            location.href = 'dashboard.html';
          }
        } catch (err) { App.errorAlert(err); }
      });
    }

    /* ===== จัดการผู้ใช้ ===== */
    function bindManageEvents() {
      document.getElementById('btnAddUser').addEventListener('click', () => openUserForm(null));
      document.getElementById('userSearch').addEventListener('input', App.debounce(loadUsers, 400));
    }

    async function loadUsers() {
      document.getElementById('userTableBody').innerHTML = `<tr><td colspan="6"><div class="skeleton h-6 my-1"></div></td></tr>`.repeat(4);
      try {
        const res = await api.get('/api/auth/users', { search: document.getElementById('userSearch').value.trim() });
        usersData = res.data;
        document.getElementById('countActive').textContent = res.active_count;
        document.getElementById('countInactive').textContent = res.inactive_count;
        renderUserTable(); renderUserCards();
      } catch (err) { App.errorAlert(err); }
    }

    function renderUserTable() {
      const tbody = document.getElementById('userTableBody');
      if (usersData.length === 0) { tbody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-[var(--color-text-muted)]">ไม่พบผู้ใช้</td></tr>`; return; }
      tbody.innerHTML = usersData.map((u) => `
        <tr>
          <td>${u.email}</td>
          <td class="font-medium">${u.username}</td>
          <td>${u.dept}</td>
          <td>${ROLE_LABEL[u.role] || u.role}</td>
          <td>${u.active ? '<span class="badge badge-PASSED">ใช้งาน</span>' : '<span class="badge badge-CANCELLED">ปิดใช้งาน</span>'}</td>
          <td>
            <div class="flex gap-1">
              <button class="btn btn-soft text-xs py-1 px-2" onclick="openUserForm(${u.id})">แก้ไข</button>
              <button class="btn btn-outline text-xs py-1 px-2" onclick="resetPassword(${u.id})">รีเซ็ตรหัส</button>
              ${currentUser.role === 'admin' ? `<button class="btn btn-outline text-xs py-1 px-2 text-red-500" onclick="deleteUser(${u.id}, '${u.username}')">ลบ</button>` : ''}
            </div>
          </td>
        </tr>`).join('');
    }

    function renderUserCards() {
      const wrap = document.getElementById('userCards');
      wrap.innerHTML = usersData.map((u) => `
        <div class="mobile-item-card">
          <div class="flex justify-between mb-1">
            <span class="font-semibold text-sm">${u.username}</span>
            ${u.active ? '<span class="badge badge-PASSED">ใช้งาน</span>' : '<span class="badge badge-CANCELLED">ปิดใช้งาน</span>'}
          </div>
          <div class="text-xs text-[var(--color-text-muted)]">${u.email}</div>
          <div class="text-xs text-[var(--color-text-muted)]">${u.dept} · ${ROLE_LABEL[u.role] || u.role}</div>
          <div class="flex gap-1 mt-2">
            <button class="btn btn-soft text-xs py-1 px-2" onclick="openUserForm(${u.id})">แก้ไข</button>
            <button class="btn btn-outline text-xs py-1 px-2" onclick="resetPassword(${u.id})">รีเซ็ตรหัส</button>
            ${currentUser.role === 'admin' ? `<button class="btn btn-outline text-xs py-1 px-2 text-red-500" onclick="deleteUser(${u.id}, '${u.username}')">ลบ</button>` : ''}
          </div>
        </div>`).join('');
    }

    window.openUserForm = function (id) {
      const isEdit = id !== null;
      const u = isEdit ? usersData.find((x) => x.id === id) : null;
      const deptOptions = depts.map((d) => `<option value="${d.name}" ${u && d.name === u.dept ? 'selected' : ''}>${d.name}</option>`).join('');
      const roleOptions = Object.entries(ROLE_LABEL)
        .filter(([k]) => k !== 'guest')
        .map(([k, label]) => `<option value="${k}" ${u && k === u.role ? 'selected' : ''} ${currentUser.role === 'manager' && k === 'admin' ? 'disabled' : ''}>${label}</option>`).join('');

      Swal.fire({
        title: isEdit ? 'แก้ไขผู้ใช้' : 'เพิ่มผู้ใช้ใหม่',
        width: 520,
        html: `
          <div class="text-left text-sm space-y-3">
            ${!isEdit ? `<div><label class="block mb-1 font-medium">อีเมล *</label><input id="f_email" type="email" class="w-full px-3 py-2 rounded-lg border border-gray-300"></div>` : ''}
            <div><label class="block mb-1 font-medium">ชื่อ-สกุล *</label><input id="f_username" value="${u?.username || ''}" class="w-full px-3 py-2 rounded-lg border border-gray-300"></div>
            <div><label class="block mb-1 font-medium">ตำแหน่ง</label><input id="f_position" value="${u?.position || ''}" class="w-full px-3 py-2 rounded-lg border border-gray-300"></div>
            <div><label class="block mb-1 font-medium">หน่วยงาน *</label><select id="f_dept" class="w-full px-3 py-2 rounded-lg border border-gray-300">${deptOptions}</select></div>
            <div><label class="block mb-1 font-medium">สิทธิ์ *</label><select id="f_role" class="w-full px-3 py-2 rounded-lg border border-gray-300">${roleOptions}</select></div>
            ${!isEdit ? `<div><label class="block mb-1 font-medium">รหัสผ่านชั่วคราว *</label><input id="f_temp_password" type="text" class="w-full px-3 py-2 rounded-lg border border-gray-300"></div>` : ''}
            ${isEdit ? `<label class="flex items-center gap-2"><input type="checkbox" id="f_active" ${u.active ? 'checked' : ''}> เปิดใช้งานบัญชีนี้</label>` : ''}
          </div>`,
        showCancelButton: true, confirmButtonText: isEdit ? 'บันทึก' : 'เพิ่ม', cancelButtonText: 'ยกเลิก', confirmButtonColor: '#9F7AEA',
        preConfirm: () => {
          const payload = {
            username: document.getElementById('f_username').value.trim(),
            position: document.getElementById('f_position').value.trim(),
            dept: document.getElementById('f_dept').value,
            role: document.getElementById('f_role').value
          };
          if (!payload.username || !payload.dept || !payload.role) { Swal.showValidationMessage('กรุณากรอกข้อมูลให้ครบ'); return false; }
          if (!isEdit) {
            payload.email = document.getElementById('f_email').value.trim();
            payload.temp_password = document.getElementById('f_temp_password').value;
            if (!payload.email || !payload.temp_password) { Swal.showValidationMessage('กรุณากรอกอีเมลและรหัสผ่านชั่วคราว'); return false; }
          } else {
            payload.active = document.getElementById('f_active').checked;
          }
          return payload;
        }
      }).then(async (result) => {
        if (!result.isConfirmed) return;
        App.showLoading('กำลังบันทึก...');
        try {
          if (isEdit) await api.put(`/api/auth/users/${id}`, result.value);
          else await api.post('/api/auth/users', result.value);
          App.closeLoading();
          App.toast('บันทึกสำเร็จ', 'success');
          loadUsers();
        } catch (err) { App.closeLoading(); App.errorAlert(err); }
      });
    };

    window.resetPassword = async function (id) {
      const result = await Swal.fire({
        title: 'รีเซ็ตรหัสผ่าน', input: 'text', inputLabel: 'รหัสผ่านใหม่ชั่วคราว',
        showCancelButton: true, confirmButtonText: 'รีเซ็ต', cancelButtonText: 'ยกเลิก', confirmButtonColor: '#9F7AEA',
        inputValidator: (v) => !v && 'กรุณากรอกรหัสผ่าน'
      });
      if (!result.isConfirmed) return;
      try {
        await api.put(`/api/auth/users/${id}`, { reset_password: result.value });
        App.toast('รีเซ็ตรหัสผ่านสำเร็จ ผู้ใช้ต้องเปลี่ยนรหัสในการ login ครั้งถัดไป', 'success');
      } catch (err) { App.errorAlert(err); }
    };

    window.deleteUser = async function (id, name) {
      const result = await Swal.fire({
        title: `ลบผู้ใช้ "${name}"?`, text: 'การลบไม่สามารถย้อนกลับได้', icon: 'warning',
        showCancelButton: true, confirmButtonText: 'ลบ', cancelButtonText: 'ยกเลิก', confirmButtonColor: '#DC2626'
      });
      if (!result.isConfirmed) return;
      try {
        await api.del(`/api/auth/users/${id}`);
        App.toast('ลบผู้ใช้สำเร็จ', 'success');
        loadUsers();
      } catch (err) { App.errorAlert(err); }
    };
  </script>
</body>
</html>
