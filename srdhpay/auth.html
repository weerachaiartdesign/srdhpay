<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตั้งค่าผู้ใช้งาน - SRDH PAY</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { font-family: 'Prompt', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
  <div id="header-container"></div>
  <div class="flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 p-4 md:p-6 overflow-y-auto ml-0 md:ml-64">
      <div class="max-w-7xl mx-auto">
        <div class="mb-6">
          <h1 class="text-2xl font-bold text-gray-800 dark:text-white">ตั้งค่าผู้ใช้งาน</h1>
          <p class="text-gray-600 dark:text-gray-400">จัดการข้อมูลผู้ใช้งาน</p>
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-gray-200 dark:border-gray-700 mb-4">
          <button id="tabProfile" class="px-4 py-2 text-sm font-medium text-purple-600 border-b-2 border-purple-600 dark:text-purple-400 dark:border-purple-400">ข้อมูลส่วนตัว</button>
          <button id="tabUsers" class="px-4 py-2 text-sm font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300">จัดการผู้ใช้</button>
        </div>

        <!-- Profile Section -->
        <div id="profileSection" class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">อีเมล</label>
              <input type="text" id="profileEmail" disabled class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">รหัสผ่าน</label>
              <div class="flex gap-2">
                <input type="password" id="profilePassword" value="••••••••" disabled class="flex-1 border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400">
                <button id="changePasswordBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded text-sm transition">เปลี่ยนรหัส</button>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">ชื่อ-สกุล</label>
              <input type="text" id="profileUsername" class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-white dark:bg-gray-700 dark:text-white">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">ตำแหน่ง</label>
              <input type="text" id="profilePosition" class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-white dark:bg-gray-700 dark:text-white">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">หน่วยงาน</label>
              <input type="text" id="profileDept" disabled class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">สิทธิ์</label>
              <input type="text" id="profileRole" disabled class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400">
            </div>
          </div>
          <div class="mt-4 flex justify-end">
            <button id="saveProfileBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded text-sm transition">บันทึก</button>
          </div>
        </div>

        <!-- Users Management Section -->
        <div id="usersSection" class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 hidden">
          <div class="flex justify-between items-center mb-4">
            <div>
              <span class="text-sm text-gray-500 dark:text-gray-400">ผู้ใช้ที่ใช้งาน: <span id="activeCount" class="font-medium text-green-600 dark:text-green-400">0</span></span>
              <span class="text-sm text-gray-500 dark:text-gray-400 ml-4">ไม่ใช้งาน: <span id="inactiveCount" class="font-medium text-red-600 dark:text-red-400">0</span></span>
            </div>
            <button id="addUserBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded text-sm transition flex items-center gap-1">
              <span class="text-lg">+</span> เพิ่มผู้ใช้ใหม่
            </button>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-gray-50 dark:bg-gray-700">
                <tr>
                  <th class="px-3 py-2 text-left">อีเมล</th>
                  <th class="px-3 py-2 text-left">ชื่อ-สกุล</th>
                  <th class="px-3 py-2 text-left">หน่วยงาน</th>
                  <th class="px-3 py-2 text-left">สถานะ</th>
                  <th class="px-3 py-2 text-center">จัดการ</th>
                </tr>
              </thead>
              <tbody id="usersTableBody">
                <tr><td colspan="5" class="text-center py-8 text-gray-500 dark:text-gray-400">กำลังโหลด...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { loadLayout, requireRole, showToast, showLoading, hideLoading } from './js/app.js';
    import { getCurrentUser, users, auth, settings } from './js/api.js';

    let userList = [];

    async function loadProfile() {
      const user = getCurrentUser();
      if (!user) return;
      document.getElementById('profileEmail').value = user.email || '';
      document.getElementById('profileUsername').value = user.username || '';
      document.getElementById('profilePosition').value = user.position || '';
      document.getElementById('profileDept').value = user.dept || '';
      const roleMap = { admin: 'ผู้ดูแลระบบ', manager: 'ผู้จัดการ', editor: 'ผู้ตรวจ', checker: 'ผู้จ่าย', staff: 'เจ้าหน้าที่', guest: 'ผู้เยี่ยมชม' };
      document.getElementById('profileRole').value = roleMap[user.role] || user.role;
    }

    async function loadUsers() {
      showLoading('กำลังโหลดผู้ใช้...');
      try {
        const res = await users.list();
        if (!res.success) throw new Error(res.error);
        userList = res.data || [];
        renderUsers();
      } catch (err) {
        showToast('โหลดผู้ใช้ไม่สำเร็จ: ' + err.message, 'error');
      } finally {
        hideLoading();
      }
    }

    function renderUsers() {
      const tbody = document.getElementById('usersTableBody');
      const active = userList.filter(u => u.active === 1).length;
      const inactive = userList.filter(u => u.active === 0).length;
      document.getElementById('activeCount').textContent = active;
      document.getElementById('inactiveCount').textContent = inactive;

      if (!userList.length) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-gray-500 dark:text-gray-400">ไม่มีผู้ใช้</td></tr>`;
        return;
      }

      let html = '';
      for (const u of userList) {
        const statusText = u.active === 1 ? '✅ ใช้งาน' : '❌ ไม่ใช้งาน';
        const statusClass = u.active === 1 ? 'text-green-600' : 'text-red-600';
        html += `
          <tr class="border-b border-gray-100 dark:border-gray-700">
            <td class="px-3 py-2">${u.email}</td>
            <td class="px-3 py-2">${u.username}</td>
            <td class="px-3 py-2">${u.dept || '-'}</td>
            <td class="px-3 py-2"><span class="${statusClass}">${statusText}</span></td>
            <td class="px-3 py-2 text-center">
              <button class="edit-user-btn text-blue-600 hover:text-blue-800 mr-2" data-id="${u.id}">✏️</button>
              <button class="reset-pwd-btn text-yellow-600 hover:text-yellow-800 mr-2" data-email="${u.email}">🔑</button>
              <button class="delete-user-btn text-red-600 hover:text-red-800" data-id="${u.id}">🗑️</button>
            </td>
          </tr>
        `;
      }
      tbody.innerHTML = html;

      // Event listeners
      tbody.querySelectorAll('.edit-user-btn').forEach(btn => {
        btn.addEventListener('click', () => editUser(parseInt(btn.dataset.id)));
      });
      tbody.querySelectorAll('.reset-pwd-btn').forEach(btn => {
        btn.addEventListener('click', () => resetPassword(btn.dataset.email));
      });
      tbody.querySelectorAll('.delete-user-btn').forEach(btn => {
        btn.addEventListener('click', () => deleteUser(parseInt(btn.dataset.id)));
      });
    }

    async function editUser(id) {
      const u = userList.find(x => x.id === id);
      if (!u) return;
      const roleMap = { admin: 'ผู้ดูแลระบบ', manager: 'ผู้จัดการ', editor: 'ผู้ตรวจ', checker: 'ผู้จ่าย', staff: 'เจ้าหน้าที่', guest: 'ผู้เยี่ยมชม' };
      const roles = ['admin', 'manager', 'editor', 'checker', 'staff', 'guest'];
      const { value: form } = await Swal.fire({
        title: 'แก้ไขผู้ใช้',
        html: `
          <div class="text-left">
            <label class="block text-sm font-medium">ชื่อ-สกุล</label>
            <input id="swal-username" class="w-full border rounded px-3 py-2 mb-2" value="${u.username}">
            <label class="block text-sm font-medium">ตำแหน่ง</label>
            <input id="swal-position" class="w-full border rounded px-3 py-2 mb-2" value="${u.position || ''}">
            <label class="block text-sm font-medium">หน่วยงาน</label>
            <input id="swal-dept" class="w-full border rounded px-3 py-2 mb-2" value="${u.dept || ''}">
            <label class="block text-sm font-medium">สิทธิ์</label>
            <select id="swal-role" class="w-full border rounded px-3 py-2 mb-2">
              ${roles.map(r => `<option value="${r}" ${r === u.role ? 'selected' : ''}>${roleMap[r]}</option>`).join('')}
            </select>
            <label class="block text-sm font-medium">สถานะ</label>
            <select id="swal-active" class="w-full border rounded px-3 py-2">
              <option value="1" ${u.active === 1 ? 'selected' : ''}>ใช้งาน</option>
              <option value="0" ${u.active === 0 ? 'selected' : ''}>ไม่ใช้งาน</option>
            </select>
          </div>
        `,
        showCancelButton: true,
        confirmButtonText: 'บันทึก',
        cancelButtonText: 'ยกเลิก',
        preConfirm: () => ({
          username: document.getElementById('swal-username').value,
          position: document.getElementById('swal-position').value,
          dept: document.getElementById('swal-dept').value,
          role: document.getElementById('swal-role').value,
          active: parseInt(document.getElementById('swal-active').value),
        })
      });
      if (!form) return;

      showLoading('กำลังบันทึก...');
      try {
        const res = await users.update(id, form);
        if (!res.success) throw new Error(res.error);
        showToast('แก้ไขผู้ใช้สำเร็จ', 'success');
        loadUsers();
      } catch (err) {
        showToast('แก้ไขไม่สำเร็จ: ' + err.message, 'error');
      } finally {
        hideLoading();
      }
    }

    async function resetPassword(email) {
      const confirm = await Swal.fire({
        title: 'รีเซ็ตรหัสผ่าน',
        text: `จะรีเซ็ตรหัสผ่านของผู้ใช้ ${email} เป็นค่าเริ่มต้น`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'ยืนยัน',
        cancelButtonText: 'ยกเลิก',
      });
      if (!confirm.isConfirmed) return;

      showLoading('กำลังรีเซ็ต...');
      try {
        const res = await users.resetPassword(email);
        if (!res.success) throw new Error(res.error);
        showToast('รีเซ็ตรหัสผ่านสำเร็จ', 'success');
      } catch (err) {
        showToast('รีเซ็ตไม่สำเร็จ: ' + err.message, 'error');
      } finally {
        hideLoading();
      }
    }

    async function deleteUser(id) {
      const u = userList.find(x => x.id === id);
      if (!u) return;
      const confirm = await Swal.fire({
        title: 'ลบผู้ใช้',
        text: `จะลบผู้ใช้ ${u.username} (${u.email})`,
        icon: 'error',
        showCancelButton: true,
        confirmButtonText: 'ยืนยัน',
        cancelButtonText: 'ยกเลิก',
      });
      if (!confirm.isConfirmed) return;

      showLoading('กำลังลบ...');
      try {
        const res = await users.delete(id);
        if (!res.success) throw new Error(res.error);
        showToast('ลบผู้ใช้สำเร็จ', 'success');
        loadUsers();
      } catch (err) {
        showToast('ลบไม่สำเร็จ: ' + err.message, 'error');
      } finally {
        hideLoading();
      }
    }

    async function addUser() {
      const roleMap = { admin: 'ผู้ดูแลระบบ', manager: 'ผู้จัดการ', editor: 'ผู้ตรวจ', checker: 'ผู้จ่าย', staff: 'เจ้าหน้าที่', guest: 'ผู้เยี่ยมชม' };
      const roles = ['admin', 'manager', 'editor', 'checker', 'staff', 'guest'];
      const { value: form } = await Swal.fire({
        title: 'เพิ่มผู้ใช้ใหม่',
        html: `
          <div class="text-left">
            <label class="block text-sm font-medium">อีเมล</label>
            <input id="swal-email" class="w-full border rounded px-3 py-2 mb-2" type="email" placeholder="user@example.com">
            <label class="block text-sm font-medium">รหัสผ่านชั่วคราว</label>
            <input id="swal-password" class="w-full border rounded px-3 py-2 mb-2" type="text" placeholder="รหัสผ่านเริ่มต้น">
            <label class="block text-sm font-medium">ชื่อ-สกุล</label>
            <input id="swal-username" class="w-full border rounded px-3 py-2 mb-2" placeholder="ชื่อ-สกุล">
            <label class="block text-sm font-medium">ตำแหน่ง</label>
            <input id="swal-position" class="w-full border rounded px-3 py-2 mb-2" placeholder="ตำแหน่ง">
            <label class="block text-sm font-medium">หน่วยงาน</label>
            <input id="swal-dept" class="w-full border rounded px-3 py-2 mb-2" placeholder="หน่วยงาน">
            <label class="block text-sm font-medium">สิทธิ์</label>
            <select id="swal-role" class="w-full border rounded px-3 py-2">
              ${roles.map(r => `<option value="${r}">${roleMap[r]}</option>`).join('')}
            </select>
          </div>
        `,
        showCancelButton: true,
        confirmButtonText: 'เพิ่ม',
        cancelButtonText: 'ยกเลิก',
        preConfirm: () => {
          const email = document.getElementById('swal-email').value;
          const password = document.getElementById('swal-password').value;
          const username = document.getElementById('swal-username').value;
          if (!email || !password || !username) {
            Swal.showValidationMessage('กรุณากรอกอีเมล รหัสผ่าน และชื่อ-สกุล');
            return false;
          }
          return {
            email,
            password,
            username,
            position: document.getElementById('swal-position').value,
            dept: document.getElementById('swal-dept').value,
            role: document.getElementById('swal-role').value,
          };
        }
      });
      if (!form) return;

      showLoading('กำลังเพิ่มผู้ใช้...');
      try {
        const res = await users.create(form);
        if (!res.success) throw new Error(res.error);
        showToast('เพิ่มผู้ใช้สำเร็จ', 'success');
        loadUsers();
      } catch (err) {
        showToast('เพิ่มไม่สำเร็จ: ' + err.message, 'error');
      } finally {
        hideLoading();
      }
    }

    // Tab switching
    document.getElementById('tabProfile').addEventListener('click', function() {
      document.getElementById('profileSection').classList.remove('hidden');
      document.getElementById('usersSection').classList.add('hidden');
      this.classList.add('text-purple-600', 'border-purple-600', 'dark:text-purple-400', 'dark:border-purple-400');
      this.classList.remove('text-gray-500', 'dark:text-gray-400');
      document.getElementById('tabUsers').classList.remove('text-purple-600', 'border-purple-600', 'dark:text-purple-400', 'dark:border-purple-400');
      document.getElementById('tabUsers').classList.add('text-gray-500', 'hover:text-gray-700', 'dark:text-gray-400', 'dark:hover:text-gray-300');
    });
    document.getElementById('tabUsers').addEventListener('click', function() {
      document.getElementById('profileSection').classList.add('hidden');
      document.getElementById('usersSection').classList.remove('hidden');
      this.classList.add('text-purple-600', 'border-purple-600', 'dark:text-purple-400', 'dark:border-purple-400');
      this.classList.remove('text-gray-500', 'dark:text-gray-400');
      document.getElementById('tabProfile').classList.remove('text-purple-600', 'border-purple-600', 'dark:text-purple-400', 'dark:border-purple-400');
      document.getElementById('tabProfile').classList.add('text-gray-500', 'hover:text-gray-700', 'dark:text-gray-400', 'dark:hover:text-gray-300');
      loadUsers();
    });

    // Save profile
    document.getElementById('saveProfileBtn').addEventListener('click', async () => {
      const user = getCurrentUser();
      if (!user) return;
      const data = {
        username: document.getElementById('profileUsername').value,
        position: document.getElementById('profilePosition').value,
      };
      showLoading('กำลังบันทึก...');
      try {
        const res = await users.update(user.id, data);
        if (!res.success) throw new Error(res.error);
        // Update local storage
        const updatedUser = { ...user, ...data };
        localStorage.setItem('srdh_user', JSON.stringify(updatedUser));
        showToast('บันทึกข้อมูลส่วนตัวสำเร็จ', 'success');
        loadProfile();
      } catch (err) {
        showToast('บันทึกไม่สำเร็จ: ' + err.message, 'error');
      } finally {
        hideLoading();
      }
    });

    // Change password
    document.getElementById('changePasswordBtn').addEventListener('click', async () => {
      const { value: newPassword } = await Swal.fire({
        title: 'เปลี่ยนรหัสผ่าน',
        input: 'password',
        inputLabel: 'รหัสผ่านใหม่',
        inputPlaceholder: 'กรอกรหัสผ่านใหม่',
        showCancelButton: true,
        confirmButtonText: 'เปลี่ยน',
        cancelButtonText: 'ยกเลิก',
        inputValidator: (val) => {
          if (!val || val.length < 4) return 'รหัสผ่านต้องมีอย่างน้อย 4 ตัวอักษร';
          return null;
        }
      });
      if (!newPassword) return;

      showLoading('กำลังเปลี่ยนรหัสผ่าน...');
      try {
        const user = getCurrentUser();
        const res = await users.update(user.id, { password: newPassword });
        if (!res.success) throw new Error(res.error);
        showToast('เปลี่ยนรหัสผ่านสำเร็จ', 'success');
      } catch (err) {
        showToast('เปลี่ยนไม่สำเร็จ: ' + err.message, 'error');
      } finally {
        hideLoading();
      }
    });

    document.getElementById('addUserBtn').addEventListener('click', addUser);

    // Init
    const user = requireRole(['admin', 'manager', 'editor', 'checker', 'staff']);
    if (user) {
      await loadLayout();
      loadProfile();
      // If admin or manager, show users tab
      if (['admin', 'manager'].includes(user.role)) {
        document.getElementById('tabUsers').style.display = 'inline-block';
      } else {
        document.getElementById('tabUsers').style.display = 'none';
      }
    }
  </script>
</body>
</html>
