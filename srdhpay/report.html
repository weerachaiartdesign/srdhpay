<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>รายงาน - SRDH PAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="icons/srdhpay-192.png">
</head>
<body class="bg-gray-50 dark:bg-gray-900">
    <div id="sidebar-container"></div>
    <div id="header-container"></div>
    <main class="p-4 md:p-6 transition-all duration-300" id="main-content">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-800 dark:text-white">รายงาน</h1>
            <p class="text-gray-600 dark:text-gray-400">รายงานการเบิกจ่ายเงิน</p>
        </div>

        <!-- Submenu Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <a href="report_type.html" class="card p-6 hover:shadow-lg transition text-center">
                <i class="fas fa-chart-pie text-4xl text-purple-500 mb-3"></i>
                <h3 class="text-xl font-semibold">รายงานการเบิกจ่าย</h3>
                <p class="text-gray-500">สรุปตามประเภทเงิน แยกตามหน่วยงาน</p>
            </a>
            <a href="report_status.html" class="card p-6 hover:shadow-lg transition text-center">
                <i class="fas fa-list-alt text-4xl text-purple-500 mb-3"></i>
                <h3 class="text-xl font-semibold">รายงานสถานะฎีกา</h3>
                <p class="text-gray-500">ฎีการับเข้าระบบ, ส่งแก้ไข, รออนุมัติ</p>
            </a>
        </div>
    </main>

    <script src="js/api-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        (async function() {
            const authorized = await requireAuth(['admin','manager']);
            if (!authorized) return;
        })();
    </script>
</body>
</html>
