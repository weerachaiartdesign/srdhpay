<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตั้งค่าระบบ - SRDH PAY</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { font-family: 'Prompt', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
  <div id="header-container"></div>
  <div class="flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 p-4 md:p-6 overflow-y-auto">
      <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-4">
          <div>
            <h1 class="text-2xl font-bold text-gray-800 dark:text-white">ตั้งค่าระบบ</h1>
            <p class="text-gray-600 dark:text-gray-400">System Management</p>
          </div>
        </div>

        <!-- Tabs -->
        <div class="flex flex-wrap border-b border-gray-200 dark:border-gray-700 mb-4 gap-1">
          <button class="system-tab px-3 py-2 text-sm font-medium text-purple-600 border-b-2 border-purple-600 dark:text-purple-400 dark:border-purple-400" data-tab="permission">Permission</button>
          <button class="system-tab px-3 py-2 text-sm font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300" data-tab="session">Session</button>
          <button class="system-tab px-3 py-2 text-sm font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300" data-tab="audit">Audit Logs</button>
          <button class="system-tab px-3 py-2 text-sm font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300" data-tab="telegram">Telegram</button>
          <button class="system-tab px-3 py-2 text-sm font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300" data-tab="retention">Data Retention</button>
        </div>

        <!-- Content -->
        <div id="systemTabContent" class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
          <!-- Rendered by JS -->
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { loadLayout, requireRole, formatThaiDate, showToast, showLoading, hideLoading } from './js/app.js';
    import { system, audit } from './js/api.js';

    let currentTab = 'permission';

    async function loadSystemTab(tab) {
      currentTab = tab;
      const container = document.getElementById('systemTabContent');
      showLoading('กำลังโหลด...');
      try {
        switch (tab) {
          case 'permission': await renderPermission(container); break;
          case 'session': await renderSession(container); break;
          case 'audit': await renderAudit(container); break;
          case 'telegram': await renderTelegram(container); break;
          case 'retention': await renderRetention(container); break;
          default: container.innerHTML = '<p class="text-gray-500 dark:text-gray-400">เลือกแท็บ</p>';
        }
      } catch (err) {
        showToast(err.message, 'error');
        container.innerHTML = '<p class="text-red-500">เกิดข้อผิดพลาด</p>';
      } finally {
        hideLoading();
      }
    }

    // Permission
    async function renderPermission(container) {
      const res = await system.permission.get();
      if (!res.success) throw new Error(res.error);
      const list = res.data || [];
      let html = `
        <h3 class="text-lg font-semibold text-gray-800 dark:text-white mb-4">Permission Matrix</h3>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-purple-50 dark:bg-purple-900/30">
              <tr>
                <th class="px-3 py-2 text-left">Module</th>
                <th class="px-3 py-2 text-center">Admin</th>
                <th class="px-3 py-2 text-center">Manager</th>
                <th class="px-3 py-2 text-center">Editor</th>
                <th class="px-3 py-2 text-center">Checker</th>
                <th class="px-3 py-2 text-center">Staff</th>
                <th class="px-3 py-2 text-center">Guest</th>
              </tr>
            </thead>
            <tbody>
      `;
      const roles = ['admin', 'manager', 'editor', 'checker', 'staff', 'guest'];
      for (const p of list) {
        html += `<tr class="border-b border-gray-100 dark:border-gray-700">
          <td class="px-3 py-2 font-medium">${p.module}</td>
          ${roles.map(r => `
            <td class="px-3 py-2 text-center">
              <input type="checkbox" class="perm-checkbox" data-id="${p.id}" data-role="${r}" ${p[r] === 1 ? 'checked' : ''}>
            </td>
          `).join('')}
        </tr>`;
      }
      html += `</tbody></table>
        <button id="savePermBtn" class="mt-4 bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded text-sm transition">บันทึก Permission</button>
        </div>`;
      container.innerHTML = html;

      document.getElementById('savePermBtn').addEventListener('click', async () => {
        const checkboxes = container.querySelectorAll('.perm-checkbox');
        const updates = {};
        for (const cb of checkboxes) {
          const id = parseInt(cb.dataset.id);
          const role = cb.dataset.role;
          if (!updates[id]) updates[id] = { id };
          updates[id][role] = cb.checked ? 1 : 0;
        }
        showLoading('กำลังบันทึก...');
        try {
          for (const id in updates) {
            await system.permission.update(parseInt(id), updates[id]);
          }
          showToast('บันทึก Permission สำเร็จ', 'success');
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          hideLoading();
        }
      });
    }

    // Session
    async function renderSession(container) {
      const res = await system.session.get();
      if (!res.success) throw new Error(res.error);
      const data = res.data || [];
      const map = {};
      data.forEach(s => map[s.key] = s.value);

      container.innerHTML = `
        <h3 class="text-lg font-semibold text-gray-800 dark:text-white mb-4">Session Settings</h3>
        <div class="space-y-4 max-w-md">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Guest Timeout (ชั่วโมง)</label>
            <input type="number" id="sessionGuestTimeout" value="${map.session_guest_timeout_hours || 2}" class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Inactivity Logout (นาที)</label>
            <input type="number" id="sessionInactivity" value="${map.session_inactivity_minutes || 30}" class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Token Age (ชั่วโมง)</label>
            <input type="number" id="sessionTokenAge" value="${map.session_token_age_hours || 12}" class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Max Login Retry</label>
            <input type="number" id="sessionMaxRetry" value="${map.session_max_login_retry || 5}" class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2">
          </div>
          <button id="saveSessionBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded text-sm transition">บันทึก</button>
        </div>
      `;

      document.getElementById('saveSessionBtn').addEventListener('click', async () => {
        const updates = [
          { key: 'session_guest_timeout_hours', value: document.getElementById('sessionGuestTimeout').value },
          { key: 'session_inactivity_minutes', value: document.getElementById('sessionInactivity').value },
          { key: 'session_token_age_hours', value: document.getElementById('sessionTokenAge').value },
          { key: 'session_max_login_retry', value: document.getElementById('sessionMaxRetry').value },
        ];
        showLoading('กำลังบันทึก...');
        try {
          for (const u of updates) {
            await system.session.update(u.key, u.value);
          }
          showToast('บันทึก Session Settings สำเร็จ', 'success');
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          hideLoading();
        }
      });
    }

    // Audit
    async function renderAudit(container) {
      container.innerHTML = `
        <h3 class="text-lg font-semibold text-gray-800 dark:text-white mb-4">Audit Logs</h3>
        <div class="flex flex-wrap gap-3 mb-4">
          <select id="auditModule" class="border border-gray-300 dark:border-gray-600 rounded px-3 py-2 text-sm bg-white dark:bg-gray-700 dark:text-white">
            <option value="">ทุกโมดูล</option>
            <option value="register">Register</option>
            <option value="auth">Auth</option>
            <option value="system">System</option>
            <option value="settings">Settings</option>
          </select>
          <select id="auditAction" class="border border-gray-300 dark:border-gray-600 rounded px-3 py-2 text-sm bg-white dark:bg-gray-700 dark:text-white">
            <option value="">ทุก Action</option>
            <option value="import">Import</option>
            <option value="receive">Receive</option>
            <option value="assign_editor">Assign Editor</option>
            <option value="edit_send">Edit Send</option>
            <option value="return">Return</option>
            <option value="pass">Pass</option>
            <option value="propose">Propose</option>
            <option value="approve">Approve</option>
            <option value="pay">Pay</option>
            <option value="cancel">Cancel</option>
            <option value="recover">Recover</option>
            <option value="update">Update</option>
            <option value="admin_override_paid">Admin Override Paid</option>
          </select>
          <button id="auditSearchBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded text-sm transition">ค้นหา</button>
          <button id="auditClearBtn" class="bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 px-4 py-2 rounded text-sm transition">ล้าง</button>
          <button id="auditExportBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm transition">Export CSV</button>
        </div>
        <div id="auditResult" class="overflow-x-auto">
          <p class="text-gray-500 dark:text-gray-400">กรุณาค้นหา</p>
        </div>
      `;

      document.getElementById('auditSearchBtn').addEventListener('click', async () => {
        const module = document.getElementById('auditModule').value;
        const action = document.getElementById('auditAction').value;
        showLoading('กำลังค้นหา...');
        try {
          const params = {};
          if (module) params.module = module;
          if (action) params.action = action;
          const res = await audit.list(params);
          if (!res.success) throw new Error(res.error);
          renderAuditResult(res.data.data || [], res.data.pagination);
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          hideLoading();
        }
      });

      document.getElementById('auditClearBtn').addEventListener('click', () => {
        document.getElementById('auditModule').value = '';
        document.getElementById('auditAction').value = '';
        document.getElementById('auditResult').innerHTML = '<p class="text-gray-500 dark:text-gray-400">กรุณาค้นหา</p>';
      });

      document.getElementById('auditExportBtn').addEventListener('click', () => {
        // Simple export: convert table to CSV
        const table = document.querySelector('#auditResult table');
        if (!table) { showToast('ไม่มีข้อมูล', 'error'); return; }
        let csv = 'Time,User,Action,Detail\n';
        const rows = table.querySelectorAll('tbody tr');
        for (const row of rows) {
          const cells = row.querySelectorAll('td');
          csv += `${cells[0].textContent},${cells[1].textContent},${cells[2].textContent},${cells[3].textContent}\n`;
        }
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `audit_${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('Export CSV สำเร็จ', 'success');
      });
    }

    function renderAuditResult(data, pagination) {
      const container = document.getElementById('auditResult');
      if (!data || !data.length) {
        container.innerHTML = '<p class="text-gray-500 dark:text-gray-400">ไม่พบข้อมูล</p>';
        return;
      }
      let html = `<table class="w-full text-sm">
        <thead class="bg-purple-50 dark:bg-purple-900/30">
          <tr>
            <th class="px-3 py-2 text-left">Time</th>
            <th class="px-3 py-2 text-left">User</th>
            <th class="px-3 py-2 text-left">Action</th>
            <th class="px-3 py-2 text-left">Detail</th>
          </tr>
        </thead>
        <tbody>
      `;
      for (const item of data) {
        html += `<tr class="border-b border-gray-100 dark:border-gray-700">
          <td class="px-3 py-2">${formatThaiDate(item.time)}</td>
          <td class="px-3 py-2">${item.username || item.email || '-'}</td>
          <td class="px-3 py-2">${item.action || '-'}</td>
          <td class="px-3 py-2">${item.detail || '-'}</td>
        </tr>`;
      }
      html += `</tbody></table>`;
      if (pagination) {
        html += `<div class="mt-3 text-sm text-gray-500 dark:text-gray-400">หน้า ${pagination.page} / ${Math.ceil(pagination.total / pagination.limit)} (ทั้งหมด ${pagination.total} รายการ)</div>`;
      }
      container.innerHTML = html;
    }

    // Telegram
    async function renderTelegram(container) {
      const res = await system.telegram.get();
      if (!res.success) throw new Error(res.error);
      const data = res.data || [];
      const map = {};
      data.forEach(s => map[s.key] = s.value);

      container.innerHTML = `
        <h3 class="text-lg font-semibold text-gray-800 dark:text-white mb-4">Telegram Notification</h3>
        <div class="space-y-4 max-w-md">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">เปิดใช้งาน</label>
            <select id="tgEnabled" class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-white dark:bg-gray-700 dark:text-white">
              <option value="1" ${map.telegram_enabled === '1' ? 'selected' : ''}>เปิด</option>
              <option value="0" ${map.telegram_enabled !== '1' ? 'selected' : ''}>ปิด</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Bot Token</label>
            <input type="text" id="tgBotToken" value="${map.telegram_bot_token || ''}" class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Chat ID</label>
            <input type="text" id="tgChatId" value="${map.telegram_chat_id || ''}" class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">แจ้งเตือนเมื่อ:</label>
            <div class="space-y-1">
              ${['import','receive','assign_editor','edit','return','pass','propose','approve','pay','cancel','recovery'].map(event => `
                <label class="flex items-center gap-2">
                  <input type="checkbox" class="tg-notify" data-key="tg_notify_${event}" ${map[`tg_notify_${event}`] === '1' ? 'checked' : ''}>
                  <span class="text-sm">${event.replace('_',' ')}</span>
                </label>
              `).join('')}
            </div>
          </div>
          <button id="saveTelegramBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded text-sm transition">บันทึก</button>
        </div>
      `;

      document.getElementById('saveTelegramBtn').addEventListener('click', async () => {
        const updates = [
          { key: 'telegram_enabled', value: document.getElementById('tgEnabled').value },
          { key: 'telegram_bot_token', value: document.getElementById('tgBotToken').value },
          { key: 'telegram_chat_id', value: document.getElementById('tgChatId').value },
        ];
        document.querySelectorAll('.tg-notify').forEach(cb => {
          updates.push({ key: cb.dataset.key, value: cb.checked ? '1' : '0' });
        });
        showLoading('กำลังบันทึก...');
        try {
          for (const u of updates) {
            await system.telegram.update(u.key, u.value);
          }
          showToast('บันทึก Telegram Settings สำเร็จ', 'success');
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          hideLoading();
        }
      });
    }

    // Retention
    async function renderRetention(container) {
      const res = await system.retention.get();
      if (!res.success) throw new Error(res.error);
      const data = res.data || [];
      const map = {};
      data.forEach(s => map[s.key] = s.value);

      container.innerHTML = `
        <h3 class="text-lg font-semibold text-gray-800 dark:text-white mb-4">Data Retention</h3>
        <div class="space-y-4 max-w-md">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">เปิดใช้งาน</label>
            <select id="retentionEnabled" class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2 bg-white dark:bg-gray-700 dark:text-white">
              <option value="1" ${map.retention_enabled === '1' ? 'selected' : ''}>เปิด</option>
              <option value="0" ${map.retention_enabled !== '1' ? 'selected' : ''}>ปิด</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">ระยะเวลาเก็บข้อมูล (ปี)</label>
            <input type="number" id="retentionYears" value="${map.retention_years || 5}" class="w-full border border-gray-300 dark:border-gray-600 rounded px-3 py-2">
          </div>
          <button id="saveRetentionBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded text-sm transition">บันทึก</button>
          <button id="executeRetentionBtn" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded text-sm transition">ดำเนินการลบข้อมูลเก่า</button>
          <div id="retentionResult" class="text-sm text-gray-500 dark:text-gray-400"></div>
        </div>
      `;

      document.getElementById('saveRetentionBtn').addEventListener('click', async () => {
        const enabled = document.getElementById('retentionEnabled').value;
        const years = document.getElementById('retentionYears').value;
        showLoading('กำลังบันทึก...');
        try {
          await system.retention.update('retention_enabled', enabled);
          await system.retention.update('retention_years', years);
          showToast('บันทึก Retention Settings สำเร็จ', 'success');
        } catch (err) {
          showToast(err.message, 'error');
        } finally {
          hideLoading();
        }
      });

      document.getElementById('executeRetentionBtn').addEventListener('click', async () => {
        const years = parseInt(document.getElementById('retentionYears').value);
        if (!years || years <= 0) { showToast('กรุณาระบุจำนวนปีที่ถูกต้อง', 'error'); return; }
        const confirm = await Swal.fire({
          title: 'ยืนยันการลบข้อมูลเก่า',
          text: `จะลบข้อมูลที่เก่ากว่า ${years} ปี (ข้อมูลจะถูกลบถาวร)`,
          icon: 'warning',
          showCancelButton: true,
          confirmButtonText: 'ยืนยัน',
          cancelButtonText: 'ยกเลิก',
          confirmButtonColor: '#d33',
        });
        if (!confirm.isConfirmed) return;
        showLoading('กำลังดำเนินการ...');
        try {
          const res = await system.retention.execute(years);
          if (!res.success) throw new Error(res.error);
          document.getElementById('retentionResult').innerHTML = `<span class="text-green-600">${res.data.message}</span>`;
          showToast('ดำเนินการสำเร็จ', 'success');
        } catch (err) {
          showToast(err.message, 'error');
          document.getElementById('retentionResult').innerHTML = `<span class="text-red-600">Error: ${err.message}</span>`;
        } finally {
          hideLoading();
        }
      });
    }

    // Tab switching
    document.querySelectorAll('.system-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.system-tab').forEach(t => {
          t.classList.remove('text-purple-600', 'border-purple-600', 'dark:text-purple-400', 'dark:border-purple-400');
          t.classList.add('text-gray-500', 'dark:text-gray-400');
        });
        this.classList.remove('text-gray-500', 'dark:text-gray-400');
        this.classList.add('text-purple-600', 'border-purple-600', 'dark:text-purple-400', 'dark:border-purple-400');
        loadSystemTab(this.dataset.tab);
      });
    });

    // Init
    const user = requireRole(['admin']);
    if (user) {
      await loadLayout();
      loadSystemTab('permission');
    }
  </script>
</body>
</html>
