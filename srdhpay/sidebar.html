  <!-- Script สำหรับแสดงเมนูตาม Role -->
  <script>
    (function() {
      const userStr = localStorage.getItem('srdh_user');
      if (!userStr) return;
      try {
        const user = JSON.parse(userStr);
        const role = user.role || 'guest';
        
        // กำหนด role-based visibility
        const menuConfig = {
          // Guest: เฉพาะ dashboard และ list
          guest: ['menuImport', 'menuReceive', 'menuVerify', 'menuApprove', 'menuPayment', 'menuReport', 'menuAuth', 'menuSettings', 'menuSystem'],
          // Staff: import + dashboard + list
          staff: ['menuSystem'], // ซ่อนเฉพาะ system
          // Editor: import, receive, verify + dashboard + list
          editor: ['menuPayment', 'menuReport', 'menuAuth', 'menuSettings', 'menuSystem'],
          // Checker: import, receive, verify, payment + dashboard + list
          checker: ['menuReport', 'menuAuth', 'menuSettings', 'menuSystem'],
          // Manager: ทุกอย่างยกเว้น system
          manager: ['menuSystem'],
          // Admin: เห็นทุกอย่าง
          admin: [],
        };
        
        const hiddenMenus = menuConfig[role] || menuConfig.guest;
        hiddenMenus.forEach(menuId => {
          const el = document.getElementById(menuId);
          if (el) el.style.display = 'none';
        });
      } catch(e) {
        console.error('Sidebar role config error:', e);
      }
    })();
  </script>
