<!DOCTYPE html>
<html lang="th" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SRDH Pay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center">
        <div class="font-bold text-xl text-primary">SRDH PAY</div>
        <div class="flex items-center gap-4">
            <span id="userName" class="text-sm font-medium text-gray-700"></span>
            <button onclick="logout()" class="text-sm text-red-500 hover:text-red-700">ออกจากระบบ</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="p-6">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-2xl font-bold mb-6">ยินดีต้อนรับสู่ระบบ</h1>
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
                <p>สวัสดีคุณ <span id="userNameDisplay" class="font-bold"></span></p>
                <p class="text-sm text-gray-500 mt-2">แผนก: <span id="userDept"></span> | สิทธิ์: <span id="userRole"></span></p>
            </div>
        </div>
    </main>

    <script>
        // 1. ตรวจสอบ Session ทันทีที่โหลดหน้า
        const userData = JSON.parse(localStorage.getItem('srdh_user'));

        if (!userData) {
            // ถ้าไม่มีข้อมูล ให้ดีดกลับไปหน้า login
            window.location.href = 'index.html';
        } else {
            // ถ้ามี ให้แสดงข้อมูล
            document.getElementById('userName').textContent = userData.username;
            document.getElementById('userNameDisplay').textContent = userData.username;
            document.getElementById('userDept').textContent = userData.dept;
            document.getElementById('userRole').textContent = userData.role;
        }

        // 2. ฟังก์ชัน Logout
        function logout() {
            localStorage.removeItem('srdh_user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
