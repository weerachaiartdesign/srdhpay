<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - SRDH PAY</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { font-family: 'Prompt', sans-serif; }
    .dark body { background-color: #1a1a2e; }
    .stat-card {
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.1);
    }
    .dark .stat-card:hover {
      box-shadow: 0 12px 24px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
  <div id="header-container"></div>
  <div class="flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 p-4 md:p-6 overflow-y-auto">
      <div class="max-w-7xl mx-auto">
        <!-- Page Header -->
        <div class="mb-6">
          <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Dashboard</h1>
          <p class="text-gray-600 dark:text-gray-400" id="fiscalYearText">ภาพรวมการเบิกจ่ายเงิน ปีงบประมาณ 2569</p>
        </div>

        <!-- Summary Cards -->
        <div id="summaryCards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
          <!-- Rendered by JS -->
        </div>

        <!-- Stats Row: Average Time + Progress -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
          <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4 stat-card">
            <p class="text-sm text-gray-500 dark:text-gray-400">ระยะเวลาการดำเนินการเฉลี่ย (รับเรื่อง - อนุมัติ)</p>
            <p class="text-2xl font-bold text-purple-600 dark:text-purple-400" id="avgTime">-- วัน</p>
          </div>
          <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4 stat-card">
            <p class="text-sm text-gray-500 dark:text-gray-400">สถานะการเบิกจ่ายสำเร็จ</p>
            <div class="flex items-center gap-3">
              <div class="flex-1 bg-gray-200 dark:bg-gray-700 rounded-full h-4">
                <div id="progressBar" class="bg-purple-600 h-4 rounded-full transition-all duration-500" style="width: 0%"></div>
              </div>
              <span class="text-lg font-bold text-purple-600 dark:text-purple-400" id="progressText">0%</span>
            </div>
          </div>
        </div>

        <!-- Charts Row -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
          <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4">
            <h3 class="text-lg font-semibold text-gray-800 dark:text-white mb-2">สถิติการเบิกจ่ายแยกตามหน่วยงาน</h3>
            <canvas id="deptChart" height="200"></canvas>
          </div>
          <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4">
            <h3 class="text-lg font-semibold text-gray-800 dark:text-white mb-2">สถิติประเภทการเบิกจ่าย</h3>
            <canvas id="moneyTypeChart" height="200"></canvas>
          </div>
        </div>

        <!-- Monthly Chart -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4">
          <h3 class="text-lg font-semibold text-gray-800 dark:text-white mb-2">จำนวนฎีกาแต่ละเดือน (เปรียบเทียบปีก่อน)</h3>
          <canvas id="monthlyChart" height="200"></canvas>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { loadLayout, requireAuth, formatThaiDate, showLoading, hideLoading, showToast } from './js/app.js';
    import { register, report, getCurrentUser } from './js/api.js';

    let deptChart, moneyTypeChart, monthlyChart;

    async function loadDashboard() {
      showLoading('กำลังโหลดข้อมูล...');
      try {
        // Get report summary
        const summaryRes = await report.summary();
        if (!summaryRes.success) throw new Error(summaryRes.error);

        const data = summaryRes.data;
        renderSummaryCards(data);
        renderDeptChart(data);
        renderMoneyTypeChart(data);

        // Get average time & progress from register list with aggregates
        const listRes = await register.list({ limit: 1, page: 1 });
        // We'll compute average time from all data - for now use summary
        // Actually we need to query for average time separately
        await loadStats();

        // Monthly chart
        await loadMonthlyChart();

      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        hideLoading();
      }
    }

    function renderSummaryCards(data) {
      const container = document.getElementById('summaryCards');
      const { matrix, moneyTypes } = data;

      // Aggregate by money type
      const totals = {};
      for (const dept in matrix) {
        for (const mt in matrix[dept]) {
          if (!totals[mt]) {
            totals[mt] = { total: 0, paid: 0, remaining: 0 };
          }
          totals[mt].total += matrix[dept][mt].total_amount || 0;
          totals[mt].paid += matrix[dept][mt].paid_amount || 0;
          totals[mt].remaining += matrix[dept][mt].remaining_amount || 0;
        }
      }

      // Get color mapping
      // We'll need to fetch money type colors - for now use default
      const colors = {
        'เงินงบประมาณ': '#FFCCFF',
        'เงินบำรุงโรงพยาบาล': '#FFFF99',
        'เงินกองทุนหลักประกันสุขภาพ': '#F8CBAD',
        'เงินอุดหนุน': '#C6EFCE',
        'เงินแพทยศาสตร์': '#BDD7EE',
        'เงินอื่น': '#808080',
      };

      let html = '';
      let count = 0;
      const maxCards = 4; // From settings
      let otherTotal = { total: 0, paid: 0, remaining: 0 };

      for (const mt of moneyTypes) {
        count++;
        if (count <= maxCards && totals[mt]) {
          html += createCard(mt, totals[mt], colors[mt] || '#808080');
        } else if (totals[mt]) {
          otherTotal.total += totals[mt].total;
          otherTotal.paid += totals[mt].paid;
          otherTotal.remaining += totals[mt].remaining;
        }
      }

      // Add "อื่นๆ" if there are others
      if (otherTotal.total > 0) {
        html += createCard('อื่นๆ', otherTotal, '#808080');
      }

      container.innerHTML = html;
    }

    function createCard(name, data, color) {
      const paidCount = data.paid > 0 ? '✓' : '0';
      return `
        <div class="stat-card bg-white dark:bg-gray-800 rounded-lg shadow p-4 border-l-4" style="border-color: ${color}">
          <div class="flex justify-between items-start">
            <span class="text-sm font-medium text-gray-700 dark:text-gray-300">${name}</span>
            <span class="text-xs text-gray-500 dark:text-gray-400">ฎีกา</span>
          </div>
          <div class="mt-2">
            <div class="flex justify-between text-sm">
              <span class="text-gray-500 dark:text-gray-400">เบิกแล้ว</span>
              <span class="font-semibold text-green-600 dark:text-green-400">${formatNumber(data.paid)}</span>
            </div>
            <div class="flex justify-between text-sm">
              <span class="text-gray-500 dark:text-gray-400">รอตรวจสอบ</span>
              <span class="font-semibold text-yellow-600 dark:text-yellow-400">${formatNumber(data.remaining)}</span>
            </div>
            <div class="flex justify-between text-sm border-t border-gray-200 dark:border-gray-700 pt-1 mt-1">
              <span class="text-gray-500 dark:text-gray-400">ขอเบิกทั้งสิ้น</span>
              <span class="font-bold text-purple-600 dark:text-purple-400">${formatNumber(data.total)}</span>
            </div>
          </div>
        </div>
      `;
    }

    function formatNumber(num) {
      return new Intl.NumberFormat('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(num);
    }

    async function loadStats() {
      try {
        // Get all register items (we need to compute avg time)
        const res = await register.list({ limit: 10000, page: 1 });
        if (!res.success) return;
        const items = res.data.data || [];

        // Compute avg time (RECEIVE_DATE to APPROVE_DATE or PAY_DATE)
        let totalDays = 0;
        let count = 0;
        let totalItems = 0;
        let completed = 0;

        for (const item of items) {
          if (item.cancel_status === 1) continue;
          totalItems++;
          if (item.status === 'APPROVED' || item.status === 'PAID') {
            completed++;
            const start = new Date(item.receive_date);
            const end = new Date(item.approve_date || item.pay_date || item.receive_date);
            if (start && end && !isNaN(start) && !isNaN(end)) {
              const days = Math.floor((end - start) / (1000 * 60 * 60 * 24));
              if (days >= 0) {
                totalDays += days;
                count++;
              }
            }
          }
        }

        const avg = count > 0 ? Math.floor(totalDays / count) : 0;
        document.getElementById('avgTime').textContent = avg + ' วัน';

        const progress = totalItems > 0 ? Math.round((completed / totalItems) * 100) : 0;
        document.getElementById('progressBar').style.width = progress + '%';
        document.getElementById('progressText').textContent = progress + '%';

      } catch (err) {
        console.error('Stats error:', err);
      }
    }

    function renderDeptChart(data) {
      const ctx = document.getElementById('deptChart').getContext('2d');
      const { depts, matrix, moneyTypes } = data;

      // Aggregate by dept
      const deptTotals = {};
      for (const d of depts) {
        deptTotals[d] = 0;
        for (const mt of moneyTypes) {
          deptTotals[d] += matrix[d]?.[mt]?.total_amount || 0;
        }
      }

      // Sort and get top N
      const sorted = Object.entries(deptTotals).sort((a, b) => b[1] - a[1]);
      const topN = 5; // From settings
      const top = sorted.slice(0, topN);
      let other = 0;
      sorted.slice(topN).forEach(([_, val]) => other += val);

      const labels = top.map(([name]) => name);
      const values = top.map(([_, val]) => val);
      if (other > 0) {
        labels.push('หน่วยงานอื่น');
        values.push(other);
      }

      if (deptChart) deptChart.destroy();
      deptChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: 'ยอดรวม (บาท)',
            data: values,
            backgroundColor: 'rgba(147, 51, 234, 0.7)',
            borderColor: 'rgba(147, 51, 234, 1)',
            borderWidth: 1,
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
          },
          scales: {
            y: { beginAtZero: true, ticks: { callback: v => v.toLocaleString() } },
          },
        },
      });
    }

    function renderMoneyTypeChart(data) {
      const ctx = document.getElementById('moneyTypeChart').getContext('2d');
      const { depts, matrix, moneyTypes } = data;

      // Grouped bar: X = dept, each bar = money type
      const topDepts = depts.slice(0, 5);
      const colors = {
        'เงินงบประมาณ': '#FFCCFF',
        'เงินบำรุงโรงพยาบาล': '#FFFF99',
        'เงินกองทุนหลักประกันสุขภาพ': '#F8CBAD',
        'เงินอุดหนุน': '#C6EFCE',
        'เงินแพทยศาสตร์': '#BDD7EE',
        'เงินอื่น': '#808080',
      };

      const datasets = moneyTypes.map((mt, idx) => ({
        label: mt,
        data: topDepts.map(d => matrix[d]?.[mt]?.total_amount || 0),
        backgroundColor: colors[mt] || `hsl(${idx * 60}, 70%, 70%)`,
      }));

      if (moneyTypeChart) moneyTypeChart.destroy();
      moneyTypeChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: topDepts,
          datasets,
        },
        options: {
          responsive: true,
          plugins: {
            legend: { position: 'top' },
          },
          scales: {
            x: { stacked: false },
            y: { beginAtZero: true, ticks: { callback: v => v.toLocaleString() } },
          },
        },
      });
    }

    async function loadMonthlyChart() {
      const ctx = document.getElementById('monthlyChart').getContext('2d');

      // Get current fiscal year from settings
      // We'll query register data grouped by month
      const res = await register.list({ limit: 10000, page: 1 });
      if (!res.success) return;
      const items = res.data.data || [];

      // Group by month (Oct-Sep)
      const months = ['ต.ค.', 'พ.ย.', 'ธ.ค.', 'ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.'];
      const currentYearData = new Array(12).fill(0);
      const prevYearData = new Array(12).fill(0);

      const now = new Date();
      const currentFY = now.getFullYear() + 543; // Thai year

      for (const item of items) {
        if (item.cancel_status === 1) continue;
        if (!item.receive_date) continue;
        const d = new Date(item.receive_date);
        const thaiYear = d.getFullYear() + 543;
        let month = d.getMonth(); // 0=Jan, 9=Oct
        // Shift: Oct=0, Nov=1, ..., Sep=11
        let idx = (month + 3) % 12; // Oct=0, Nov=1, Dec=2, Jan=3, ...
        // For Oct-Dec, they belong to next fiscal year
        if (month >= 9) {
          // Oct, Nov, Dec -> fiscal year = thaiYear + 1? Actually Oct 2025 = FY 2569
          // If thaiYear = 2568 (2025), Oct-Dec are FY 2569
          // But we'll just compare year
        }

        if (thaiYear === currentFY) {
          currentYearData[idx] += 1;
        } else if (thaiYear === currentFY - 1) {
          prevYearData[idx] += 1;
        }
      }

      if (monthlyChart) monthlyChart.destroy();
      monthlyChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: months,
          datasets: [
            {
              label: `ปี ${currentFY}`,
              data: currentYearData,
              backgroundColor: 'rgba(147, 51, 234, 0.7)',
              borderColor: 'rgba(147, 51, 234, 1)',
              borderWidth: 1,
            },
            {
              label: `ปี ${currentFY - 1}`,
              data: prevYearData,
              backgroundColor: 'rgba(156, 163, 175, 0.7)',
              borderColor: 'rgba(156, 163, 175, 1)',
              borderWidth: 1,
            }
          ]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { position: 'top' },
          },
          scales: {
            y: { beginAtZero: true, ticks: { stepSize: 1 } },
          },
        },
      });
    }

    // Init
    const user = requireAuth();
    if (user) {
      await loadLayout();
      // Set fiscal year
      // We'll fetch from settings
      try {
        const settingsRes = await fetch('/api/settings/app', {
          headers: { 'Authorization': `Bearer ${localStorage.getItem('srdh_token')}` }
        });
        const settings = await settingsRes.json();
        if (settings.success && settings.data) {
          const fy = settings.data.find(s => s.key === 'fiscal_year');
          if (fy) {
            document.getElementById('fiscalYearText').textContent = `ภาพรวมการเบิกจ่ายเงิน ปีงบประมาณ ${fy.value}`;
          }
        }
      } catch (e) {}

      await loadDashboard();
    }
  </script>
</body>
</html>
