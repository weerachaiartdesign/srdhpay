<header class="sticky top-0 z-30 bg-[var(--color-surface)] border-b border-[var(--color-border)]">
  <div class="flex items-center justify-between px-4 py-2.5 gap-3">
    <!-- Left: Logo + ชื่อโปรแกรม + ผู้ใช้ -->
    <div class="flex items-center gap-3 min-w-0">
      <img src="icons/logo_srdhpay-630.png" alt="SRDH PAY" class="w-9 h-9 rounded-lg shrink-0" onerror="this.style.display='none'">
      <div class="hidden sm:block leading-tight">
        <div class="font-display font-bold text-sm" style="color:var(--color-primary-dark)">SRDH PAY</div>
        <div class="text-[11px] text-[var(--color-text-muted)]">ระบบทะเบียนเบิกจ่ายเงิน รพส.</div>
      </div>
      <div class="hidden md:block border-l border-[var(--color-border)] pl-3 ml-1 leading-tight min-w-0">
        <div id="header-username" class="text-sm font-semibold truncate">-</div>
        <div id="header-position" class="text-[11px] text-[var(--color-text-muted)] truncate">-</div>
      </div>
    </div>

    <!-- Center: Hamburger (mobile) + ชื่อหน้าปัจจุบัน -->
    <div class="flex items-center gap-2 flex-1 justify-center md:justify-start md:ml-4">
      <button id="btn-hamburger" class="md:hidden p-2 rounded-lg hover:bg-[var(--color-primary-soft)]" aria-label="เปิดเมนู">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <h1 id="page-title" class="font-display font-semibold text-base md:text-lg truncate"></h1>
    </div>

    <!-- Right: Dark Mode Toggle -->
    <div class="flex items-center gap-2 shrink-0">
      <button id="btn-darkmode" class="p-2 rounded-lg hover:bg-[var(--color-primary-soft)]" aria-label="สลับธีมสว่าง/มืด" title="สลับธีมสว่าง/มืด">
        <svg class="w-5 h-5 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
      </button>
    </div>
  </div>
</header>
