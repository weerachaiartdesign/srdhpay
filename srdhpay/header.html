<!-- header.html -->
<header class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 shadow-sm sticky top-0 z-30">
  <div class="flex items-center justify-between px-4 py-2">
    <!-- Left: Logo & Brand -->
    <div class="flex items-center space-x-3">
      <button id="hamburgerBtn" class="md:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800" aria-label="Toggle menu">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <img src="/icons/logo_srdhpay-630.png" alt="SRDH Pay" class="h-10 w-10 object-contain">
      <span class="text-lg font-bold text-purple-700 dark:text-purple-400 hidden sm:inline">SRDH PAY</span>
    </div>

    <!-- Center: Page title -->
    <div class="flex-1 text-center">
      <h1 id="pageTitle" class="text-lg font-semibold text-gray-800 dark:text-gray-200"></h1>
    </div>

    <!-- Right: User info + Dark mode toggle -->
    <div class="flex items-center space-x-3">
      <div class="hidden md:flex flex-col items-end text-sm">
        <span id="userName" class="font-medium text-gray-800 dark:text-gray-200">-</span>
        <span id="userRole" class="text-gray-500 dark:text-gray-400 text-xs">-</span>
      </div>
      <button id="darkModeToggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-600 dark:text-gray-300">
        <span id="darkModeIcon">🌙</span>
      </button>
    </div>
  </div>
</header>
