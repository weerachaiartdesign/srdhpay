<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ทะเบียนเบิกจ่ายเงิน - SRDH PAY</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { font-family: 'Prompt', sans-serif; }
    .card-view {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }
    @media (min-width: 768px) {
      .card-view {
        display: none;
      }
      .table-view {
        display: block;
      }
    }
    @media (max-width: 767px) {
      .table-view {
        display: none;
      }
      .card-view {
        display: grid;
      }
    }
    .status-badge {
      font-size: 0.75rem;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-weight: 500;
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
  <div id="header-container"></div>
  <div class="flex">
    <div id="sidebar-container"></div>
    <main class="flex-1 p-4 md:p-6 overflow-y-auto">
      <div class="max-w-7xl mx-auto">
        <!-- Page Header -->
        <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-4">
          <div>
            <h1 class="text-2xl font-bold text-gray-800 dark:text-white">ทะเบียนเบิกจ่ายเงิน</h1>
            <p class="text-gray-600 dark:text-gray-400">ตรวจสอบรายการและสถานะ</p>
          </div>
          <div class="flex flex-wrap gap-2 mt-2 md:mt-0">
            <select id="limitSelect" class="border border-gray-300 dark:border-gray-600 rounded px-3 py-1 text-sm bg-white dark:bg-gray-800 dark:text-white">
              <option value="50">50 รายการ</option>
              <option value="100">100 รายการ</option>
              <option value="200">200 รายการ</option>
              <option value="500">500 รายการ</option>
            </select>
            <select id="sortSelect" class="border border-gray-300 dark:border-gray-600 rounded px-3 py-1 text-sm bg-white dark:bg-gray-800 dark:text-white">
              <option value="desc">ล่าสุด</option>
              <option value="asc">เก่าสุด</option>
            </select>
          </div>
        </div>

        <!-- Filters -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4 mb-4">
          <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
            <input id="searchInput" type="text" placeholder="ค้นหา..." class="border border-gray-300 dark:border-gray-600 rounded px-3 py-2 text-sm bg-white dark:bg-gray-700 dark:text-white md:col-span-2">
            <select id="filterMoneyType" class="border border-gray-300 dark:border-gray-600 rounded px-3 py-2 text-sm bg-white dark:bg-gray-700 dark:text-white">
              <option value="">ทุกประเภทเงิน</option>
            </select>
            <select id="filterDept" class="border border-gray-300 dark:border-gray-600 rounded px-3 py-2 text-sm bg-white dark:bg-gray-700 dark:text-white">
              <option value="">ทุกหน่วยงาน</option>
            </select>
            <select id="filterStatus" class="border border-gray-300 dark:border-gray-600 rounded px-3 py-2 text-sm bg-white dark:bg-gray-700 dark:text-white">
              <option value="">ทุกสถานะ</option>
              <option value="RECEIVED">รับเข้าระบบ</option>
              <option value="CHECKUP">ตรวจสอบ</option>
              <option value="EDITING">ส่งแก้ไข</option>
              <option value="PASSED">ตรวจผ่าน</option>
              <option value="PROPOSED">เสนอ</option>
              <option value="APPROVED">อนุมัติ</option>
              <option value="PAID">จ่ายแล้ว</option>
            </select>
          </div>
          <div class="mt-3 flex gap-2">
            <button id="searchBtn" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded text-sm transition">ค้นหา</button>
            <button id="clearBtn" class="bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-300 px-4 py-2 rounded text-sm transition">ล้างการกรอง</button>
          </div>
        </div>

        <!-- Table View (Desktop) -->
        <div class="table-view bg-white dark:bg-gray-800 rounded-lg shadow overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-purple-50 dark:bg-purple-900/30">
              <tr>
                <th class="px-3 py-2 text-left text-gray-700 dark:text-gray-300">ลำดับ</th>
                <th class="px-3 py-2 text-left text-gray-700 dark:text-gray-300">สถานะ</th>
                <th class="px-3 py-2 text-left text-gray-700 dark:text-gray-300">เลขที่ใบขอเบิก/ฎีกา</th>
                <th class="px-3 py-2 text-left text-gray-700 dark:text-gray-300">เจ้าหนี้/บริษัท</th>
                <th class="px-3 py-2 text-left text-gray-700 dark:text-gray-300">รายการ</th>
                <th class="px-3 py-2 text-right text-gray-700 dark:text-gray-300">จำนวนเงิน</th>
                <th class="px-3 py-2 text-left text-gray-700 dark:text-gray-300">ประเภท/หน่วยงาน</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr><td colspan="7" class="text-center py-8 text-gray-500 dark:text-gray-400">กำลังโหลด...</td></tr>
            </tbody>
          </table>
          <div id="tablePagination" class="flex justify-between items-center px-4 py-3 border-t border-gray-200 dark:border-gray-700"></div>
        </div>

        <!-- Card View (Mobile) -->
        <div id="cardContainer" class="card-view">
          <!-- Rendered by JS -->
        </div>
        <div id="cardPagination" class="flex justify-between items-center mt-4 md:hidden"></div>
      </div>
    </main>
  </div>

  <!-- Detail Popup -->
  <div id="detailPopup" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white dark:bg-gray-800 rounded-lg max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6 mx-4">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold text-gray-800 dark:text-white">รายละเอียดรายการ</h2>
        <button onclick="closeDetail()" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 text-2xl">&times;</button>
      </div>
      <div id="detailContent"></div>
    </div>
  </div>

  <script type="module">
    import { loadLayout, requireAuth, formatThaiDate, formatCurrency, showToast, showLoading, hideLoading } from './js/app.js';
    import { register, settings, statusMap, statusColors } from './js/api.js';

    let currentData = [];
    let currentPage = 1;
    let currentLimit = 50;
    let totalItems = 0;
    let moneyTypes = [];
    let depts = [];

    async function loadFilters() {
      try {
        const [mtRes, deptRes] = await Promise.all([
          settings.get('money_type'),
          settings.get('dept'),
        ]);
        if (mtRes.success) {
          moneyTypes = mtRes.data;
          const select = document.getElementById('filterMoneyType');
          moneyTypes.forEach(mt => {
            const opt = document.createElement('option');
            opt.value = mt.name;
            opt.textContent = mt.name;
            select.appendChild(opt);
          });
        }
        if (deptRes.success) {
          depts = deptRes.data;
          const select = document.getElementById('filterDept');
          depts.forEach(d => {
            const opt = document.createElement('option');
            opt.value = d.name;
            opt.textContent = d.name;
            select.appendChild(opt);
          });
        }
      } catch (e) {
        console.error('Failed to load filters:', e);
      }
    }

    async function loadData() {
      showLoading('กำลังโหลดข้อมูล...');
      try {
        const search = document.getElementById('searchInput').value;
        const moneyType = document.getElementById('filterMoneyType').value;
        const dept = document.getElementById('filterDept').value;
        const status = document.getElementById('filterStatus').value;
        const sort = document.getElementById('sortSelect').value;
        const limit = parseInt(document.getElementById('limitSelect').value);
        currentLimit = limit;

        const params = {
          page: currentPage,
          limit,
          sort,
        };
        if (search) params.search = search;
        if (moneyType) params.money_type = moneyType;
        if (dept) params.dept = dept;
        if (status) params.status = status;

        const res = await register.list(params);
        if (!res.success) throw new Error(res.error);

        currentData = res.data.data || [];
        totalItems = res.data.pagination?.total || 0;

        renderTable();
        renderCards();
        renderPagination();

      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        hideLoading();
      }
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      if (!currentData.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center py-8 text-gray-500 dark:text-gray-400">ไม่พบข้อมูล</td></tr>`;
        return;
      }

      let html = '';
      let seq = (currentPage - 1) * currentLimit + 1;
      for (const item of currentData) {
        const statusThai = statusMap[item.status] || item.status;
        const statusClass = statusColors[item.status] || 'bg-gray-100 text-gray-700';
        html += `
          <tr class="border-b border-gray-100 dark:border-gray-700 hover:bg-purple-50 dark:hover:bg-gray-700/50 cursor-pointer" onclick="showDetail('${item.uuid}')">
            <td class="px-3 py-2 text-gray-600 dark:text-gray-400">
              <div>${seq++}</div>
              <div class="text-xs text-gray-400">${formatThaiDate(item.receive_date)}</div>
              <div class="text-xs text-gray-400">${item.receive_no_display || '-'}</div>
            </td>
            <td class="px-3 py-2"><span class="status-badge ${statusClass}">${statusThai}</span></td>
            <td class="px-3 py-2">
              <div class="font-medium">${item.request_no_display || '-'}</div>
              <div class="text-xs text-gray-500">ฎีกา: ${item.dk_no_display || '-'}</div>
            </td>
            <td class="px-3 py-2 font-medium text-gray-800 dark:text-gray-200">${item.vendor || '-'}</td>
            <td class="px-3 py-2 text-gray-600 dark:text-gray-400 max-w-xs truncate">${item.description || '-'}</td>
            <td class="px-3 py-2 text-right font-bold text-purple-600 dark:text-purple-400">${formatCurrency(item.amount)}</td>
            <td class="px-3 py-2">
              <div>${item.money_type || '-'}</div>
              <div class="text-xs text-gray-500">${item.dept || '-'}</div>
            </td>
          </tr>
        `;
      }
      tbody.innerHTML = html;
    }

    function renderCards() {
      const container = document.getElementById('cardContainer');
      if (!currentData.length) {
        container.innerHTML = `<div class="bg-white dark:bg-gray-800 rounded-lg shadow p-8 text-center text-gray-500 dark:text-gray-400">ไม่พบข้อมูล</div>`;
        return;
      }

      let html = '';
      for (const item of currentData) {
        const statusThai = statusMap[item.status] || item.status;
        const statusClass = statusColors[item.status] || 'bg-gray-100 text-gray-700';
        html += `
          <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4 border-l-4 border-purple-400 cursor-pointer" onclick="showDetail('${item.uuid}')">
            <div class="flex justify-between items-start">
              <span class="status-badge ${statusClass}">${statusThai}</span>
              <span class="text-sm text-gray-500">${formatThaiDate(item.receive_date)}</span>
            </div>
            <div class="mt-2">
              <div class="font-medium">${item.vendor || '-'}</div>
              <div class="text-sm text-gray-500 truncate">${item.description || '-'}</div>
            </div>
            <div class="mt-2 flex justify-between items-center">
              <div>
                <span class="text-xs text-gray-500">ใบขอเบิก: ${item.request_no_display || '-'}</span>
                <span class="text-xs text-gray-500 ml-2">ฎีกา: ${item.dk_no_display || '-'}</span>
              </div>
              <span class="font-bold text-purple-600 dark:text-purple-400">${formatCurrency(item.amount)}</span>
            </div>
            <div class="mt-1 flex flex-wrap gap-1 text-xs text-gray-500">
              <span class="bg-gray-100 dark:bg-gray-700 px-2 py-0.5 rounded">${item.money_type || '-'}</span>
              <span class="bg-gray-100 dark:bg-gray-700 px-2 py-0.5 rounded">${item.dept || '-'}</span>
              <span class="bg-gray-100 dark:bg-gray-700 px-2 py-0.5 rounded">${item.receive_no_display || '-'}</span>
            </div>
          </div>
        `;
      }
      container.innerHTML = html;
    }

    function renderPagination() {
      const totalPages = Math.ceil(totalItems / currentLimit);
      const paginationHtml = `
        <div class="flex items-center gap-2">
          <button onclick="goToPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''} class="px-3 py-1 border rounded ${currentPage <= 1 ? 'opacity-50 cursor-not-allowed' : 'hover:bg-gray-100 dark:hover:bg-gray-700'}">ก่อนหน้า</button>
          <span class="text-sm text-gray-600 dark:text-gray-400">หน้า ${currentPage} จาก ${totalPages || 1}</span>
          <button onclick="goToPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''} class="px-3 py-1 border rounded ${currentPage >= totalPages ? 'opacity-50 cursor-not-allowed' : 'hover:bg-gray-100 dark:hover:bg-gray-700'}">ถัดไป</button>
        </div>
        <span class="text-sm text-gray-500 dark:text-gray-400">ทั้งหมด ${totalItems} รายการ</span>
      `;
      document.getElementById('tablePagination').innerHTML = paginationHtml;
      document.getElementById('cardPagination').innerHTML = paginationHtml;
    }

    window.goToPage = function(page) {
      if (page < 1) return;
      const totalPages = Math.ceil(totalItems / currentLimit);
      if (page > totalPages) return;
      currentPage = page;
      loadData();
    };

    window.showDetail = async function(uuid) {
      const item = currentData.find(d => d.uuid === uuid);
      if (!item) return;

      const content = document.getElementById('detailContent');
      content.innerHTML = `
        <div class="space-y-2 text-sm">
          <div class="grid grid-cols-2 gap-2">
            <div><span class="text-gray-500">เลขที่รับ:</span> ${item.receive_no_display || '-'}</div>
            <div><span class="text-gray-500">เลขที่ใบขอเบิก:</span> ${item.request_no_display || '-'}</div>
            <div><span class="text-gray-500">เลขที่ฎีกา:</span> ${item.dk_no_display || '-'}</div>
            <div><span class="text-gray-500">ประเภทเงิน:</span> ${item.money_type || '-'}</div>
            <div><span class="text-gray-500">หน่วยงาน:</span> ${item.dept || '-'}</div>
            <div><span class="text-gray-500">เลข e-GP:</span> ${item.egp_no || '-'}</div>
            <div><span class="text-gray-500">เจ้าหนี้/บริษัท:</span> ${item.vendor || '-'}</div>
            <div><span class="text-gray-500">จำนวนเงิน:</span> ${formatCurrency(item.amount)}</div>
          </div>
          <div><span class="text-gray-500">รายการ:</span> ${item.description || '-'}</div>
          <div class="mt-4 pt-4 border-t border-gray-200 dark:border-gray-700">
            <div class="flex flex-wrap gap-2 text-xs">
              <span class="bg-gray-100 dark:bg-gray-700 px-2 py-1 rounded">รับเข้า: ${formatThaiDate(item.receive_date)}</span>
              ${item.edit_date ? `<span class="bg-yellow-100 dark:bg-yellow-900/30 px-2 py-1 rounded">ส่งแก้ไข: ${formatThaiDate(item.edit_date)}</span>` : ''}
              ${item.return_date ? `<span class="bg-blue-100 dark:bg-blue-900/30 px-2 py-1 rounded">รับคืน: ${formatThaiDate(item.return_date)}</span>` : ''}
              ${item.pass_date ? `<span class="bg-green-100 dark:bg-green-900/30 px-2 py-1 rounded">ตรวจผ่าน: ${formatThaiDate(item.pass_date)}</span>` : ''}
              ${item.propose_date ? `<span class="bg-purple-100 dark:bg-purple-900/30 px-2 py-1 rounded">เสนอ: ${formatThaiDate(item.propose_date)}</span>` : ''}
              ${item.approve_date ? `<span class="bg-indigo-100 dark:bg-indigo-900/30 px-2 py-1 rounded">อนุมัติ: ${formatThaiDate(item.approve_date)}</span>` : ''}
              ${item.pay_date ? `<span class="bg-emerald-100 dark:bg-emerald-900/30 px-2 py-1 rounded">จ่ายแล้ว: ${formatThaiDate(item.pay_date)}</span>` : ''}
            </div>
          </div>
        </div>
      `;
      document.getElementById('detailPopup').classList.remove('hidden');
    };

    window.closeDetail = function() {
      document.getElementById('detailPopup').classList.add('hidden');
    };

    // Close popup on backdrop click
    document.getElementById('detailPopup').addEventListener('click', function(e) {
      if (e.target === this) closeDetail();
    });

    // Event listeners
    document.getElementById('searchBtn').addEventListener('click', () => {
      currentPage = 1;
      loadData();
    });
    document.getElementById('clearBtn').addEventListener('click', () => {
      document.getElementById('searchInput').value = '';
      document.getElementById('filterMoneyType').value = '';
      document.getElementById('filterDept').value = '';
      document.getElementById('filterStatus').value = '';
      currentPage = 1;
      loadData();
    });
    document.getElementById('limitSelect').addEventListener('change', () => {
      currentPage = 1;
      loadData();
    });
    document.getElementById('sortSelect').addEventListener('change', loadData);

    // Enter key for search
    document.getElementById('searchInput').addEventListener('keyup', (e) => {
      if (e.key === 'Enter') {
        currentPage = 1;
        loadData();
      }
    });

    // Init
    const user = requireAuth();
    if (user) {
      await loadLayout();
      await loadFilters();
      await loadData();
    }
  </script>
</body>
</html>
