<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ทะเบียนเบิกจ่ายเงิน - SRDH PAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="icons/srdhpay-192.png">
</head>
<body class="bg-gray-50 dark:bg-gray-900">
    <div id="sidebar-container"></div>
    <div id="header-container"></div>
    <main class="p-4 md:p-6 transition-all duration-300" id="main-content">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-800 dark:text-white">ทะเบียนเบิกจ่ายเงิน</h1>
            <p class="text-gray-600 dark:text-gray-400">ตรวจสอบรายการและสถานะ</p>
        </div>

        <!-- Filters -->
        <div class="card p-4 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="filterRequestNo" placeholder="เลขที่ใบขอเบิก" class="form-input">
                <input type="text" id="filterDkNo" placeholder="เลขที่ฎีกา" class="form-input">
                <input type="text" id="filterReceiveNo" placeholder="เลขที่รับ" class="form-input">
                <input type="text" id="filterVendor" placeholder="ชื่อเจ้าหนี้/บริษัท" class="form-input">
                <select id="filterMoneyType" class="form-input">
                    <option value="">ทั้งหมด (ประเภทเงิน)</option>
                </select>
                <select id="filterDept" class="form-input">
                    <option value="">ทั้งหมด (หน่วยงาน)</option>
                </select>
                <select id="filterStatus" class="form-input">
                    <option value="">ทั้งหมด (สถานะ)</option>
                    <option value="รอเอกสาร">รอเอกสาร</option>
                    <option value="รับเข้าระบบ">รับเข้าระบบ</option>
                    <option value="ตรวจสอบ">ตรวจสอบ</option>
                    <option value="ส่งแก้ไข">ส่งแก้ไข</option>
                    <option value="ตรวจผ่าน">ตรวจผ่าน</option>
                    <option value="เสนอ">เสนอ</option>
                    <option value="อนุมัติ">อนุมัติ</option>
                    <option value="จ่ายแล้ว">จ่ายแล้ว</option>
                    <option value="ยกเลิก">ยกเลิก</option>
                </select>
                <button id="searchBtn" class="btn-primary">ค้นหา</button>
                <button id="resetBtn" class="btn-secondary">ล้างการกรอง</button>
            </div>
        </div>

        <!-- Desktop Table -->
        <div class="desktop-only card overflow-x-auto">
            <table class="data-table min-w-full">
                <thead>
                    <tr><th>ลำดับ</th><th>สถานะ</th><th>เลขที่ใบขอเบิก/เลขที่ฎีกา</th><th>ชื่อเจ้าหนี้/บริษัท</th><th>รายการ</th><th>จำนวนเงินขอเบิก</th><th>ประเภทเงิน/หน่วยงาน</th></tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="7" class="text-center">กำลังโหลด...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Mobile Cards -->
        <div id="mobileCards" class="mobile-only mobile-card-list"></div>

        <!-- Pagination -->
        <div class="flex flex-wrap justify-between items-center mt-6 gap-4">
            <div class="flex items-center gap-2">
                <span class="text-sm text-gray-600 dark:text-gray-400">แสดง</span>
                <select id="pageLimit" class="form-input w-20">
                    <option value="50">50</option>
                    <option value="100">100</option>
                    <option value="200">200</option>
                    <option value="500">500</option>
                </select>
                <span class="text-sm text-gray-600 dark:text-gray-400">รายการ</span>
            </div>
            <div class="flex gap-2">
                <button id="prevPage" class="btn-secondary" disabled>« ก่อนหน้า</button>
                <span id="pageInfo" class="px-3 py-2 text-sm">หน้า 1</span>
                <button id="nextPage" class="btn-secondary" disabled>ถัดไป »</button>
            </div>
        </div>
    </main>

    <!-- Popup Detail Modal (hidden) -->
    <div id="detailModal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6" id="detailContent"></div>
            <div class="flex justify-end p-4 border-t"><button class="btn-secondary closeModal">ปิด</button></div>
        </div>
    </div>

    <script src="js/api-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/list.js"></script>
    <script>
        (async function() {
            const authorized = await requireAuth();
            if (!authorized) return;
            initListPage();
        })();
    </script>
</body>
</html>
