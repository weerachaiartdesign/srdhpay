<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ทะเบียนเบิกจ่ายเงิน - SRDH PAY</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="min-h-screen">
  <div id="header-placeholder"></div>
  <div class="flex">
    <div id="sidebar-placeholder"></div>

    <main class="flex-1 p-4 md:p-6 max-w-full overflow-x-hidden space-y-4">
      <div>
        <h2 class="font-display font-bold text-xl">ทะเบียนเบิกจ่ายเงิน</h2>
        <p class="text-sm text-[var(--color-text-muted)]">ตรวจสอบรายการและสถานะ</p>
      </div>

      <!-- ค้นหา + ตัวกรอง -->
      <div class="card p-4 space-y-3">
        <input type="text" id="searchBox" data-search-box placeholder="ค้นหา: ประเภทเงิน, หน่วยงาน, เจ้าหนี้, จำนวนเงิน, รายการ, เลขที่รับ/ใบขอเบิก/ฎีกา"
               class="w-full px-3.5 py-2.5 rounded-lg border border-[var(--color-border)] bg-transparent focus:outline-none focus:ring-2" style="--tw-ring-color:var(--color-primary)">
        <div class="flex flex-wrap gap-2">
          <select id="filterMoneyType" class="px-3 py-2 rounded-lg border border-[var(--color-border)] bg-transparent text-sm"><option value="">ประเภทเงิน: ทั้งหมด</option></select>
          <select id="filterDept" class="px-3 py-2 rounded-lg border border-[var(--color-border)] bg-transparent text-sm"><option value="">หน่วยงาน: ทั้งหมด</option></select>
          <select id="filterStatus" class="px-3 py-2 rounded-lg border border-[var(--color-border)] bg-transparent text-sm">
            <option value="">สถานะ: ทั้งหมด</option>
            <option value="RECEIVED">รับเข้าระบบ</option>
            <option value="CHECKUP">ตรวจสอบ</option>
            <option value="EDITING">ส่งแก้ไข</option>
            <option value="PASSED">ตรวจผ่าน</option>
            <option value="PROPOSED">เสนอ</option>
            <option value="APPROVED">อนุมัติ</option>
            <option value="PAID">จ่ายแล้ว</option>
          </select>
          <button id="btnClearFilter" class="btn btn-outline text-sm">ล้างการกรอง</button>
          <div class="flex-1"></div>
          <select id="sortOrder" class="px-3 py-2 rounded-lg border border-[var(--color-border)] bg-transparent text-sm">
            <option value="latest">ล่าสุดก่อน</option>
            <option value="oldest">เก่าสุดก่อน</option>
          </select>
          <select id="pageSize" class="px-3 py-2 rounded-lg border border-[var(--color-border)] bg-transparent text-sm">
            <option value="50">50 / หน้า</option>
            <option value="100">100 / หน้า</option>
            <option value="200">200 / หน้า</option>
            <option value="500">500 / หน้า</option>
          </select>
        </div>
      </div>

      <!-- Desktop Table -->
      <div class="table-wrap desktop-table">
        <table class="data-table">
          <thead>
            <tr>
              <th>ลำดับ</th><th>สถานะ</th><th>เลขที่ใบขอเบิก/เลขที่ฎีกา</th>
              <th>ชื่อเจ้าหนี้/บริษัท</th><th>รายการ</th><th>จำนวนเงินขอเบิก</th><th>ประเภทเงิน/หน่วยงาน</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <!-- Mobile Cards -->
      <div id="mobileCards" class="mobile-cards"></div>

      <!-- Pagination -->
      <div class="flex items-center justify-between text-sm pt-2">
        <span id="pageInfo" class="text-[var(--color-text-muted)]">-</span>
        <div class="flex gap-2">
          <button id="btnPrevPage" class="btn btn-outline">ก่อนหน้า</button>
          <button id="btnNextPage" class="btn btn-outline">ถัดไป</button>
        </div>
      </div>
    </main>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    if (App.requireLogin()) {
      App.loadComponents();
      init();
    }

    const state = {
      page: 1,
      pageSize: Pref.get('list_pageSize', 50),
      sort: Pref.get('list_sort', 'latest'),
      search: Pref.get('list_search', ''),
      money_type: Pref.get('list_money_type', ''),
      dept: Pref.get('list_dept', ''),
      status: Pref.get('list_status', '')
    };

    async function init() {
      document.getElementById('pageSize').value = state.pageSize;
      document.getElementById('sortOrder').value = state.sort;
      document.getElementById('searchBox').value = state.search;
      document.getElementById('filterStatus').value = state.status;

      try {
        const [moneyTypesRes, deptsRes] = await Promise.all([
          api.get('/api/settings/money-types'),
          api.get('/api/settings/depts')
        ]);
        fillSelect('filterMoneyType', moneyTypesRes.data, state.money_type, 'ประเภทเงิน: ทั้งหมด');
        fillSelect('filterDept', deptsRes.data, state.dept, 'หน่วยงาน: ทั้งหมด');
      } catch (err) { App.errorAlert(err); }

      bindEvents();
      loadList();
    }

    function fillSelect(id, items, selected, allLabel) {
      const el = document.getElementById(id);
      el.innerHTML = `<option value="">${allLabel}</option>` +
        items.map((i) => `<option value="${i.name}" ${i.name === selected ? 'selected' : ''}>${i.name}</option>`).join('');
    }

    function bindEvents() {
      document.getElementById('searchBox').addEventListener('input', App.debounce((e) => {
        state.search = e.target.value; state.page = 1; Pref.set('list_search', state.search); loadList();
      }, 450));
      document.getElementById('filterMoneyType').addEventListener('change', (e) => {
        state.money_type = e.target.value; state.page = 1; Pref.set('list_money_type', state.money_type); loadList();
      });
      document.getElementById('filterDept').addEventListener('change', (e) => {
        state.dept = e.target.value; state.page = 1; Pref.set('list_dept', state.dept); loadList();
      });
      document.getElementById('filterStatus').addEventListener('change', (e) => {
        state.status = e.target.value; state.page = 1; Pref.set('list_status', state.status); loadList();
      });
      document.getElementById('sortOrder').addEventListener('change', (e) => {
        state.sort = e.target.value; Pref.set('list_sort', state.sort); loadList();
      });
      document.getElementById('pageSize').addEventListener('change', (e) => {
        state.pageSize = parseInt(e.target.value, 10); state.page = 1; Pref.set('list_pageSize', state.pageSize); loadList();
      });
      document.getElementById('btnClearFilter').addEventListener('click', () => {
        state.search = ''; state.money_type = ''; state.dept = ''; state.status = ''; state.page = 1;
        document.getElementById('searchBox').value = '';
        document.getElementById('filterMoneyType').value = '';
        document.getElementById('filterDept').value = '';
        document.getElementById('filterStatus').value = '';
        ['list_search', 'list_money_type', 'list_dept', 'list_status'].forEach((k) => Pref.set(k, ''));
        loadList();
      });
      document.getElementById('btnPrevPage').addEventListener('click', () => { if (state.page > 1) { state.page--; loadList(); } });
      document.getElementById('btnNextPage').addEventListener('click', () => { state.page++; loadList(); });
    }

    let lastData = [];

    async function loadList() {
      document.getElementById('tableBody').innerHTML = `<tr><td colspan="7"><div class="skeleton h-6 my-1"></div></td></tr>`.repeat(5);
      try {
        const res = await api.get('/api/register/list', {
          page: state.page, pageSize: state.pageSize,
          sort: state.sort === 'oldest' ? 'oldest' : 'latest',
          search: state.search, money_type: state.money_type, dept: state.dept, status: state.status
        });
        lastData = res.data;
        renderTable(res.data);
        renderMobileCards(res.data);
        renderPagination(res.pagination);
      } catch (err) {
        App.errorAlert(err);
      }
    }

    function renderTable(rows) {
      const tbody = document.getElementById('tableBody');
      if (rows.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center py-8 text-[var(--color-text-muted)]">ไม่พบรายการ</td></tr>`;
        return;
      }
      tbody.innerHTML = rows.map((r) => `
        <tr class="cursor-pointer" onclick="openDetail('${r.uuid}')">
          <td><div class="font-medium">${App.thaiDate(r.receive_date)}</div><div class="text-xs text-[var(--color-text-muted)]">${App.emptyDash(r.receive_no_display)}</div></td>
          <td>${App.statusBadge(r.status)}</td>
          <td><div>${App.emptyDash(r.request_no_display)}</div><div class="text-xs text-[var(--color-text-muted)]">${App.emptyDash(r.dk_no_display)}</div></td>
          <td class="font-semibold">${r.vendor}</td>
          <td class="max-w-xs truncate" title="${r.description}">${r.description}</td>
          <td class="font-display font-semibold text-right whitespace-nowrap">${App.money(r.amount)}</td>
          <td><div>${r.money_type}</div><div class="text-xs text-[var(--color-text-muted)]">${r.dept}</div></td>
        </tr>`).join('');
    }

    function renderMobileCards(rows) {
      const wrap = document.getElementById('mobileCards');
      if (rows.length === 0) { wrap.innerHTML = `<p class="text-center py-8 text-[var(--color-text-muted)]">ไม่พบรายการ</p>`; return; }
      wrap.innerHTML = rows.map((r) => `
        <div class="mobile-item-card" onclick="openDetail('${r.uuid}')">
          <div class="flex justify-between items-start mb-1.5">
            <span class="font-semibold text-sm">${r.vendor}</span>
            ${App.statusBadge(r.status)}
          </div>
          <p class="text-sm text-[var(--color-text-muted)] mb-1.5">${r.description}</p>
          <div class="flex justify-between text-sm">
            <span>${r.money_type} · ${r.dept}</span>
            <span class="font-display font-semibold">${App.money(r.amount)}</span>
          </div>
          <div class="text-xs text-[var(--color-text-muted)] mt-1">รับ ${App.emptyDash(r.receive_no_display)} · ${App.thaiDate(r.receive_date)}</div>
        </div>`).join('');
    }

    function renderPagination(p) {
      document.getElementById('pageInfo').textContent = `หน้า ${p.page} / ${p.totalPages || 1} (ทั้งหมด ${p.total.toLocaleString()} รายการ)`;
      document.getElementById('btnPrevPage').disabled = p.page <= 1;
      document.getElementById('btnNextPage').disabled = p.page >= p.totalPages;
    }

    const TIMELINE_STEPS = [
      { key: 'RECEIVED', label: 'รับเข้าระบบ', dateField: 'receive_date' },
      { key: 'CHECKUP', label: 'ตรวจสอบ', dateField: null },
      { key: 'PASSED', label: 'ตรวจผ่าน', dateField: 'pass_date' },
      { key: 'PROPOSED', label: 'เสนอ', dateField: 'propose_date' },
      { key: 'APPROVED', label: 'อนุมัติ', dateField: 'approve_date' },
      { key: 'PAID', label: 'จ่ายแล้ว', dateField: 'pay_date' }
    ];
    const STEP_ORDER = ['RECEIVED', 'CHECKUP', 'EDITING', 'PASSED', 'PROPOSED', 'APPROVED', 'PAID'];

    window.openDetail = async function (uuid) {
      App.showLoading('กำลังโหลด...');
      try {
        const res = await api.get(`/api/register/${uuid}`);
        App.closeLoading();
        showDetailPopup(res.data);
      } catch (err) {
        App.errorAlert(err);
      }
    };

    function buildTimelineHtml(row) {
      const currentIdx = STEP_ORDER.indexOf(row.status);
      const steps = [...TIMELINE_STEPS];
      if (row.edit_date) {
        // แทรกขั้น "ส่งแก้ไข" หลังตรวจสอบ ถ้ามีการส่งแก้ไขเกิดขึ้นจริง
        steps.splice(2, 0, { key: 'EDITING', label: 'ส่งแก้ไข', dateField: 'edit_date' });
      }
      return `<div class="flex overflow-x-auto gap-1 pb-2">` + steps.map((s) => {
        const idx = STEP_ORDER.indexOf(s.key);
        const reached = currentIdx >= 0 && idx <= currentIdx;
        const dateVal = s.dateField ? row[s.dateField] : null;
        return `
          <div class="flex-1 min-w-[90px] text-center">
            <div class="w-3 h-3 rounded-full mx-auto mb-1 ${reached ? '' : 'opacity-30'}" style="background-color:${reached ? 'var(--color-primary)' : 'var(--color-border)'}"></div>
            <div class="text-xs font-medium ${reached ? '' : 'text-[var(--color-text-muted)]'}">${s.label}</div>
            <div class="text-[10px] text-[var(--color-text-muted)]">${dateVal ? App.thaiDate(dateVal) : '-'}</div>
          </div>`;
      }).join('<div class="flex-1 h-[2px] bg-[var(--color-border)] mt-1.5"></div>') + `</div>`;
    }

    function showDetailPopup(row) {
      const fields = [
        ['เลขที่รับ', row.receive_no_display], ['เลขที่ใบขอเบิก', row.request_no_display],
        ['เลขที่ฎีกา', row.dk_no_display], ['ประเภทเงิน', row.money_type],
        ['หน่วยงาน', row.dept], ['เลข e-GP', row.egp_no],
        ['ชื่อเจ้าหนี้/บริษัท', row.vendor], ['จำนวนเงินขอเบิก', App.money(row.amount)],
        ['รายการ', row.description]
      ];
      Swal.fire({
        title: 'รายละเอียดรายการ',
        width: 640,
        html: `
          ${buildTimelineHtml(row)}
          <div class="text-left grid grid-cols-2 gap-2 text-sm mt-3">
            ${fields.map(([label, val]) => `
              <div class="col-span-2 sm:col-span-1">
                <div class="text-xs text-[var(--color-text-muted)]">${label}</div>
                <div class="font-medium">${App.emptyDash(val)}</div>
              </div>`).join('')}
          </div>`,
        confirmButtonText: 'ปิด',
        confirmButtonColor: '#9F7AEA'
      });
    }
  </script>
</body>
</html>
