<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายงานสถานะฎีกา - SRDH PAY</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="min-h-screen">
  <div id="header-placeholder"></div>
  <div class="flex">
    <div id="sidebar-placeholder"></div>

    <main class="flex-1 p-4 md:p-6 max-w-full overflow-x-hidden space-y-4">
      <div>
        <h2 class="font-display font-bold text-xl">รายงานสถานะฎีกา</h2>
        <p class="text-sm text-[var(--color-text-muted)]">ค้นหารายการตามสถานะและช่วงวันที่</p>
      </div>

      <div class="card p-4 space-y-3">
        <div class="flex flex-wrap gap-2">
          <button class="btn btn-outline mode-btn" data-mode="received">ฎีการับเข้าระบบ</button>
          <button class="btn btn-outline mode-btn" data-mode="editing">ฎีกาส่งแก้ไข</button>
          <button class="btn btn-outline mode-btn" data-mode="proposed">รออนุมัติ</button>
          <div class="flex-1"></div>
          <button id="btnPrint" class="btn btn-outline">พิมพ์</button>
        </div>
        <div class="flex flex-wrap items-end gap-2">
          <div>
            <label class="block text-xs mb-1 text-[var(--color-text-muted)]">วันที่เริ่มต้น</label>
            <input type="date" id="startDate" class="px-3 py-2 rounded-lg border border-[var(--color-border)] bg-transparent text-sm">
          </div>
          <div>
            <label class="block text-xs mb-1 text-[var(--color-text-muted)]">วันที่สิ้นสุด</label>
            <input type="date" id="endDate" class="px-3 py-2 rounded-lg border border-[var(--color-border)] bg-transparent text-sm">
          </div>
          <button id="btnSearch" class="btn btn-primary">ค้นหา</button>
        </div>
        <span id="modeLabel" class="text-xs text-[var(--color-text-muted)] block">เลือกประเภทรายงานและช่วงวันที่ แล้วกดค้นหา</span>
      </div>

      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>วันที่รับเข้าระบบ</th><th>เลขที่ใบขอเบิก</th><th>เลขที่ฎีกา</th>
              <th>ชื่อเจ้าหนี้/บริษัท</th><th>รายการ</th><th class="text-right">จำนวนเงินขอเบิก</th>
              <th>หน่วยงาน</th><th>ผู้ส่งเอกสาร</th>
            </tr>
          </thead>
          <tbody id="tableBody"><tr><td colspan="8" class="text-center py-12 text-[var(--color-text-muted)]">เลือกประเภทรายงาน เลือกช่วงวันที่ แล้วกดค้นหา</td></tr></tbody>
        </table>
      </div>
      <div id="mobileCards" class="mobile-cards"></div>
    </main>
  </div>

  <!-- Print Area -->
  <div id="printArea" class="hidden p-8"></div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    if (App.requireLogin()) { App.loadComponents(); init(); }

    let mode = 'received';
    let tableData = [];
    const MODE_LABEL = { received: 'ฎีการับเข้าระบบ', editing: 'ฎีกาส่งแก้ไข', proposed: 'รออนุมัติ' };

    function init() {
      const today = new Date().toISOString().slice(0, 10);
      const monthAgo = new Date(Date.now() - 30 * 86400000).toISOString().slice(0, 10);
      document.getElementById('startDate').value = monthAgo;
      document.getElementById('endDate').value = today;

      document.querySelectorAll('.mode-btn').forEach((btn) => btn.addEventListener('click', () => setMode(btn.dataset.mode)));
      document.getElementById('btnSearch').addEventListener('click', loadData);
      document.getElementById('btnPrint').addEventListener('click', doPrint);
      setMode('received');
    }

    function setMode(m) {
      mode = m;
      document.querySelectorAll('.mode-btn').forEach((b) => {
        b.classList.toggle('btn-primary', b.dataset.mode === m);
        b.classList.toggle('btn-outline', b.dataset.mode !== m);
      });
    }

    async function loadData() {
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      if (!startDate || !endDate) return App.toast('กรุณาเลือกช่วงวันที่', 'warning');

      document.getElementById('tableBody').innerHTML = `<tr><td colspan="8"><div class="skeleton h-6 my-1"></div></td></tr>`.repeat(4);
      try {
        const res = await api.get('/api/report/status', { action: mode, start_date: startDate, end_date: endDate });
        tableData = res.data;
        document.getElementById('modeLabel').textContent = `${MODE_LABEL[mode]}: พบ ${res.data.length} รายการ`;
        renderTable(); renderCards();
      } catch (err) { App.errorAlert(err); }
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      if (tableData.length === 0) { tbody.innerHTML = `<tr><td colspan="8" class="text-center py-10 text-[var(--color-text-muted)]">ไม่พบรายการ</td></tr>`; return; }
      tbody.innerHTML = tableData.map((r) => `
        <tr>
          <td>${App.thaiDate(r.receive_date)}</td>
          <td>${App.emptyDash(r.request_no_display)}</td>
          <td>${App.emptyDash(r.dk_no_display)}</td>
          <td class="font-semibold">${r.vendor}</td>
          <td class="max-w-xs truncate" title="${r.description}">${r.description}</td>
          <td class="text-right font-display font-semibold">${App.money(r.amount)}</td>
          <td>${r.dept}</td>
          <td>${App.emptyDash(r.sender)}</td>
        </tr>`).join('');
    }

    function renderCards() {
      const wrap = document.getElementById('mobileCards');
      if (tableData.length === 0) { wrap.innerHTML = ''; return; }
      wrap.innerHTML = tableData.map((r) => `
        <div class="mobile-item-card">
          <div class="flex justify-between mb-1"><span class="font-semibold text-sm">${r.vendor}</span><span class="font-display font-semibold text-sm">${App.money(r.amount)}</span></div>
          <p class="text-xs text-[var(--color-text-muted)] mb-1">${r.description}</p>
          <div class="text-xs text-[var(--color-text-muted)]">${r.dept} · ${App.emptyDash(r.sender)}</div>
          <div class="text-xs text-[var(--color-text-muted)]">รับ ${App.thaiDate(r.receive_date)} · ใบขอเบิก ${App.emptyDash(r.request_no_display)} · ฎีกา ${App.emptyDash(r.dk_no_display)}</div>
        </div>`).join('');
    }

    function doPrint() {
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      document.getElementById('printArea').innerHTML = `
        <h2 style="font-weight:700;font-size:18px;margin-bottom:4px">${MODE_LABEL[mode]}</h2>
        <p style="font-size:12px;margin-bottom:12px;color:#666">ช่วงวันที่ ${App.thaiDate(startDate)} - ${App.thaiDate(endDate)}</p>
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead><tr style="background:#EDE6FB">
            <th style="border:1px solid #ccc;padding:6px;text-align:left">วันที่รับเข้าระบบ</th>
            <th style="border:1px solid #ccc;padding:6px;text-align:left">เลขที่ใบขอเบิก</th>
            <th style="border:1px solid #ccc;padding:6px;text-align:left">เลขที่ฎีกา</th>
            <th style="border:1px solid #ccc;padding:6px;text-align:left">ชื่อเจ้าหนี้/บริษัท</th>
            <th style="border:1px solid #ccc;padding:6px;text-align:left">รายการ</th>
            <th style="border:1px solid #ccc;padding:6px;text-align:right">จำนวนเงิน</th>
            <th style="border:1px solid #ccc;padding:6px;text-align:left">หน่วยงาน</th>
          </tr></thead>
          <tbody>
            ${tableData.map((r) => `
              <tr>
                <td style="border:1px solid #ccc;padding:5px">${App.thaiDate(r.receive_date)}</td>
                <td style="border:1px solid #ccc;padding:5px">${App.emptyDash(r.request_no_display)}</td>
                <td style="border:1px solid #ccc;padding:5px">${App.emptyDash(r.dk_no_display)}</td>
                <td style="border:1px solid #ccc;padding:5px">${r.vendor}</td>
                <td style="border:1px solid #ccc;padding:5px">${r.description}</td>
                <td style="border:1px solid #ccc;padding:5px;text-align:right">${App.money(r.amount)}</td>
                <td style="border:1px solid #ccc;padding:5px">${r.dept}</td>
              </tr>`).join('')}
          </tbody>
        </table>`;
      document.getElementById('printArea').classList.remove('hidden');
      window.print();
      document.getElementById('printArea').classList.add('hidden');
    }
  </script>
</body>
</html>
