<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>บันทึกการจ่าย - SRDH PAY</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="min-h-screen">
  <div id="header-placeholder"></div>
  <div class="flex">
    <div id="sidebar-placeholder"></div>

    <main class="flex-1 p-4 md:p-6 max-w-full overflow-x-hidden space-y-4">
      <div>
        <h2 class="font-display font-bold text-xl">บันทึกการจ่าย</h2>
        <p class="text-sm text-[var(--color-text-muted)]">บันทึกการจ่ายเช็ค</p>
      </div>

      <div class="card p-4 space-y-3">
        <div class="flex flex-wrap gap-2">
          <button id="btnLoad" class="btn btn-outline">โหลดรายการสถานะ "อนุมัติ"</button>
          <div class="flex-1"></div>
          <button id="btnPay" class="btn btn-primary" disabled>จ่ายเช็ค</button>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-2">
          <input type="text" id="sDkNo" placeholder="เลขที่ฎีกา" class="px-3 py-2 rounded-lg border border-[var(--color-border)] bg-transparent text-sm">
          <select id="sMoneyType" class="px-3 py-2 rounded-lg border border-[var(--color-border)] bg-transparent text-sm"><option value="">ประเภทเงิน: ทั้งหมด</option></select>
          <select id="sDept" class="px-3 py-2 rounded-lg border border-[var(--color-border)] bg-transparent text-sm"><option value="">หน่วยงาน: ทั้งหมด</option></select>
          <input type="text" id="sVendor" placeholder="ชื่อเจ้าหนี้/บริษัท" class="px-3 py-2 rounded-lg border border-[var(--color-border)] bg-transparent text-sm">
        </div>
        <span id="modeLabel" class="text-xs text-[var(--color-text-muted)] block">กดปุ่ม "โหลดรายการ" เพื่อเริ่มต้น</span>
      </div>

      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th><input type="checkbox" id="chkAll" class="rounded"></th>
              <th>สถานะ</th><th>เลขที่ลงทะเบียน/วันที่</th><th>เลขที่รับ/วันที่รับ</th>
              <th>เลขที่ใบขอเบิก/เลขที่ฎีกา</th><th>ประเภทเงิน/หน่วยงาน</th>
              <th>เจ้าหนี้/รายการ</th><th class="text-right">จำนวนเงิน</th>
            </tr>
          </thead>
          <tbody id="tableBody"><tr><td colspan="8" class="text-center py-12 text-[var(--color-text-muted)]">กดปุ่ม "โหลดรายการสถานะ อนุมัติ" เพื่อเริ่มต้น</td></tr></tbody>
        </table>
      </div>
      <div id="mobileCards" class="mobile-cards"></div>
    </main>
  </div>

  <script src="js/api.js"></script>
  
  <script>
    if (App.requireLogin()) { App.loadComponents(); init(); }

    let tableData = [];
    let selectedUuids = new Set();

    async function init() {
      try {
        const [mtRes, dRes] = await Promise.all([api.get('/api/settings/money-types', { all: '1' }), api.get('/api/settings/depts', { all: '1' })]);
        fillSelect('sMoneyType', mtRes.data, 'ประเภทเงิน: ทั้งหมด');
        fillSelect('sDept', dRes.data, 'หน่วยงาน: ทั้งหมด');
      } catch (err) { App.errorAlert(err); }
      bindEvents();
    }

    function fillSelect(id, items, label) {
      document.getElementById(id).innerHTML = `<option value="">${label}</option>` + items.map((i) => `<option value="${i.name}">${i.name}</option>`).join('');
    }

    function bindEvents() {
      document.getElementById('btnLoad').addEventListener('click', loadData);
      document.getElementById('btnPay').addEventListener('click', doPay);
      document.getElementById('chkAll').addEventListener('change', (e) => {
        document.querySelectorAll('.row-cb').forEach((cb) => { cb.checked = e.target.checked; toggleSet(cb.value, e.target.checked); });
        updateBtn();
      });
      ['sDkNo', 'sVendor'].forEach((id) => document.getElementById(id).addEventListener('input', App.debounce(loadData, 450)));
      ['sMoneyType', 'sDept'].forEach((id) => document.getElementById(id).addEventListener('change', loadData));
    }

    function toggleSet(uuid, checked) { if (checked) selectedUuids.add(uuid); else selectedUuids.delete(uuid); }

    async function loadData() {
      selectedUuids = new Set();
      document.getElementById('tableBody').innerHTML = `<tr><td colspan="8"><div class="skeleton h-6 my-1"></div></td></tr>`.repeat(4);
      try {
        const res = await api.get('/api/payment/list', {
          dk_no: document.getElementById('sDkNo').value.trim(),
          money_type: document.getElementById('sMoneyType').value,
          dept: document.getElementById('sDept').value,
          vendor: document.getElementById('sVendor').value.trim()
        });
        tableData = res.data;
        document.getElementById('modeLabel').textContent = `แสดง ${res.data.length} รายการ`;
        document.getElementById('chkAll').checked = false;
        renderTable(); renderCards(); updateBtn();
      } catch (err) { App.errorAlert(err); }
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      if (tableData.length === 0) { tbody.innerHTML = `<tr><td colspan="8" class="text-center py-10 text-[var(--color-text-muted)]">ไม่พบรายการ</td></tr>`; return; }
      tbody.innerHTML = tableData.map((r) => `
        <tr>
          <td><input type="checkbox" class="row-cb rounded" value="${r.uuid}" ${selectedUuids.has(r.uuid) ? 'checked' : ''}></td>
          <td>${App.statusBadge(r.status)}</td>
          <td><div class="text-xs">${App.emptyDash(r.register_no_display)}</div><div class="text-xs text-[var(--color-text-muted)]">${App.thaiDate(r.register_date)}</div></td>
          <td><div class="text-xs">${App.emptyDash(r.receive_no_display)}</div><div class="text-xs text-[var(--color-text-muted)]">${App.thaiDate(r.receive_date)}</div></td>
          <td><div class="text-xs">${App.emptyDash(r.request_no_display)}</div><div class="text-xs text-[var(--color-text-muted)]">${App.emptyDash(r.dk_no_display)}</div></td>
          <td><div class="text-xs">${r.money_type}</div><div class="text-xs text-[var(--color-text-muted)]">${r.dept}</div></td>
          <td><div class="font-semibold text-xs">${r.vendor}</div><div class="text-xs text-[var(--color-text-muted)] max-w-xs truncate">${r.description}</div></td>
          <td class="text-right font-display font-semibold text-sm whitespace-nowrap">${App.money(r.amount)}</td>
        </tr>`).join('');
      document.querySelectorAll('.row-cb').forEach((cb) => cb.addEventListener('change', (e) => {
        toggleSet(e.target.value, e.target.checked);
        document.getElementById('chkAll').checked = selectedUuids.size === tableData.length;
        updateBtn();
      }));
    }

    function renderCards() {
      const wrap = document.getElementById('mobileCards');
      if (tableData.length === 0) { wrap.innerHTML = ''; return; }
      wrap.innerHTML = tableData.map((r) => `
        <div class="mobile-item-card">
          <div class="flex justify-between mb-1"><span class="font-semibold text-sm">${r.vendor}</span>${App.statusBadge(r.status)}</div>
          <p class="text-xs text-[var(--color-text-muted)] mb-1">${r.description}</p>
          <div class="text-xs flex justify-between"><span>${r.money_type} · ${r.dept}</span><span class="font-semibold">${App.money(r.amount)}</span></div>
          <div class="text-xs text-[var(--color-text-muted)] mt-1">ฎีกา ${App.emptyDash(r.dk_no_display)}</div>
          <label class="flex items-center gap-2 mt-2 text-xs"><input type="checkbox" class="row-cb-m rounded" value="${r.uuid}" ${selectedUuids.has(r.uuid) ? 'checked' : ''}> เลือกรายการนี้</label>
        </div>`).join('');
      document.querySelectorAll('.row-cb-m').forEach((cb) => cb.addEventListener('change', (e) => { toggleSet(e.target.value, e.target.checked); updateBtn(); }));
    }

    function updateBtn() { document.getElementById('btnPay').disabled = selectedUuids.size === 0; }

    async function doPay() {
      const uuids = [...selectedUuids];
      const total = tableData.filter((r) => uuids.includes(r.uuid)).reduce((s, r) => s + Number(r.amount), 0);

      const confirm = await Swal.fire({
        title: `ยืนยันจ่ายเช็ค ${uuids.length} รายการ?`,
        html: `<p class="text-sm">ยอดรวม <strong>${App.money(total)}</strong> บาท</p>`,
        icon: 'warning', showCancelButton: true,
        confirmButtonText: 'ยืนยันจ่ายเช็ค', cancelButtonText: 'ยกเลิก', confirmButtonColor: '#9F7AEA'
      });
      if (!confirm.isConfirmed) return;

      App.showLoading('กำลังบันทึก...');
      try {
        await api.post('/api/payment/pay', { uuids });
        App.closeLoading();
        App.toast(`บันทึกการจ่ายสำเร็จ ${uuids.length} รายการ`, 'success');
        selectedUuids = new Set();
        loadData();
      } catch (err) { App.closeLoading(); App.errorAlert(err); }
    }
  </script>
</body>
</html>
