<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srdh-Check | ระบบจัดการข้อมูลเจ้าหน้าที่</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        [data-theme="dark"] {
        --bg-light: #1A1A2E;
        --card-light: #16213E;
        --text-primary: #E0E7FF;
        --text-secondary: #94A3B8;
        }

        body { 
            font-family: 'Prompt', 'Noto Sans Thai', sans-serif; 
            background-color: var(--bg-light);
            color: var(--text-primary);
        }
    
        h1, h2, h3, h4 { font-family: 'Prompt', sans-serif; }
    
        /* Card Style */
        .card-custom {
            background: var(--card-light);
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgb(124 58 237 / 0.1);
            transition: all 0.3s ease;
        }
    
        .card-custom:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(124 58 237 / 0.15);
        }
    
        /* Input Styles */
        .input-field { 
            @apply w-full p-3 border border-purple-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent transition-all duration-300 disabled:bg-gray-50 disabled:text-gray-400 shadow-sm; 
            background-color: #ffffff;
        }
    
        /* Button Style */
        .btn-primary-gradient {
            background: linear-gradient(135deg, #7C3AED, #A855F7);
            color: white;
            transition: all 0.3s ease;
            @apply px-6 py-3 rounded-xl font-semibold shadow-lg flex items-center justify-center;
        }
    
        .btn-primary-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(124 58 237 / 0.4);
            filter: brightness(1.1);
        }
    
        .btn-primary-gradient:active { transform: translateY(0); }
    
        .purple-gradient-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
        }
    
        /* Status Badges (Prepared for future use) */
        .status-badge { @apply px-3 py-1 rounded-full text-xs font-bold; }
        .status-approved { background-color: #D1FAE5; color: #10B981; }
    
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Login Section -->
    <div id="loginSection" class="w-full max-w-md card-custom p-8 animate__animated animate__fadeIn">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-purple-100 rounded-3xl mb-4 shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-purple-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.040L3 5.618V12c0 5.234 3.486 9.715 8 11.056 4.514-1.341 8-5.822 8-11.056V5.618l-1.382-.674z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-purple-900">Srdh-Check</h1>
            <p class="text-gray-500 mt-2">กรุณาลงชื่อเข้าใช้งานระบบ</p>
        </div>
    
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-purple-800 mb-2 ml-1">อีเมลเจ้าหน้าที่</label>
                <input type="email" id="loginEmail" required class="input-field" placeholder="example@srdh.com">
            </div>
            <div>
                <label class="block text-sm font-semibold text-purple-800 mb-2 ml-1">รหัสผ่าน</label>
                <input type="password" id="loginPassword" required class="input-field" placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary-gradient w-full">
                <span>เข้าสู่ระบบ</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-2" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M3 3a1 1 0 011 1v12a1 1 0 11-2 0V4a1 1 0 011-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd" />
                </svg>
            </button>
        </form>
    </div>
    
    <!-- Profile Section -->
    <div id="profileSection" class="hidden w-full max-w-4xl card-custom overflow-hidden animate__animated animate__fadeIn">
        <div class="purple-gradient-header p-10 text-white">
            <div class="flex flex-col sm:flex-row justify-between items-center gap-6">
                <div class="text-center sm:text-left">
                    <div class="flex items-center justify-center sm:justify-start gap-3 mb-2">
                        <h2 class="text-3xl font-bold">ข้อมูลส่วนตัวเจ้าหน้าที่</h2>
                        <span class="status-badge status-approved">ใช้งานปกติ</span>
                    </div>
                    <p id="welcomeText" class="text-purple-100 text-lg opacity-90"></p>
                </div>
                <button onclick="handleLogout()" class="bg-white/20 hover:bg-red-500/40 backdrop-blur-md px-6 py-2.5 rounded-xl text-sm font-semibold transition-all border border-white/30 flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    ออกจากระบบ
                </button>
            </div>
        </div>
    
        <div class="p-10 bg-white">
            <form id="profileForm" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Read-only Fields -->
                    <div class="w-full">
                        <label class="block text-xs font-bold text-purple-400 uppercase tracking-wider mb-2 ml-1">อีเมล (แก้ไขไม่ได้)</label>
                        <input type="text" id="displayEmail" disabled class="input-field bg-gray-50">
                    </div>
                    <div class="w-full">
                        <label class="block text-xs font-bold text-purple-400 uppercase tracking-wider mb-2 ml-1">หน่วยงาน (แก้ไขไม่ได้)</label>
                        <input type="text" id="displayDept" disabled class="input-field bg-gray-50">
                    </div>
    
                    <!-- Editable Fields -->
                    <div class="w-full">
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">ชื่อ-นามสกุล</label>
                        <input type="text" id="displayUsername" disabled class="input-field editable">
                    </div>
                    <div class="w-full">
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">ตำแหน่ง</label>
                        <input type="text" id="displayPosition" disabled class="input-field editable">
                    </div>
                </div>
    
                <!-- Password Change Section -->
                <div id="passwordArea" class="hidden animate__animated animate__fadeIn border-t border-purple-50 pt-8">
                    <h3 class="text-base font-bold text-purple-600 mb-6 flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                        </svg>
                        เปลี่ยนรหัสผ่านใหม่
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="w-full">
                            <label class="block text-xs font-semibold text-gray-500 mb-2 ml-1">รหัสผ่านใหม่</label>
                            <input type="password" id="newPassword" class="input-field" placeholder="เว้นว่างไว้ถ้าไม่ต้องการเปลี่ยน">
                        </div>
                        <div class="w-full">
                            <label class="block text-xs font-semibold text-gray-500 mb-2 ml-1">ยืนยันรหัสผ่านใหม่</label>
                            <input type="password" id="confirmPassword" class="input-field" placeholder="พิมพ์รหัสผ่านใหม่อีกครั้ง">
                        </div>
                    </div>
                </div>
    
                <!-- Buttons Area -->
                <div class="flex flex-col sm:flex-row justify-end gap-4 pt-6">
                    <button type="button" id="editBtn" onclick="toggleEditMode(true)" class="px-10 py-3.5 border-2 border-purple-500 text-purple-600 rounded-xl font-bold hover:bg-purple-50 transition-all flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                        </svg>
                        แก้ไขข้อมูล
                    </button>
                    <button type="button" id="cancelBtn" onclick="toggleEditMode(false)" class="hidden px-10 py-3.5 border-2 border-gray-200 text-gray-500 rounded-xl font-bold hover:bg-gray-50 transition-all">
                        ยกเลิก
                    </button>
                    <button type="submit" id="saveBtn" class="hidden btn-primary-gradient px-12">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>
                        บันทึกข้อมูล
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        /**
         * การตั้งค่าระบบ
         */
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyTkeYoxv9Tl2Zj_et6Ljq9EAEu-ENi6iokLlAJ6CpbPhj3hH712xkev5G9QuxDhPbCQQ/exec"; 
        const API_KEY = "206360sirindhorn"; 
    
        let userSession = JSON.parse(localStorage.getItem('srdh_session')) || null;
    
        window.onload = () => {
            if (userSession) {
                renderProfileView();
            }
        };
    
        // จัดการ Login
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
    
            loadingStatus(true, "กำลังตรวจสอบข้อมูล...");
            const res = await callBackend('login', { email, password });
            loadingStatus(false);
    
            if (res.success) {
                userSession = res.user;
                localStorage.setItem('srdh_session', JSON.stringify(userSession));
                Swal.fire({
                    icon: 'success',
                    title: 'สำเร็จ',
                    text: `ยินดีต้อนรับ คุณ${res.user.username} เข้าสู่ระบบ`,
                    timer: 2000,
                    showConfirmButton: false,
                    customClass: { popup: 'rounded-3xl' }
                }).then(renderProfileView);
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'ล้มเหลว',
                    text: res.message,
                    customClass: { popup: 'rounded-3xl' }
                });
            }
        };
    
        // ดึงข้อมูล Profile
        async function renderProfileView() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('profileSection').classList.remove('hidden');
            
            loadingStatus(true, "กำลังโหลดข้อมูลส่วนตัว...");
            const res = await callBackend('getUserData', { email: userSession.email });
            loadingStatus(false);
    
            if (res.success) {
                document.getElementById('welcomeText').innerText = `ยินดีต้อนรับ คุณ${res.data.username}`;
                document.getElementById('displayEmail').value = res.data.email;
                document.getElementById('displayUsername').value = res.data.username;
                document.getElementById('displayPosition').value = res.data.position;
                document.getElementById('displayDept').value = res.data.dept;
            }
        }
    
        // สลับโหมดแก้ไข
        function toggleEditMode(isEditing) {
            const fields = document.querySelectorAll('.editable');
            fields.forEach(f => f.disabled = !isEditing);
            
            document.getElementById('passwordArea').classList.toggle('hidden', !isEditing);
            document.getElementById('editBtn').classList.toggle('hidden', isEditing);
            document.getElementById('saveBtn').classList.toggle('hidden', !isEditing);
            document.getElementById('cancelBtn').classList.toggle('hidden', !isEditing);
            
            if (!isEditing) {
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
            }
        }
    
        // จัดการบันทึกข้อมูล
        document.getElementById('profileForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const pass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
    
            if (pass && pass !== confirm) {
                return Swal.fire({
                    icon: 'warning',
                    title: 'ตรวจสอบ',
                    text: 'การยืนยันรหัสผ่านใหม่ไม่ตรงกัน',
                    customClass: { popup: 'rounded-3xl' }
                });
            }
    
            const ask = await Swal.fire({
                title: 'ยืนยันการบันทึก?',
                text: "คุณต้องการเปลี่ยนแปลงข้อมูลส่วนตัวใช่หรือไม่",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#7c3aed',
                confirmButtonText: 'ใช่, บันทึกเลย',
                cancelButtonText: 'ยกเลิก',
                customClass: { popup: 'rounded-3xl' }
            });
    
            if (!ask.isConfirmed) return;
    
            loadingStatus(true, "กำลังบันทึกข้อมูล...");
            const payload = {
                email: userSession.email,
                username: document.getElementById('displayUsername').value,
                position: document.getElementById('displayPosition').value,
                password: pass || null
            };
    
            const res = await callBackend('updateUser', payload);
            loadingStatus(false);
    
            if (res.success) {
                Swal.fire({
                    icon: 'success',
                    title: 'เรียบร้อย',
                    text: 'บันทึกข้อมูลของคุณแล้ว',
                    customClass: { popup: 'rounded-3xl' }
                });
                userSession.username = payload.username;
                localStorage.setItem('srdh_session', JSON.stringify(userSession));
                toggleEditMode(false);
                renderProfileView();
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'เกิดข้อผิดพลาด',
                    text: res.message,
                    customClass: { popup: 'rounded-3xl' }
                });
            }
        };
    
        // ออกจากระบบ
        async function handleLogout() {
            loadingStatus(true, "คุณกำลังออกจากระบบ...");
            await callBackend('logout', { email: userSession.email });
            localStorage.removeItem('srdh_session');
            setTimeout(() => {
                loadingStatus(false);
                location.reload();
            }, 1000);
        }
    
        // ฟังก์ชันสื่อสารกับ GAS
        async function callBackend(action, payload) {
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action, apiKey: API_KEY, payload })
                });
                return await response.json();
            } catch (err) {
                console.error("API Error:", err);
                return { success: false, message: "ไม่สามารถเชื่อมต่อ Server ได้" };
            }
        }
    
        function loadingStatus(show, text = 'กำลังประมวลผล...') {
            if (show) {
                Swal.fire({
                    title: text,
                    allowOutsideClick: false,
                    showConfirmButton: false,
                    didOpen: () => Swal.showLoading(),
                    customClass: { popup: 'rounded-3xl' }
                });
            } else {
                Swal.close();
            }
        }
    </script>
</body>
</html>
