<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srdh-Check | ระบบจัดการข้อมูลเจ้าหน้าที่</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --primary: #7C3AED; --bg-light: #F3E8FF; }
        body { font-family: 'Prompt', sans-serif; background-color: var(--bg-light); overflow-x: hidden; }
        .purple-gradient { background: linear-gradient(135deg, #7C3AED, #A855F7); }
        .card-shadow { box-shadow: 0 10px 15px -3px rgb(124 58 237 / 0.1); }
        .input-field { @apply w-full p-3 border border-purple-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 transition-all; }
        #sidebar { transition: all 0.3s ease; z-index: 50; }
        .sidebar-closed { transform: translateX(-100%); }
        .menu-item { @apply flex items-center px-6 py-4 text-gray-600 hover:bg-purple-50 hover:text-purple-700 cursor-pointer border-l-4 border-transparent; }
        .menu-item.active { @apply bg-purple-100 text-purple-700 border-purple-600; }
        .overlay { background: rgba(0,0,0,0.5); display: none; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div id="overlay" class="overlay fixed inset-0 z-40" onclick="toggleSidebar()"></div>

    <div id="loginSection" class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white rounded-3xl card-shadow p-8 animate__animated animate__fadeIn">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-purple-700">Srdh-Check</h1>
                <p class="text-gray-400 mt-2">ลงชื่อเข้าใช้งานระบบ</p>
            </div>
            <form id="loginForm" class="space-y-5">
                <input type="email" id="loginEmail" placeholder="อีเมล" required class="input-field">
                <input type="password" id="loginPassword" placeholder="รหัสผ่าน" required class="input-field">
                <button type="submit" class="w-full py-4 purple-gradient text-white rounded-xl font-bold shadow-lg">เข้าสู่ระบบ</button>
            </form>
        </div>
    </div>

    <div id="dashboardSection" class="hidden flex min-h-screen">
        <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 w-64 bg-white shadow-2xl sidebar-closed lg:translate-x-0">
            <div class="p-6 border-b"><h2 class="text-2xl font-bold text-purple-700">Srdh-Check</h2></div>
            <nav id="sidebarMenu" class="mt-4"></nav>
        </aside>

        <main class="flex-1 flex flex-col min-w-0">
            <header class="bg-white p-4 shadow-sm flex items-center justify-between">
                <button onclick="toggleSidebar()" class="lg:hidden p-2">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
                <div class="flex items-center gap-3">
                    <span id="navUserName" class="font-medium"></span>
                    <div id="userInitial" class="w-10 h-10 purple-gradient rounded-full flex items-center justify-center text-white font-bold"></div>
                </div>
            </header>
            <div id="mainContent" class="p-4 lg:p-8 flex-1"></div>
        </main>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz59v5eU38mdlA9eoqxH9zyoVB_PQB5h9YWLh7LwFw8we8NT5ganMerJUbUNBSZQ2oZiQ/exec";
        const API_KEY = "206360sirindhorn";
        let currentUser = JSON.parse(localStorage.getItem('srdh_session')) || null;

        window.onload = () => { if (currentUser) showDashboard(); };

        async function callBackend(action, payload = {}) {
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        action, 
                        apiKey: API_KEY, 
                        requestorEmail: currentUser?.email || '',
                        payload 
                    })
                });
                return await response.json();
            } catch (err) {
                Swal.fire('Error', 'การเชื่อมต่อผิดพลาด', 'error');
                return { success: false };
            }
        }

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            loadingStatus(true, "กำลังตรวจสอบ...");
            const res = await callBackend('login', { 
                email: document.getElementById('loginEmail').value, 
                password: document.getElementById('loginPassword').value 
            });
            loadingStatus(false);
            if (res.success) {
                currentUser = res.user;
                localStorage.setItem('srdh_session', JSON.stringify(currentUser));
                showDashboard();
            } else {
                Swal.fire('ล้มเหลว', res.message, 'error');
            }
        };

        function showDashboard() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            document.getElementById('navUserName').innerText = currentUser.username;
            document.getElementById('userInitial').innerText = currentUser.username.charAt(0);
            renderSidebar();
            showSection('profile');
        }

        function renderSidebar() {
            const menu = document.getElementById('sidebarMenu');
            let html = `<div class="menu-item" id="m-profile" onclick="showSection('profile')">ข้อมูลส่วนตัว</div>`;
            if (currentUser.role === 'admin') {
                html += `<div class="menu-item" id="m-admin" onclick="showSection('admin_users')">จัดการผู้ใช้งาน</div>`;
            }
            html += `<div class="menu-item text-red-500 mt-10" onclick="handleLogout()">ออกจากระบบ</div>`;
            menu.innerHTML = html;
        }

        async function showSection(section) {
            const container = document.getElementById('mainContent');
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            const activeMenu = document.getElementById(`m-${section === 'admin_users' ? 'admin' : 'profile'}`);
            if(activeMenu) activeMenu.classList.add('active');

            if (section === 'profile') {
                container.innerHTML = `
                    <div class="max-w-2xl bg-white rounded-3xl p-8 card-shadow animate__animated animate__fadeIn">
                        <h2 class="text-2xl font-bold mb-6">ข้อมูลส่วนตัว</h2>
                        <div class="space-y-4">
                            <div><label class="text-xs text-gray-400">อีเมล</label><input class="input-field bg-gray-50" value="${currentUser.email}" disabled></div>
                            <div><label class="text-xs text-gray-400">ชื่อ-นามสกุล</label><input id="p_name" class="input-field" value="${currentUser.username}"></div>
                            <div><label class="text-xs text-gray-400">ตำแหน่ง</label><input id="p_pos" class="input-field" value="${currentUser.position || ''}"></div>
                            <button onclick="updateProfile()" class="w-full py-3 purple-gradient text-white rounded-xl font-bold shadow-md">บันทึกข้อมูล</button>
                        </div>
                    </div>`;
            } else if (section === 'admin_users') {
                container.innerHTML = `<div class="text-center py-10">กำลังดึงข้อมูล...</div>`;
                const res = await callBackend('adminGetAllUsers');
                if (!res.success) return;
                container.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold">จัดการผู้ใช้งาน</h2>
                        <button onclick="openAddUserModal()" class="px-4 py-2 bg-green-500 text-white rounded-xl text-sm font-bold">+ เพิ่มผู้ใช้</button>
                    </div>
                    <div class="bg-white rounded-3xl card-shadow overflow-x-auto">
                        <table class="w-full text-left text-sm min-w-[600px]">
                            <thead class="bg-purple-50">
                                <tr><th class="p-4">ชื่อ</th><th class="p-4">อีเมล</th><th class="p-4">สถานะ</th><th class="p-4">จัดการ</th></tr>
                            </thead>
                            <tbody>
                                ${res.data.map(u => `
                                    <tr class="border-b hover:bg-gray-50">
                                        <td class="p-4">${u.username}</td><td class="p-4">${u.email}</td>
                                        <td class="p-4"><span class="px-2 py-1 rounded-full text-[10px] ${u.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${u.status}</span></td>
                                        <td class="p-4 flex gap-2">
                                            <button onclick="resetPass('${u.email}')" class="text-blue-500 font-bold hover:underline">RESET & ACTIVATE</button>
                                            <button onclick="confirmDelete('${u.email}')" class="text-red-500 font-bold hover:underline">ลบ</button>
                                        </td>
                                    </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>`;
            }
        }

        async function updateProfile() {
            const payload = {
                email: currentUser.email,
                username: document.getElementById('p_name').value,
                position: document.getElementById('p_pos').value
            };
            loadingStatus(true, "กำลังบันทึก...");
            const res = await callBackend('updateProfile', payload);
            loadingStatus(false);
            if (res.success) {
                currentUser.username = payload.username;
                currentUser.position = payload.position;
                localStorage.setItem('srdh_session', JSON.stringify(currentUser));
                Swal.fire('สำเร็จ', 'บันทึกข้อมูลแล้ว', 'success').then(() => location.reload());
            }
        }

        async function resetPass(targetEmail) {
            const confirm = await Swal.fire({ 
                title: 'ยืนยันการรีเซ็ต?', 
                text: `รหัสผ่านจะถูกเปลี่ยนเป็น 1234 และ "เปิดใช้งาน" บัญชีของ ${targetEmail} ทันที`, 
                icon: 'warning', 
                showCancelButton: true,
                confirmButtonText: 'ตกลง',
                cancelButtonText: 'ยกเลิก'
            });
            if (confirm.isConfirmed) {
                loadingStatus(true, "กำลังรีเซ็ตและเปิดใช้งาน...");
                const res = await callBackend('adminUpdateUser', { targetEmail, resetPassword: true });
                loadingStatus(false);
                if (res.success) {
                    Swal.fire('สำเร็จ', res.message, 'success');
                    showSection('admin_users');
                }
            }
        }

        async function confirmDelete(targetEmail) {
            const { value: type } = await Swal.fire({
                title: 'จัดการสถานะผู้ใช้',
                input: 'select',
                inputOptions: { 'inactive': 'ระงับการใช้งาน', 'purge': 'ลบข้อมูลถาวร' },
                showCancelButton: true,
                confirmButtonText: 'ดำเนินการ'
            });
            if (type) {
                loadingStatus(true, "กำลังดำเนินการ...");
                const res = await callBackend('adminDeleteUser', { targetEmail, deleteType: type });
                loadingStatus(false);
                if (res.success) { Swal.fire('สำเร็จ', res.message, 'success'); showSection('admin_users'); }
            }
        }

        async function openAddUserModal() {
            const { value: form } = await Swal.fire({
                title: 'เพิ่มผู้ใช้',
                html: '<input id="s-email" class="swal2-input" placeholder="Email"><input id="s-name" class="swal2-input" placeholder="ชื่อ"><input id="s-dept" class="swal2-input" placeholder="หน่วยงาน">',
                preConfirm: () => ({ email: document.getElementById('s-email').value, username: document.getElementById('s-name').value, dept: document.getElementById('s-dept').value })
            });
            if (form) {
                loadingStatus(true, "กำลังบันทึก...");
                const res = await callBackend('adminCreateUser', form);
                loadingStatus(false);
                if (res.success) { Swal.fire('สำเร็จ', res.message, 'success'); showSection('admin_users'); }
                else { Swal.fire('ผิดพลาด', res.message, 'error'); }
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('sidebar-closed');
            document.getElementById('overlay').classList.toggle('active');
        }

        function handleLogout() {
            localStorage.removeItem('srdh_session');
            location.reload();
        }

        function loadingStatus(show, text) {
            if (show) Swal.fire({ title: text, allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            else Swal.close();
        }
    </script>
</body>
</html>
