<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srdh-Check v001.08 | Professional Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        :root { --primary: #7C3AED; --primary-dark: #6D28D9; --bg-main: #F8FAFC; }
        body { font-family: 'Prompt', sans-serif; background-color: var(--bg-main); }
        .glass-purple { background: linear-gradient(135deg, rgba(124, 58, 237, 0.9), rgba(168, 85, 247, 0.9)); backdrop-filter: blur(10px); }
        .sidebar-item { @apply flex items-center px-6 py-4 text-gray-500 hover:bg-purple-50 hover:text-purple-700 rounded-2xl transition-all duration-300 mx-2 mb-1 cursor-pointer; }
        .sidebar-item.active { @apply bg-purple-600 text-white shadow-lg shadow-purple-200; }
        .card { @apply bg-white rounded-[2rem] shadow-sm border border-gray-100 p-6; }
        .input-inline { @apply w-full bg-gray-50 border-none rounded-xl p-3 focus:ring-2 focus:ring-purple-400 transition-all text-gray-700; }
        .input-inline:disabled { @apply bg-transparent px-0 text-gray-900 font-semibold cursor-default; }
        .btn-edit { @apply text-purple-600 hover:text-purple-800 font-semibold text-sm flex items-center gap-1; }
        .btn-save { @apply bg-purple-600 text-white px-4 py-2 rounded-xl text-sm hover:bg-purple-700; }
        .btn-cancel { @apply text-gray-400 hover:text-gray-600 px-3 py-2 text-sm; }
    </style>
</head>
<body class="overflow-x-hidden text-gray-800">

    <div id="loginSection" class="min-h-screen flex items-center justify-center p-6 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">
        <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl p-10 animate__animated animate__zoomIn">
            <div class="text-center mb-10">
                <div class="w-20 h-20 bg-purple-600 rounded-3xl rotate-12 flex items-center justify-center mx-auto mb-6 shadow-xl shadow-purple-200">
                    <i class="fa-solid fa-shield-halved text-white text-3xl -rotate-12"></i>
                </div>
                <h1 class="text-3xl font-bold text-gray-900">Srdh-Check</h1>
                <p class="text-gray-400 mt-2">Sign in to continue</p>
            </div>
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm text-gray-500 ml-1 mb-2 font-medium">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="name@email.com" required class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:ring-4 focus:ring-purple-100 transition-all">
                </div>
                <div>
                    <label class="block text-sm text-gray-500 ml-1 mb-2 font-medium">Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:ring-4 focus:ring-purple-100 transition-all">
                </div>
                <button type="submit" class="w-full py-4 glass-purple text-white rounded-2xl font-bold shadow-xl shadow-purple-200 hover:scale-[1.02] active:scale-95 transition-all">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <div id="dashboardSection" class="hidden flex min-h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 w-72 bg-white border-r border-gray-100 z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
            <div class="p-8 mb-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-purple-600 rounded-xl flex items-center justify-center text-white">
                        <i class="fa-solid fa-bolt"></i>
                    </div>
                    <span class="text-2xl font-bold text-gray-900">Srdh-Check</span>
                </div>
            </div>
            <nav id="sidebarMenu"></nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col min-w-0 h-screen overflow-y-auto">
            <header class="bg-white/80 backdrop-blur-md sticky top-0 z-40 px-6 lg:px-10 py-4 flex items-center justify-between">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 text-gray-500 hover:bg-gray-100 rounded-xl">
                    <i class="fa-solid fa-bars-staggered text-xl"></i>
                </button>
                <div class="flex items-center gap-4">
                    <div class="text-right hidden sm:block">
                        <p id="navUserName" class="text-sm font-bold text-gray-900 leading-none"></p>
                        <p id="navUserRole" class="text-[10px] uppercase tracking-wider text-gray-400 mt-1"></p>
                    </div>
                    <div id="userInitial" class="w-12 h-12 glass-purple rounded-2xl flex items-center justify-center text-white font-bold text-lg shadow-lg shadow-purple-100"></div>
                </div>
            </header>

            <div id="mainContent" class="p-6 lg:p-10 max-w-6xl mx-auto w-full">
                <!-- Content will be injected here -->
            </div>
        </main>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwonIUc_G7DO8IwWwhJsXLrYl49D_xNyqcUyqW6fvYL78qnF-xfVX-vzK1FftOidTi4Dw/exec";
        const API_KEY = "206360sirindhorn";
        let currentUser = JSON.parse(localStorage.getItem('srdh_session')) || null;

        window.onload = () => { if (currentUser) showDashboard(); };

        async function callBackend(action, payload = {}) {
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        action, 
                        apiKey: API_KEY, 
                        requestorEmail: currentUser?.email || '',
                        payload 
                    })
                });
                return await response.json();
            } catch (err) {
                Swal.fire('Error', 'การเชื่อมต่อผิดพลาด', 'error');
                return { success: false };
            }
        }

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            loadingStatus(true, "กำลังตรวจสอบสิทธิ์...");
            const res = await callBackend('login', { 
                email: document.getElementById('loginEmail').value, 
                password: document.getElementById('loginPassword').value 
            });
            loadingStatus(false);
            if (res.success) {
                currentUser = res.user;
                localStorage.setItem('srdh_session', JSON.stringify(currentUser));
                showDashboard();
            } else {
                Swal.fire('ล้มเหลว', res.message, 'error');
            }
        };

        function showDashboard() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            document.getElementById('navUserName').innerText = currentUser.username;
            document.getElementById('navUserRole').innerText = currentUser.role;
            document.getElementById('userInitial').innerText = currentUser.username.charAt(0);
            renderSidebar();
            showSection('profile');
        }

        function renderSidebar() {
            const menu = document.getElementById('sidebarMenu');
            let html = `
                <div class="sidebar-item" id="m-profile" onclick="showSection('profile')">
                    <i class="fa-solid fa-user-circle mr-3"></i> ข้อมูลส่วนตัว
                </div>`;
            if (currentUser.role === 'admin') {
                html += `
                    <div class="sidebar-item" id="m-admin" onclick="showSection('admin_users')">
                        <i class="fa-solid fa-users-gear mr-3"></i> จัดการผู้ใช้งาน
                    </div>`;
            }
            html += `
                <div class="mt-10 pt-10 border-t border-gray-50">
                    <div class="sidebar-item text-red-500" onclick="handleLogout()">
                        <i class="fa-solid fa-arrow-right-from-bracket mr-3"></i> ออกจากระบบ
                    </div>
                </div>`;
            menu.innerHTML = html;
        }

        async function showSection(section) {
            const container = document.getElementById('mainContent');
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            const activeMenu = document.getElementById(`m-${section === 'admin_users' ? 'admin' : 'profile'}`);
            if(activeMenu) activeMenu.classList.add('active');

            if (section === 'profile') {
                container.innerHTML = `
                    <div class="max-w-3xl animate__animated animate__fadeIn">
                        <div class="flex items-center gap-4 mb-8">
                            <h2 class="text-3xl font-bold text-gray-900">ข้อมูลส่วนตัว</h2>
                            <span class="px-3 py-1 bg-purple-100 text-purple-600 rounded-full text-xs font-bold uppercase tracking-widest">${currentUser.role}</span>
                        </div>
                        
                        <div class="card space-y-2">
                            <!-- แถวที่ 1: Email (Read Only) -->
                            <div class="flex items-center justify-between py-4 border-b border-gray-50">
                                <div class="flex-1">
                                    <label class="text-xs text-gray-400 block mb-1">อีเมลผู้ใช้งาน</label>
                                    <div class="font-semibold text-gray-400">${currentUser.email}</div>
                                </div>
                                <div class="text-xs italic text-gray-300"><i class="fa-solid fa-lock"></i> แก้ไขไม่ได้</div>
                            </div>

                            <!-- แถวที่ 2: Name (Inline Edit) -->
                            <div id="row-name" class="flex items-center justify-between py-4 border-b border-gray-50">
                                <div class="flex-1 mr-4">
                                    <label class="text-xs text-gray-400 block mb-1">ชื่อ-นามสกุล</label>
                                    <input id="input-name" class="input-inline" value="${currentUser.username}" disabled>
                                </div>
                                <div id="ctrl-name">
                                    <button onclick="toggleEdit('name')" class="btn-edit"><i class="fa-solid fa-pen-to-square"></i> แก้ไข</button>
                                </div>
                            </div>

                            <!-- แถวที่ 3: Position (Inline Edit) -->
                            <div id="row-pos" class="flex items-center justify-between py-4 border-b border-gray-50">
                                <div class="flex-1 mr-4">
                                    <label class="text-xs text-gray-400 block mb-1">ตำแหน่ง</label>
                                    <input id="input-pos" class="input-inline" value="${currentUser.position || '-'}" disabled>
                                </div>
                                <div id="ctrl-pos">
                                    <button onclick="toggleEdit('pos')" class="btn-edit"><i class="fa-solid fa-pen-to-square"></i> แก้ไข</button>
                                </div>
                            </div>

                            <!-- แถวที่ 4: Dept (Read Only) -->
                            <div class="flex items-center justify-between py-4 border-b border-gray-50">
                                <div class="flex-1">
                                    <label class="text-xs text-gray-400 block mb-1">หน่วยงาน / แผนก</label>
                                    <div class="font-semibold text-gray-400">${currentUser.dept || '-'}</div>
                                </div>
                                <div class="text-xs italic text-gray-300"><i class="fa-solid fa-lock"></i> แก้ไขไม่ได้</div>
                            </div>

                            <!-- แถวที่ 5: Password (Special Edit) -->
                            <div id="row-pass" class="flex items-center justify-between py-4">
                                <div class="flex-1 mr-4">
                                    <label class="text-xs text-gray-400 block mb-1">รหัสผ่าน</label>
                                    <div id="pass-display" class="font-semibold text-gray-900 tracking-widest">••••••••</div>
                                    <div id="pass-inputs" class="hidden space-y-3 mt-2">
                                        <div class="relative">
                                            <input type="password" id="new-pw1" placeholder="รหัสผ่านใหม่" class="w-full bg-gray-50 border border-purple-100 rounded-xl p-3 focus:ring-2 focus:ring-purple-400 outline-none">
                                            <i class="fa-solid fa-eye absolute right-3 top-4 text-gray-300 cursor-pointer" onclick="toggleVisibility('new-pw1')"></i>
                                        </div>
                                        <div class="relative">
                                            <input type="password" id="new-pw2" placeholder="ยืนยันรหัสผ่านใหม่" class="w-full bg-gray-50 border border-purple-100 rounded-xl p-3 focus:ring-2 focus:ring-purple-400 outline-none">
                                            <i class="fa-solid fa-eye absolute right-3 top-4 text-gray-300 cursor-pointer" onclick="toggleVisibility('new-pw2')"></i>
                                        </div>
                                    </div>
                                </div>
                                <div id="ctrl-pass">
                                    <button onclick="toggleEdit('pass')" class="btn-edit"><i class="fa-solid fa-key"></i> เปลี่ยนรหัส</button>
                                </div>
                            </div>
                        </div>
                    </div>`;
            } else if (section === 'admin_users') {
                container.innerHTML = `<div class="text-center py-10"><i class="fa-solid fa-spinner fa-spin text-4xl text-purple-200"></i></div>`;
                const res = await callBackend('adminGetAllUsers');
                if (!res.success) return;
                
                container.innerHTML = `
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8 animate__animated animate__fadeIn">
                        <div>
                            <h2 class="text-3xl font-bold text-gray-900">จัดการผู้ใช้งาน</h2>
                            <p class="text-gray-400">พบเจ้าหน้าที่ทั้งหมด ${res.data.length} ท่าน</p>
                        </div>
                        <button onclick="openAddUserModal()" class="px-6 py-3 glass-purple text-white rounded-2xl font-bold shadow-lg flex items-center gap-2">
                            <i class="fa-solid fa-plus-circle"></i> เพิ่มผู้ใช้ใหม่
                        </button>
                    </div>
                    
                    <div class="card overflow-hidden !p-0 border-none shadow-xl">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead class="bg-gray-50 border-b border-gray-100">
                                    <tr>
                                        <th class="p-6 text-xs font-bold text-gray-400 uppercase tracking-wider">เจ้าหน้าที่</th>
                                        <th class="p-6 text-xs font-bold text-gray-400 uppercase tracking-wider">หน่วยงาน / ตำแหน่ง</th>
                                        <th class="p-6 text-xs font-bold text-gray-400 uppercase tracking-wider">สถานะ</th>
                                        <th class="p-6 text-xs font-bold text-gray-400 uppercase tracking-wider text-right">การจัดการ</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-50">
                                    ${res.data.map(u => `
                                        <tr class="hover:bg-purple-50/30 transition-all group">
                                            <td class="p-6">
                                                <div class="flex items-center gap-3">
                                                    <div class="w-10 h-10 bg-purple-100 text-purple-600 rounded-xl flex items-center justify-center font-bold">${u.username.charAt(0)}</div>
                                                    <div>
                                                        <div class="font-bold text-gray-900 group-hover:text-purple-700 transition-colors">${u.username}</div>
                                                        <div class="text-xs text-gray-400">${u.email}</div>
                                                    </div>
                                                </div>
                                            </td>
                                            <td class="p-6">
                                                <div class="text-sm font-medium text-gray-700">${u.dept || '-'}</div>
                                                <div class="text-xs text-gray-400">${u.position || '-'}</div>
                                            </td>
                                            <td class="p-6">
                                                <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase ${u.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                                    ${u.status}
                                                </span>
                                            </td>
                                            <td class="p-6 text-right space-x-2">
                                                <button onclick="adminEditUserModal('${u.email}', '${u.username}', '${u.dept}', '${u.position}', '${u.role}', '${u.status}')" class="text-gray-400 hover:text-purple-600 p-2"><i class="fa-solid fa-user-pen"></i></button>
                                                <button onclick="resetPass('${u.email}')" title="Reset Password" class="text-orange-400 hover:text-orange-600 p-2"><i class="fa-solid fa-rotate-left"></i></button>
                                                <button onclick="confirmDelete('${u.email}')" title="Delete User" class="text-red-300 hover:text-red-500 p-2"><i class="fa-solid fa-trash"></i></button>
                                            </td>
                                        </tr>`).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
            }
        }

        function toggleEdit(field) {
            const row = document.getElementById(`row-${field}`);
            const input = document.getElementById(`input-${field}`);
            const ctrl = document.getElementById(`ctrl-${field}`);

            if (field === 'pass') {
                document.getElementById('pass-display').classList.add('hidden');
                document.getElementById('pass-inputs').classList.remove('hidden');
                ctrl.innerHTML = `
                    <div class="flex gap-2">
                        <button onclick="savePass()" class="btn-save">บันทึก</button>
                        <button onclick="showSection('profile')" class="btn-cancel">ยกเลิก</button>
                    </div>`;
                return;
            }

            input.disabled = false;
            input.focus();
            ctrl.innerHTML = `
                <div class="flex gap-2">
                    <button onclick="saveInline('${field}')" class="btn-save">บันทึก</button>
                    <button onclick="showSection('profile')" class="btn-cancel">ยกเลิก</button>
                </div>`;
        }

        async function saveInline(field) {
            const value = document.getElementById(`input-${field}`).value;
            const payload = { email: currentUser.email };
            if (field === 'name') payload.username = value;
            if (field === 'pos') payload.position = value;

            loadingStatus(true, "กำลังบันทึก...");
            const res = await callBackend('updateProfile', payload);
            loadingStatus(false);
            
            if (res.success) {
                if(field === 'name') currentUser.username = value;
                if(field === 'pos') currentUser.position = value;
                localStorage.setItem('srdh_session', JSON.stringify(currentUser));
                Swal.fire({ title: 'สำเร็จ', text: 'บันทึกข้อมูลแล้ว', icon: 'success', timer: 1500, showConfirmButton: false }).then(() => showSection('profile'));
            }
        }

        async function savePass() {
            const pw1 = document.getElementById('new-pw1').value;
            const pw2 = document.getElementById('new-pw2').value;

            if (!pw1 || pw1.length < 4) return Swal.fire('ผิดพลาด', 'รหัสผ่านต้องมีอย่างน้อย 4 ตัวอักษร', 'error');
            if (pw1 !== pw2) return Swal.fire('ผิดพลาด', 'รหัสผ่านไม่ตรงกัน', 'error');

            loadingStatus(true, "กำลังเปลี่ยนรหัสผ่าน...");
            const res = await callBackend('updateProfile', { email: currentUser.email, newPassword: pw1 });
            loadingStatus(false);

            if (res.success) {
                Swal.fire('สำเร็จ', 'เปลี่ยนรหัสผ่านเรียบร้อยแล้ว', 'success').then(() => showSection('profile'));
            }
        }

        async function adminEditUserModal(email, name, dept, pos, role, status) {
            const { value: formValues } = await Swal.fire({
                title: 'แก้ไขข้อมูลผู้ใช้งาน',
                html: `
                    <div class="text-left space-y-4 p-2">
                        <div><label class="text-[10px] text-gray-400">ชื่อ-นามสกุล</label><input id="sw-name" class="swal2-input !m-0 !w-full" value="${name}"></div>
                        <div><label class="text-[10px] text-gray-400">หน่วยงาน (Admin แก้ไขได้)</label><input id="sw-dept" class="swal2-input !m-0 !w-full" value="${dept}"></div>
                        <div><label class="text-[10px] text-gray-400">ตำแหน่ง</label><input id="sw-pos" class="swal2-input !m-0 !w-full" value="${pos}"></div>
                        <div class="grid grid-cols-2 gap-2">
                            <div><label class="text-[10px] text-gray-400">สิทธิ์</label><select id="sw-role" class="swal2-input !m-0 !w-full"><option value="staff" ${role==='staff'?'selected':''}>Staff</option><option value="admin" ${role==='admin'?'selected':''}>Admin</option></select></div>
                            <div><label class="text-[10px] text-gray-400">สถานะ</label><select id="sw-status" class="swal2-input !m-0 !w-full"><option value="active" ${status==='active'?'selected':''}>Active</option><option value="inactive" ${status==='inactive'?'selected':''}>Inactive</option></select></div>
                        </div>
                    </div>`,
                showCancelButton: true,
                confirmButtonText: 'บันทึก',
                focusConfirm: false,
                preConfirm: () => {
                    return {
                        targetEmail: email,
                        username: document.getElementById('sw-name').value,
                        dept: document.getElementById('sw-dept').value,
                        position: document.getElementById('sw-pos').value,
                        role: document.getElementById('sw-role').value,
                        status: document.getElementById('sw-status').value
                    }
                }
            });

            if (formValues) {
                loadingStatus(true, "กำลังบันทึกข้อมูล...");
                const res = await callBackend('adminUpdateUser', formValues);
                loadingStatus(false);
                if (res.success) {
                    Swal.fire('สำเร็จ', 'อัปเดตข้อมูลเจ้าหน้าที่แล้ว', 'success');
                    showSection('admin_users');
                }
            }
        }

        async function openAddUserModal() {
            const { value: form } = await Swal.fire({
                title: 'เพิ่มผู้ใช้ใหม่',
                html: `
                    <div class="text-left space-y-4">
                        <input id="s-email" class="swal2-input !m-0 !w-full" placeholder="Email Address">
                        <input id="s-name" class="swal2-input !m-0 !w-full" placeholder="ชื่อ-นามสกุล">
                        <input id="s-dept" class="swal2-input !m-0 !w-full" placeholder="หน่วยงาน">
                        <input id="s-pos" class="swal2-input !m-0 !w-full" placeholder="ตำแหน่ง">
                    </div>`,
                confirmButtonText: 'ตกลง',
                preConfirm: () => ({ 
                    email: document.getElementById('s-email').value, 
                    username: document.getElementById('s-name').value, 
                    dept: document.getElementById('s-dept').value,
                    position: document.getElementById('s-pos').value
                })
            });
            if (form) {
                loadingStatus(true, "กำลังสร้างบัญชี...");
                const res = await callBackend('adminCreateUser', form);
                loadingStatus(false);
                if (res.success) { Swal.fire('สำเร็จ', res.message, 'success'); showSection('admin_users'); }
                else { Swal.fire('ผิดพลาด', res.message, 'error'); }
            }
        }

        function toggleVisibility(id) {
            const el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
        }

        async function resetPass(targetEmail) {
            const confirm = await Swal.fire({ 
                title: 'รีเซ็ตรหัสผ่าน?', 
                text: `เปลี่ยนรหัสผ่านเป็น 1234 และเปิดใช้งานบัญชีของ ${targetEmail}`, 
                icon: 'warning', 
                showCancelButton: true
            });
            if (confirm.isConfirmed) {
                loadingStatus(true, "กำลังดำเนินการ...");
                const res = await callBackend('adminUpdateUser', { targetEmail, resetPassword: true });
                loadingStatus(false);
                if (res.success) { Swal.fire('สำเร็จ', res.message, 'success'); showSection('admin_users'); }
            }
        }

        async function confirmDelete(targetEmail) {
            const { value: type } = await Swal.fire({
                title: 'ลบหรือระงับ?',
                input: 'select',
                inputOptions: { 'inactive': 'ระงับการใช้งาน', 'purge': 'ลบข้อมูลถาวร' },
                showCancelButton: true
            });
            if (type) {
                loadingStatus(true, "กำลังดำเนินการ...");
                const res = await callBackend('adminDeleteUser', { targetEmail, deleteType: type });
                loadingStatus(false);
                if (res.success) { Swal.fire('สำเร็จ', res.message, 'success'); showSection('admin_users'); }
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        }

        function handleLogout() {
            localStorage.removeItem('srdh_session');
            location.reload();
        }

        function loadingStatus(show, text) {
            if (show) Swal.fire({ title: text, allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            else Swal.close();
        }
    </script>
</body>
</html>
