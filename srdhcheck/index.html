<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srdh-Check | ระบบจัดการข้อมูล</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #7C3AED;
            --sidebar-width: 280px;
        }
        body { font-family: 'Prompt', sans-serif; background-color: #F9FAFB; }
        
        /* Sidebar Styles */
        .sidebar {
            width: var(--sidebar-width);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
        }
        .sidebar.closed { transform: translateX(-100%); }
        
        .nav-link {
            @apply flex items-center px-6 py-4 text-gray-400 hover:bg-purple-50 hover:text-purple-600 transition-all border-l-4 border-transparent;
        }
        .nav-link.active {
            @apply bg-purple-50 text-purple-600 border-purple-600 font-semibold;
        }

        .main-content { transition: margin-left 0.3s ease; }
        
        @media (min-width: 1024px) {
            .sidebar.closed + .main-content { margin-left: 0; }
            .main-content { margin-left: var(--sidebar-width); }
        }

        .card-animate { animation: fadeInUp 0.5s ease-out; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Overlay for mobile */
        .overlay { display: none; }
        .sidebar:not(.closed) ~ .overlay { display: block; }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- Login Page -->
    <div id="loginPage" class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-purple-600 to-blue-700">
        <div class="w-full max-w-md bg-white rounded-3xl p-8 shadow-2xl card-animate">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-purple-100 rounded-2xl mb-4 text-purple-600 text-4xl">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <h1 class="text-3xl font-bold text-gray-800">Srdh-Check</h1>
                <p class="text-gray-500">ลงชื่อเข้าใช้งานระบบจัดการเจ้าหน้าที่</p>
            </div>
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">อีเมล</label>
                    <input type="email" id="loginEmail" required class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none" placeholder="example@srdh.com">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">รหัสผ่าน</label>
                    <input type="password" id="loginPassword" required class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-purple-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-purple-700 transition-all flex items-center justify-center gap-2">
                    เข้าสู่ระบบ <i class="fas fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Dashboard Layout (Hidden by default) -->
    <div id="dashboardPage" class="hidden min-h-screen flex">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar fixed inset-y-0 left-0 bg-white shadow-xl flex flex-col closed lg:translate-x-0">
            <div class="p-8 border-b">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-purple-600 rounded-lg flex items-center justify-center text-white">
                        <i class="fas fa-check-double"></i>
                    </div>
                    <span class="text-xl font-bold text-gray-800 tracking-tight">Srdh-Check</span>
                </div>
            </div>
            
            <nav class="flex-1 mt-6">
                <button onclick="switchTab('profile')" id="btn-profile" class="nav-link w-full active">
                    <i class="fas fa-user-circle w-8"></i> ข้อมูลส่วนตัว
                </button>
                <button onclick="switchTab('admin')" id="btn-admin" class="nav-link w-full hidden">
                    <i class="fas fa-users-cog w-8"></i> จัดการผู้ใช้งาน
                </button>
                <div class="px-6 py-4 mt-10 border-t">
                    <button onclick="handleLogout()" class="flex items-center text-red-500 hover:text-red-700 font-semibold gap-3">
                        <i class="fas fa-sign-out-alt"></i> ออกจากระบบ
                    </button>
                </div>
            </nav>
        </aside>

        <!-- Main Area -->
        <main class="main-content flex-1 flex flex-col min-w-0 bg-gray-50">
            <!-- Header -->
            <header class="bg-white h-20 shadow-sm flex items-center justify-between px-6 lg:px-10 sticky top-0 z-40">
                <button onclick="toggleSidebar()" class="lg:hidden text-2xl text-gray-600">
                    <i class="fas fa-bars"></i>
                </button>
                <div id="pageTitle" class="text-xl font-semibold text-gray-800">ข้อมูลส่วนตัว</div>
                <div class="flex items-center gap-4">
                    <span id="headerUserName" class="hidden sm:block text-sm font-medium text-gray-600"></span>
                    <div id="roleBadge" class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider"></div>
                </div>
            </header>

            <!-- Content Area -->
            <div class="p-6 lg:p-10 flex-1 overflow-y-auto">
                
                <!-- Tab: Profile -->
                <div id="content-profile" class="max-w-4xl mx-auto space-y-6">
                    <div class="bg-white rounded-3xl p-8 shadow-sm">
                        <h2 class="text-2xl font-bold text-gray-800 mb-6">รายละเอียดผู้ใช้งาน</h2>
                        <form id="profileForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">อีเมล (ห้ามแก้ไข)</label>
                                <input type="text" id="p-email" disabled class="w-full p-3 bg-gray-50 border border-gray-100 rounded-xl text-gray-400">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-400 uppercase mb-2">หน่วยงาน (ห้ามแก้ไข)</label>
                                <input type="text" id="p-dept" disabled class="w-full p-3 bg-gray-50 border border-gray-100 rounded-xl text-gray-400">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-600 uppercase mb-2">ชื่อ-นามสกุล</label>
                                <input type="text" id="p-username" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-600 uppercase mb-2">ตำแหน่ง</label>
                                <input type="text" id="p-position" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none">
                            </div>
                            <div class="md:col-span-2 pt-6 border-t border-gray-50">
                                <h3 class="font-semibold text-purple-600 mb-4">เปลี่ยนรหัสผ่านใหม่ (เว้นว่างไว้หากไม่เปลี่ยน)</h3>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <input type="password" id="p-pass" placeholder="รหัสผ่านใหม่" class="w-full p-3 border border-gray-200 rounded-xl outline-none">
                                    <input type="password" id="p-confirm" placeholder="ยืนยันรหัสผ่านใหม่" class="w-full p-3 border border-gray-200 rounded-xl outline-none">
                                </div>
                            </div>
                            <div class="md:col-span-2 flex justify-end pt-4">
                                <button type="submit" class="bg-purple-600 text-white px-10 py-3 rounded-xl font-bold shadow-lg hover:bg-purple-700 transition-all">บันทึกการเปลี่ยนแปลง</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Tab: Admin Management -->
                <div id="content-admin" class="hidden space-y-6">
                    <div class="flex justify-between items-center flex-wrap gap-4">
                        <h2 class="text-2xl font-bold text-gray-800">จัดการข้อมูลเจ้าหน้าที่</h2>
                        <button onclick="openUserModal()" class="bg-green-500 text-white px-6 py-3 rounded-xl font-bold shadow-md hover:bg-green-600 transition-all flex items-center gap-2">
                            <i class="fas fa-plus"></i> เพิ่มผู้ใช้ใหม่
                        </button>
                    </div>
                    
                    <div class="bg-white rounded-3xl shadow-sm overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="bg-gray-50 border-b">
                                    <tr>
                                        <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">ชื่อ / อีเมล</th>
                                        <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">ตำแหน่ง / หน่วยงาน</th>
                                        <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">สิทธิ์</th>
                                        <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">สถานะ</th>
                                        <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase text-center">จัดการ</th>
                                    </tr>
                                </thead>
                                <tbody id="userTableBody" class="divide-y">
                                    <!-- User list will be injected here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </main>

        <!-- Modal Overlay for Mobile Sidebar -->
        <div onclick="toggleSidebar()" class="overlay fixed inset-0 bg-black/50 z-40 lg:hidden"></div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxVo9QyehrmzUQWtYYs86JXoe_SsOubGPTHe4NoQDH-pnhDLnQmrg7xW9EHF3RWBBtboQ/exec"; 
        const API_KEY = "206360sirindhorn"; 
        
        let session = JSON.parse(localStorage.getItem('srdh_user')) || null;

        window.onload = () => {
            if (session) initDashboard();
        };

        // --- Core Functions ---
        async function callAPI(action, payload = {}) {
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        action, 
                        apiKey: API_KEY, 
                        requestorEmail: session ? session.email : '',
                        payload 
                    })
                });
                return await response.json();
            } catch (err) {
                console.error(err);
                return { success: false, message: "การเชื่อมต่อผิดพลาด" };
            }
        }

        function showLoading(text = 'กำลังโหลด...') {
            Swal.fire({ title: text, allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        }

        // --- Auth ---
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            showLoading('กำลังเข้าสู่ระบบ...');
            const res = await callAPI('login', { 
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            });
            Swal.close();

            if (res.success) {
                session = res.user;
                localStorage.setItem('srdh_user', JSON.stringify(session));
                initDashboard();
            } else {
                Swal.fire('ล้มเหลว', res.message, 'error');
            }
        };

        function handleLogout() {
            localStorage.removeItem('srdh_user');
            location.reload();
        }

        // --- UI Logic ---
        function initDashboard() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboardPage').classList.remove('hidden');
            document.getElementById('headerUserName').innerText = `คุณ${session.username}`;
            
            const badge = document.getElementById('roleBadge');
            badge.innerText = session.role;
            badge.className = session.role === 'admin' ? 
                'px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider bg-red-100 text-red-600' : 
                'px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider bg-blue-100 text-blue-600';

            if (session.role === 'admin') {
                document.getElementById('btn-admin').classList.remove('hidden');
            }
            switchTab('profile');
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('closed');
        }

        function switchTab(tab) {
            document.querySelectorAll('[id^="content-"]').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`content-${tab}`).classList.remove('hidden');
            document.getElementById(`btn-${tab}`).classList.add('active');
            document.getElementById('pageTitle').innerText = tab === 'admin' ? 'จัดการผู้ใช้งาน' : 'ข้อมูลส่วนตัว';
            
            if (window.innerWidth < 1024) toggleSidebar();
            if (tab === 'profile') loadProfile();
            if (tab === 'admin') loadUsers();
        }

        // --- Profile Logic ---
        async function loadProfile() {
            showLoading();
            const res = await callAPI('getUserData', { email: session.email });
            Swal.close();
            if (res.success) {
                document.getElementById('p-email').value = res.data.email;
                document.getElementById('p-dept').value = res.data.dept;
                document.getElementById('p-username').value = res.data.username;
                document.getElementById('p-position').value = res.data.position;
            }
        }

        document.getElementById('profileForm').onsubmit = async (e) => {
            e.preventDefault();
            const pass = document.getElementById('p-pass').value;
            if (pass && pass !== document.getElementById('p-confirm').value) {
                return Swal.fire('ตรวจสอบ', 'รหัสผ่านไม่ตรงกัน', 'warning');
            }

            showLoading('กำลังบันทึก...');
            const res = await callAPI('updateSelf', {
                email: session.email,
                username: document.getElementById('p-username').value,
                position: document.getElementById('p-position').value,
                password: pass || null
            });
            
            if (res.success) {
                Swal.fire('สำเร็จ', 'บันทึกข้อมูลแล้ว', 'success');
                session.username = document.getElementById('p-username').value;
                localStorage.setItem('srdh_user', JSON.stringify(session));
                document.getElementById('headerUserName').innerText = `คุณ${session.username}`;
            }
        };

        // --- Admin Logic ---
        async function loadUsers() {
            showLoading();
            const res = await callAPI('adminGetAllUsers');
            Swal.close();
            if (!res.success) return;

            const container = document.getElementById('userTableBody');
            container.innerHTML = res.data.map(u => `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="px-6 py-4">
                        <div class="font-bold text-gray-800">${u.username}</div>
                        <div class="text-xs text-gray-400">${u.email}</div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-sm text-gray-600">${u.position}</div>
                        <div class="text-[10px] text-gray-400 font-bold">${u.dept}</div>
                    </td>
                    <td class="px-6 py-4 uppercase text-[10px] font-bold">${u.role}</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded text-[10px] font-bold ${u.status === 'active' ? 'bg-green-100 text-green-600' : 'bg-gray-200 text-gray-500'}">
                            ${u.status === 'active' ? 'ACTIVE' : 'INACTIVE'}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <div class="flex justify-center gap-2">
                            <button onclick="editUserByAdmin('${u.email}')" class="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white transition-all"><i class="fas fa-edit"></i></button>
                            <button onclick="confirmResetPass('${u.email}')" class="w-8 h-8 rounded-lg bg-orange-50 text-orange-600 hover:bg-orange-600 hover:text-white transition-all"><i class="fas fa-key"></i></button>
                            <button onclick="confirmDeleteUser('${u.email}')" class="w-8 h-8 rounded-lg bg-red-50 text-red-600 hover:bg-red-600 hover:text-white transition-all"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function openUserModal() {
            const { value: formValues } = await Swal.fire({
                title: 'เพิ่มผู้ใช้ใหม่',
                html:
                    `<input id="swal-email" class="swal2-input" placeholder="อีเมล">` +
                    `<input id="swal-name" class="swal2-input" placeholder="ชื่อ-นามสกุล">` +
                    `<input id="swal-pos" class="swal2-input" placeholder="ตำแหน่ง">` +
                    `<input id="swal-dept" class="swal2-input" placeholder="หน่วยงาน">` +
                    `<select id="swal-role" class="swal2-input"><option value="staff">Staff</option><option value="admin">Admin</option></select>`,
                focusConfirm: false,
                confirmButtonText: 'สร้างบัญชี',
                preConfirm: () => {
                    return {
                        email: document.getElementById('swal-email').value,
                        username: document.getElementById('swal-name').value,
                        position: document.getElementById('swal-pos').value,
                        dept: document.getElementById('swal-dept').value,
                        role: document.getElementById('swal-role').value
                    }
                }
            });

            if (formValues) {
                showLoading();
                const res = await callAPI('adminCreateUser', formValues);
                if (res.success) {
                    Swal.fire('สำเร็จ', res.message, 'success');
                    loadUsers();
                }
            }
        }

        async function editUserByAdmin(email) {
            showLoading();
            const res = await callAPI('getUserData', { email });
            Swal.close();
            const u = res.data;

            const { value: formValues } = await Swal.fire({
                title: 'แก้ไขข้อมูลผู้ใช้',
                html:
                    `<label class="text-xs">ชื่อ-นามสกุล</label><input id="swal-name" class="swal2-input" value="${u.username}">` +
                    `<label class="text-xs">ตำแหน่ง</label><input id="swal-pos" class="swal2-input" value="${u.position}">` +
                    `<label class="text-xs">หน่วยงาน</label><input id="swal-dept" class="swal2-input" value="${u.dept}">` +
                    `<label class="text-xs">สถานะ</label><select id="swal-status" class="swal2-input"><option value="active" ${u.status === 'active' ? 'selected' : ''}>Active</option><option value="inactive" ${u.status === 'inactive' ? 'selected' : ''}>Inactive</option></select>` +
                    `<label class="text-xs">สิทธิ์</label><select id="swal-role" class="swal2-input"><option value="staff" ${u.role === 'staff' ? 'selected' : ''}>Staff</option><option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option></select>`,
                confirmButtonText: 'บันทึก',
                preConfirm: () => ({
                    email: u.email,
                    username: document.getElementById('swal-name').value,
                    position: document.getElementById('swal-pos').value,
                    dept: document.getElementById('swal-dept').value,
                    status: document.getElementById('swal-status').value,
                    role: document.getElementById('swal-role').value
                })
            });

            if (formValues) {
                showLoading();
                const updateRes = await callAPI('adminUpdateUser', formValues);
                if (updateRes.success) {
                    Swal.fire('สำเร็จ', 'ปรับปรุงข้อมูลแล้ว', 'success');
                    loadUsers();
                }
            }
        }

        async function confirmResetPass(email) {
            const ask = await Swal.fire({
                title: 'รีเซ็ตรหัสผ่าน?',
                text: `ต้องการรีเซ็ตเป็น "1234" ใช่หรือไม่?`,
                icon: 'warning',
                showCancelButton: true
            });
            if (ask.isConfirmed) {
                showLoading();
                const res = await callAPI('adminResetPassword', { email });
                Swal.fire('เรียบร้อย', res.message, 'success');
            }
        }

        async function confirmDeleteUser(email) {
            const { value: deleteType } = await Swal.fire({
                title: 'ยืนยันการจัดการข้อมูล',
                text: `คุณต้องการจัดการกับบัญชี ${email} อย่างไร?`,
                icon: 'error',
                showCancelButton: true,
                confirmButtonText: 'ลบออกจากระบบถาวร',
                confirmButtonColor: '#d33',
                denyButtonText: 'ยกเลิกการใช้งาน (Inactive)',
                denyButtonColor: '#6e7881',
                showDenyButton: true,
                cancelButtonText: 'ปิดหน้าต่าง'
            });

            let type = null;
            if (Swal.isVisible() && deleteType) { // Hard Delete
                type = 'purge';
            } else if (Swal.getDenyButton() && Swal.getDenyButton().contains(event.target) || deleteType === false) { 
                // เนื่องจาก Swal Deny ให้ผลลัพธ์ต่างกันในแต่ละเวอร์ชั่น ผมจะใช้ Logic ด้านล่าง
            }
            
            // Re-logic for Delete Options
            const result = await Swal.fire({
                title: 'เลือกรูปแบบการลบ',
                icon: 'warning',
                showDenyButton: true,
                showCancelButton: true,
                confirmButtonText: 'ลบถาวร (Delete Row)',
                denyButtonText: 'ปิดบัญชี (Inactive)',
                cancelButtonText: 'ยกเลิก'
            });

            if (result.isConfirmed) {
                executeDelete(email, 'purge');
            } else if (result.isDenied) {
                executeDelete(email, 'inactive');
            }
        }

        async function executeDelete(email, type) {
            showLoading();
            const res = await callAPI('adminDeleteUser', { email, type });
            if (res.success) {
                Swal.fire('สำเร็จ', 'ดำเนินการเรียบร้อยแล้ว', 'success');
                loadUsers();
            }
        }
    </script>
</body>
</html>
