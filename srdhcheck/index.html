<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srdh-Check | ระบบจัดการข้อมูลเจ้าหน้าที่</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f0ff; }
        .bg-pastel-purple { background-color: #e9d5ff; }
        .btn-purple { @apply bg-purple-600 hover:bg-purple-700 text-white transition duration-300; }
        .input-field { @apply w-full p-2 border border-purple-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400 disabled:bg-gray-100; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Login Card -->
    <div id="loginSection" class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 animate__animated animate__fadeIn">
        <div class="text-center mb-8">
            <div class="inline-block p-4 bg-purple-100 rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-purple-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-purple-800">Srdh-Check</h1>
            <p class="text-gray-500">ลงชื่อเข้าใช้งานเพื่อจัดการข้อมูล</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">อีเมล</label>
                <input type="email" id="loginEmail" required class="input-field" placeholder="example@email.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">รหัสผ่าน</label>
                <input type="password" id="loginPassword" required class="input-field" placeholder="••••••••">
            </div>
            <button type="submit" id="loginBtn" class="w-full py-3 bg-purple-600 text-white rounded-lg font-semibold hover:bg-purple-700 transition duration-300 shadow-md">
                เข้าสู่ระบบ
            </button>
        </form>
    </div>

    <!-- Profile Card (Hidden by default) -->
    <div id="profileSection" class="hidden w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden animate__animated animate__fadeIn">
        <div class="bg-purple-600 p-6 text-white flex justify-between items-center">
            <div>
                <h2 class="text-xl font-bold">ข้อมูลส่วนตัวเจ้าหน้าที่</h2>
                <p id="welcomeMsg" class="text-purple-100 text-sm"></p>
            </div>
            <button onclick="handleLogout()" class="bg-purple-500 hover:bg-purple-400 px-4 py-2 rounded-lg text-sm transition">
                ออกจากระบบ
            </button>
        </div>

        <div class="p-8">
            <form id="profileForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Row 1 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">อีเมล (แก้ไขไม่ได้)</label>
                    <input type="text" id="displayEmail" disabled class="input-field">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">หน่วยงาน (แก้ไขไม่ได้)</label>
                    <input type="text" id="displayDept" disabled class="input-field">
                </div>

                <!-- Row 2 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อ-นามสกุล</label>
                    <input type="text" id="displayUsername" disabled class="input-field editable">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">ตำแหน่ง</label>
                    <input type="text" id="displayPosition" disabled class="input-field editable">
                </div>

                <!-- Password Row (Visible in Edit mode) -->
                <div id="passwordFieldContainer" class="hidden space-y-4 col-span-full border-t pt-4 mt-2">
                    <p class="text-purple-600 font-semibold">เปลี่ยนรหัสผ่าน</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">รหัสผ่านใหม่</label>
                            <input type="password" id="newPassword" class="input-field" placeholder="ทิ้งว่างไว้ถ้าไม่ต้องการเปลี่ยน">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">ยืนยันรหัสผ่านใหม่</label>
                            <input type="password" id="confirmPassword" class="input-field">
                        </div>
                    </div>
                </div>

                <div class="col-span-full flex justify-end gap-3 mt-4">
                    <button type="button" id="editBtn" onclick="toggleEditMode(true)" class="px-6 py-2 border border-purple-600 text-purple-600 rounded-lg hover:bg-purple-50 transition">
                        แก้ไขข้อมูล
                    </button>
                    <button type="button" id="cancelBtn" onclick="toggleEditMode(false)" class="hidden px-6 py-2 border border-gray-300 text-gray-600 rounded-lg hover:bg-gray-50 transition">
                        ยกเลิก
                    </button>
                    <button type="submit" id="saveBtn" class="hidden px-8 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 shadow-lg transition">
                        บันทึกข้อมูล
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        /**
         * การตั้งค่าระบบ (กรุณาแก้ไขจุดนี้)
         */
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyTkeYoxv9Tl2Zj_et6Ljq9EAEu-ENi6iokLlAJ6CpbPhj3hH712xkev5G9QuxDhPbCQQ/exec"; // นำ URL จากการ Deploy GAS มาใส่ที่นี่
        const API_KEY = "206360sirindhorn"; // นำ API_KEY จาก Script Properties มาใส่ที่นี่

        let currentUser = JSON.parse(localStorage.getItem('srdh_user')) || null;

        // เริ่มต้นตรวจสอบสถานะ Login
        window.onload = () => {
            if (currentUser) {
                showProfile();
            }
        };

        // การจัดการ Login
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            Swal.fire({ title: 'กำลังตรวจสอบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            const res = await callApi('login', { email, password });

            if (res.success) {
                currentUser = res.user;
                localStorage.setItem('srdh_user', JSON.stringify(currentUser));
                Swal.fire({
                    icon: 'success',
                    title: `ยินดีต้อนรับ คุณ${res.user.username}`,
                    text: 'เข้าสู่ระบบเรียบร้อยแล้ว',
                    timer: 2000,
                    showConfirmButton: false
                }).then(showProfile);
            } else {
                Swal.fire('ข้อผิดพลาด', res.message, 'error');
            }
        };

        // ดึงข้อมูล User และแสดงผลหน้า Profile
        async function showProfile() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('profileSection').classList.remove('hidden');
            document.getElementById('welcomeMsg').innerText = `ยินดีต้อนรับ คุณ${currentUser.username}`;

            const res = await callApi('getUserData', { email: currentUser.email });
            if (res.success) {
                document.getElementById('displayEmail').value = res.data.email;
                document.getElementById('displayUsername').value = res.data.username;
                document.getElementById('displayPosition').value = res.data.position;
                document.getElementById('displayDept').value = res.data.dept;
            }
        }

        // จัดการการโหมดแก้ไข
        function toggleEditMode(isEdit) {
            const editables = document.querySelectorAll('.editable');
            editables.forEach(el => el.disabled = !isEdit);
            
            document.getElementById('passwordFieldContainer').classList.toggle('hidden', !isEdit);
            document.getElementById('editBtn').classList.toggle('hidden', isEdit);
            document.getElementById('saveBtn').classList.toggle('hidden', !isEdit);
            document.getElementById('cancelBtn').classList.toggle('hidden', !isEdit);
        }

        // บันทึกการแก้ไข
        document.getElementById('profileForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            if (newPass && newPass !== confirmPass) {
                return Swal.fire('ตรวจสอบ', 'รหัสผ่านใหม่ไม่ตรงกัน', 'warning');
            }

            const confirmResult = await Swal.fire({
                title: 'ยืนยันการบันทึก?',
                text: "คุณต้องการเปลี่ยนแปลงข้อมูลใช่หรือไม่",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#9333ea',
                confirmButtonText: 'ยืนยันบันทึก',
                cancelButtonText: 'ยกเลิก'
            });

            if (!confirmResult.isConfirmed) return;

            Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            const payload = {
                email: currentUser.email,
                username: document.getElementById('displayUsername').value,
                position: document.getElementById('displayPosition').value,
                password: newPass || null
            };

            const res = await callApi('updateUser', payload);

            if (res.success) {
                Swal.fire('สำเร็จ', res.message, 'success');
                currentUser.username = payload.username;
                localStorage.setItem('srdh_user', JSON.stringify(currentUser));
                toggleEditMode(false);
                showProfile();
            } else {
                Swal.fire('เกิดข้อผิดพลาด', res.message, 'error');
            }
        };

        // ออกจากระบบ
        async function handleLogout() {
            await callApi('logout', { email: currentUser.email });
            localStorage.removeItem('srdh_user');
            location.reload();
        }

        /**
         * ฟังก์ชันเรียก API ไปยัง GAS
         */
        async function callApi(action, payload) {
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action, apiKey: API_KEY, payload })
                });
                return await response.json();
            } catch (err) {
                console.error(err);
                return { success: false, message: "ไม่สามารถเชื่อมต่อ Server ได้" };
            }
        }
    </script>
</body>
</html>
